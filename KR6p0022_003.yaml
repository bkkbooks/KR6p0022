body:
  text: 疏華樂交輝華有天華樹華樂有天作自作鈔初引大本是諸天所作次引是虗空自作三引觀經雙具天作自作以是下結歸異世樂也清暢是不澀嘹喨是不滯微妙是不粗和雅是不俗疏樂可以養人之性情而蕩滌其邪穢消融其渣滓是有和融之義鈔如實空如實不空即起信心真如門空如來藏不空如來藏如謂真如實謂實相如實空者謂此真如實相之中空無妄染非謂如實自空此則如實之空也不空有二義一異妄無體故二具足無漏性功德故調和而克諧不悖者舜典云八音克諧無相奪倫今茲萬德亦然常樂我淨不悖真實識知遍照法界不悖清涼不變不離不斷不異不思議即克諧不悖也融液而一味無乖者清濁高下如五味之相濟而後和今茲萬德亦然雖實有此諸功德義而無差別之相等同一味唯一真如也忍進相與低昂者忍進六度之二也忍者惡罵捶打皆悉能忍猶如大地猶如橋梁任一切踐踏而不起一念故曰低進者曉夜忘疲精進不懈猶如一人與萬人敵勇猛直前故曰昂言相與者正忍辱時正精進愈精進時愈忍辱也塤鳴篪奏者塤土為之篪竹為之二器互相唱和詩云伯氏吹塤仲氏吹篪今此忍進低昂互造如塤篪之互為高下也止觀雙成定慧者止觀是因定慧是果止者止其散止之既久則成定觀者觀其昏觀之既久則成慧曰雙成者因中止觀雙修果上定慧不二玉振金聲者金鐘也聲宣也八音未作則先擊鎛鐘以宣其聲玉磬也振收也俟其既闋後擊特磬以收其韻今茲禪定如彼玉振今茲觀慧如彼金聲迭相始終也慈悲喜捨四無量心也慈者與衆生樂悲者拔衆生苦喜者喜衆生離苦得樂也捨者一法不著萬緣皆捨也哀而不傷樂而不泆者詩人言文王未得后妃則寤寐反側以求之是哀其所當哀不害於和也既得后妃則琴瑟鐘鼓以樂之是樂其所當樂不失其正也今茲慈悲乃無緣之慈悲非愛見之慈悲喜捨乃性德之喜捨非情識之喜捨何傷何泆非唯不鼓兼復無聲者觀經云如天寶幢不鼓自鳴今乃非唯不鼓自鳴兼復無聲可聽自性之樂非五眼能窺二聽所聞故羽寂宮沈響天震地者宮羽五音之二雖五音沈寂吼動乾坤古云沈沈寂寂絶施為觸著無端吼似雷是也鈔下有金剛等是明地下莊嚴琉璃地上等是明地上莊嚴鈔無雜無穢是真義無變無遷是如義萬劫常新是金義不增不減是平義不高不下是等義千聖共履是地義毗舍下是引證楞嚴云持地菩薩於普光佛時為比丘平填道路至毗舍如來時因國大王設齊延佛爾時菩薩平地待佛佛摩頂云當平心地則世界地一切皆平維摩云舍利弗言我見土石諸山穢惡充滿螺髻梵王言仁者心有高下不依佛慧故見此土為不淨耳於是佛以足指按地即時大千世界珍寶嚴飾鈔晝則始東洲半六句言日之旋環也古云南贍部洲日當午北俱盧洲打三鼓東勝神洲日將晡西牛貨洲開門戶是也鈔世人行善諸天歡喜者以人修戒善則天多眷屬天喜眷屬故生喜也又諸天皆好善人修善則上合天心故喜也鈔及至小萎亂風吹去者法華云香風吹萎華更雨新好者是也或難曰極樂所有華木皆七寶成不以春生不以秋瘁今乃萎者何也答此有二義一者隨順此方故二者是表法故以華表菩薩之因行稍有懈怠如華之小萎則鼓以般若之風去其懈怠重加精進如吹去萎華更雨新好也疏自性開覺是華義者以圓覺之心如華開明照十方剎故佛地論云如大夢覺如蓮華開是也鈔如華尚蕊者迷則一無所覺故如華正開者悟則萬法朗然故神靈通達亦復如是者以十法界依正色心循業發現無主持者無造作者無分析者皆自性任運不思議之無作妙用如是也經前經文云過十萬億佛土今經文亦云供養他方十萬億佛則知十萬億者是表數之極多猶華嚴之以十表無盡也疏衆生持取供佛亦可約理如華嚴以萬行因華莊嚴一乘妙果以衆生屬因佛屬果故鈔三種意生身者一入三昧樂意生身屬聲聞二覺法自性性意生身屬菩薩三種類俱生無行作意生身屬佛謂之意生者喻如意去速疾無礙也入三昧樂者謂從三三昧中發起神通之用覺法自性者覺諸法自性從此自性發起妙用即名意生身種類者十法界依正色心俱在我一念心中顯現本無遷流之行亦無有為之作疏佛真法身猶若虗空孰受供養故自性自嚴是盛華供養義法身無為不墮諸數何云十萬億故自性自遍是十萬億義心體不動本絶去來何云時還故自性自空是食時還義心體遍周本無對待何云本國故自性自住是本國義鈔心本具含萬德還以萬德嚴心者所謂自體有大智慧光明義遍照法界義真實識知義常樂我淨義等即以所含之萬德嚴我能含之一心德無所德嚴無所嚴者以對恆沙煩惱顯恆沙性德自性之煩惱本空德從何立則德無所德既以即心之德嚴此即德之心全心即德則嚴無所嚴心德兩忘能所不立一念不生是真供養也誰能供養佛通達無生者佛者覺也覺體無生不達無生何處覔佛故唯寂滅現前乃能同佛慈力不然以生滅心著相覔佛隨逐妄緣非真供養故如理思惟即是供養如來者金剛經云如來者即諸法如義不思真如之義不能供養如來故真如非有不以有思真如非無不以無思真如非亦有亦無不以雙亦思真如非非有非無不以雙非思離四句絶百非思思至無思思盡還源方名親供養如來也無前無後一時供養者維摩經善德長者言憶念我昔自於父舍設大施會供養一切期滿七日維摩詰來入會中謂我言長者子夫大施會不當如汝所設當為法施之會何用財施會為我言居士何為法施之會詰言法施會者無前無後一時供養釋曰夫以方會人不可以一息期以財濟物不可以一時周是以會通無隅者彌綸而不漏法澤冥被者不易時而同覆故能即無疆為一會而道無不潤也心體本空者以心無形相十方求之終不可得故空無來往者畢竟空中無形無住無處無著不動不起故心源湛寂常住不遷者心源謂染心之源即性淨也又粗相之源即生相也此在佛地方了其源若法身大士覺未至源猶有生相動彼靜心業識起滅故不云常住至生相都盡無明風止性海浪歇湛然常住也然此是約生滅門說若約真如門則從本以來離諸名相無有變異不可破壞湛然常住也金剛本處即此經本國者如起信言本覺楞嚴言本心梵網言本源圓覺言本際皆指自性而言也本處本國何獨不然此之謂務本者論語謂君子務本然彼以孝悌為本未真務本也必也了萬法之非真達本源之一致蕩生滅之妄計會常住之真心返本還源為真務本也鈔教開四種三昧一曰常行者出般舟三昧經亦名佛立三昧成時見十方佛在空中立以九十日為一期二曰常坐者出文殊說般若經亦名一行三昧唯專念法界故也亦以九十日為一期三曰半行半坐者出法華方等二經法華三七日為一期方等不限時節四非行非坐者亦名隨自意意起即觀故也方法出請觀音等諸大乘經通於四儀及諸作務公私匆遽亦不礙修也疏自性常定者那伽常在定無有不定時又云心地無散自性定自性常慧者一切衆生皆具如來智慧德相又云心地無癡自性慧鈔禪悅為食定有食義者禪定資神輕安適悅故智能運轉慧有行義者智體無住運用活潑故如論之論是往生論如論頌云下是引證食有六段行有一段諸佛菩薩能說能受者非諸佛不能說以具四無礙辨得大無畏故非菩薩不能受以最極利根堪能擔荷故又正體智受真如味者正體智即根本智亦名如理智此智能證真如如空合空似水投水理智一如長無斷絶從體起用長養萬法如食之能持色身長養萬事也禪定資神下次第釋前五食食有資悅義今禪定持心遠離粗重悅體舒神即為食義食有增長義今願力堅強執持正法法身增長即為食義食能成辦諸事今念力能明記不忘成辦聖道即為食義食能解除飢渴今解脫能斷除三障資益法身即為食義食能暢悅身心今法喜能得大歡喜飽滿充足即為食義未發大乘意是未入正定聚衆生修行信心者已發意是信成就發心以後三賢菩薩得忍者是證發心十地菩薩一生補處即等覺是食此食者皆摶真如之理以為食也問既曰真如之理為食而真如一味平等無增無減萬古不磨而文中深淺階位屢食屢消者何也答真如雖曰一味萬古不磨而乃隨智淺深以下位未證上位理時則一心緣此理境名食此食已證此理時則此理化為烏有名曰乃消如人未至廬山則有廬山可緣已至盧山則廬山化為烏有故曰不見廬山真面目只因身在此山中也如來行處是無行處者行者心行乎境也凡夫行有二乘行空大乘菩薩行中道如來則有處全空非行有也空處全有不行空也中道即二邊不行中也離四句行絶百非行威音那畔行法身向上行不可行處行也故知下結勸鈔釋迦調達宿因者釋迦佛與調達往昔為共命鳥一為調達者睡一為釋迦者醒醒者因取香果而食香氣芬然睡者覺而惡曰何瞞我而食也吾當以毒果害之遂食毒果二命俱喪黃鍾是陽六律之首大呂是陰六律之首鈔大乘菩提分乃有多種者涅槃云三十七品為涅槃因非大涅槃因無量阿僧祇道品為大涅槃因故三十七品無所不攝者以法雖同由心成異故如一四諦有無量相而皆攝在四諦之中道品亦然但心行大小不同而成異故道場者得道之處即是道場道品是法身因者淨名云佛身者即法身也從無量功德生乃至從三十七道品生等道品是寶炬陀羅尼者寶炬謂德炬能爍破一切無明黑暗故名寶炬攝一切法名陀羅尼若人能觀八正道者涅槃云善男子衆生佛性不異諸佛若有能修八聖道者當知是人則得明見善男子雪山有草名曰忍辱牛若食者即成醍醐衆生佛性亦復如是智有二種智字是三十七品中之一分分別諸陰有無量相者有凡夫五陰三乘五陰諸佛五陰凡夫五陰分段生死也三乘五陰變易生死也諸佛五陰即真常之體故曰因滅是色獲得常色受想行識亦復如是又復分別諸陰有無量相即是別教觀無量四諦而亦可通圓人如星羅十門月滿三觀得一空三昧即得無量空三昧等疏一信二進是十一善心所攝三念四定五慧是五別境心所所攝鈔持其所已得者如草木有根則已得之枝葉華果持而不失行人具足五根則已得功德亦持而不失也生其所未得者未生之枝葉華果漸漸能生行人具足五根則未生功德亦漸漸能生也然始入佛法即有信心未有定慧不得名根今由前三科則信不可拔故得成根下四亦然諦理即真俗中以通大小乘故信等五法各有體用信者於實德能深忍樂欲心淨為性對治不信樂善為業進者於善惡品修斷事中勇悍為性對治懈怠滿善為業念者於曾習境令心明記不忘為性定依為業定者於所觀境令心專注不散為性智依為業慧者於所觀境揀擇為性斷疑為業俱舍三義即上文二義最勝者即上持其所已得而自分不失也自在者即上生其所未得而勝進上求也光顯體用雙彰者即上即體起用即用顯體也二十二根者信進念定慧憂喜苦樂捨眼耳鼻舌身意共十六根男根女根未知欲知根已知根具知根命根鈔如瑜伽下引證力有二義後之所證出世法者即覺支正道住行向地等法難制伏是不為邪外所伏此是證不為他伏也下二句是證又能伏他一切諸魔即四魔八魔等深信諦理轉更增長者前雖具信根若未有力則疑惑能搖邪外能亂煩惱能侵今既有力則疑不能搖以有信獅子能制疑兕故邪外不能亂以有信珠能清邪濁故煩惱不能侵以有信日能破煩惱霜故進根增長者前雖有進根若未有力則無始來不修三學六度種種懈怠種子猶能發生墮出世種種事業今得進力則精進猛將能伏懈怠魔軍成辦三學六度諸事業故念根增長者前雖有念根若未有力則世間五欲六塵邪念猶未盡除出世之三寶施戒等正念猶未成就今得念力之鎧雖入五欲陳中不為所損能破種種邪念魔軍故定根增長者前雖有定根繫緣一境若未有力則微細雜念猶未得除四禪八定九次第定十六特勝等事理諸禪猶未發起今既得力則定能澄清亂想之垢能現諸禪之珠故又不明諦理但得世間禪名曰事禪深明諦理得出世間禪及出世上上禪名曰理禪又小乘緣空直入乃至圓人直心正念真如名曰理禪小乘帶事兼修乃至圓人從行託事附法三種觀法皆事理兼修名事理禪種種不一故云諸也慧根增長者前雖具慧根止觀分明決擇是非若未有力則九十五種邪外之見偏乘小教權理之執猶或現前今既有力則慧劒當空一切邪外偏小之絲無不盡斷故疏七覺自體即擇法等此之為用為斷見道諸邪見故鈔分分隨宜而用者謂應用擇法則用擇法應用精進則用精進隨其所宜無差謬也諸已證入正位者正位即正性以由前根力能破一切見執不墮斷常覺法正性正性者即四諦如實性即用此如實覺慧以為支分合宜則用也即四諦如實性者性即苦為逼迫性集為招感性等如實即是生滅無生無量無作此四各稱當教之理名曰如實觀諸法時善能覺了揀別真僞者四聖諦理為真外道邪諦為僞此二差別在毫釐間今觀法時善能覺了不以僞為真以真為僞故善能覺了不謬行於無益苦行者以擇法後次即修道故云修道法時然外道久受勤苦精進修行不成聖果者以不達真性惟用妄識修行名曰精進實同懈怠今須覺了是正是邪勿行外道之謬行故得法喜時善能覺了等者以既修道法必得法喜然果見真性乃稱法喜若乃認奴作郎將彼魚目當我明珠則為大錯故得法喜時善須覺了勿墮顛倒之法生喜故除諸見煩惱時善須覺了等者既得法喜即斷諸見煩惱然貪等昏煩之法體是虗僞故須斷除若信等五根及發宿世善根乃出世真正善根若亦斷除錯謬非小故須覺了真僞勿錯謬故捨所見念著等者既以除諸見煩惱則名捨所見境捨所念著境時然捨乃對取而言取既虗僞捨豈得真并捨亦捨弗令追憶故發諸禪定等者既捨所見之境則能發諸禪定然禪悅資神能生愛著故須覺了禪定虗僞以定對動而有動既是妄定豈是真勿生耽樂故修出世道時等者既得禪定乃修出世之道則有二病定勝慧則沈慧勝定則浮必須定慧均平乃證寂照不二故用前六支或起或伏俱調和中適勿墮二病故此覺支之用能斷三界見惑以為其果也疏八正道者由前七支擇法乃斷見惑即入聖道聖者證也故亦名正八聖自體即正見等此之為用為斷修道諸煩惱故鈔一正見者若修覺支所得真覺以智安立我所得者與修多羅合耶不與修多羅合耶必令諦理分明無有錯謬故二正思惟者雖見此理與無漏智相應然理性雖明未能究竟今則從根本智起後得智重慮緣真擴充增長入涅槃故三正語者初見道人尚多習氣身三口四未免現起故以無漏智攝口四業不起妄言綺語兩舌惡口之業令住真實正直柔軟和合之四善語故四正業者不惟口無妄言以無漏智除身殺盜淫等三種身業所謂非惟不殺不盜不淫并殺盜淫機亦復斷盡身業清淨故五正命者不惟身業清淨以無漏智通除三業中五種邪命食令住正命故五種邪者一為利養詐現奇特相屬身業二為利養自說功德三占相吉凶四高聲現威令人畏敬此三屬口業五說得供養以動人心此屬意業六正精進者前既三業清淨又除三業中種種邪命則三業精純乃堪進道故念念精勤趣涅槃道故七正念者前既三業精勤一心進道故恐於正止正觀之正道根力覺支之助道心有動失則忘失正念今則以無漏智於正於助明記不忘不令動失故八正定者既正念不失復以無住之真智住於無相之真理決定不移故以上約權乘釋華嚴下約大乘也遠離一切諸邪見者不唯外道之見乃至偏乘小教一切見病悉皆遠離故捨妄分別心隨順一切智者不唯分別六塵為妄乃至分別真俗及與離二邊之中皆妄分別捨此分別隨順一切種智故乃至者超略之詞若具引者正語則常行正語離語四過順聖言故正業則恆修正業教化衆生令調伏故正命則安住正命頭陀知足威儀審正隨順菩提行四聖種一切過失皆遠離故正精進則勤修一切菩薩苦行入佛十力無罣礙故正念則心常正念悉能憶持一切言音除滅世間散動心故於一三昧入諸三昧者如二十五王三昧首楞嚴百八三昧等互為出入無定法故鈔觀身不淨有五一種子不淨謂由父母赤白二滴所合成故二住處不淨謂在母胎中生藏之下熟藏之上故三自體不淨謂四大所成設以海水傾洗此身終無香潔故四外相不淨九孔常流種種穢惡故五究竟不淨一息不來棄捐冢間如朽敗木故觀受是苦者受者領納也又領納有三苦受樂受不苦不樂受觀苦受是苦苦樂受是壞苦不苦不樂受是行苦觀心無常者觀現在識心念念遷流心心不住轉變不一故觀法無我者觀行想二陰之法空無主宰故身受心法是所觀境不淨苦無常無我是能觀之心能觀之心體實是慧以慧觀於境由念得住與念相鄰近鄰近故名念然必觀四者對治四倒故謂觀身不淨治於淨倒觀受是苦治於樂倒觀心無常治於常倒觀法無我治於我倒也此次第者從粗至細以對治故智論云此身既爾不淨衆生貪著者以其情塵生諸受故計之為樂誰受此樂故次觀心念念生滅後觀二陰皆不自在破此四倒行四正行開實相門四正勤者四念智火若得勤風則無所不燒故次辨之此四正勤精進為體揀非九十五種相違之勤故名為正四如意足者欲勤心觀也自體即是三摩提欲勤心觀皆是助伴欲謂猛利樂欲勤謂精進無間心即是定謂專心於境觀即是慧亦名四神足者神即神通足即是定瑜伽云如有足者能往能還以騰躍勇健能得能證世間勝法出世間殊勝法說名為神彼能到此故名為足婆沙智論謂婆沙論與大智度論疏又上三科至此始有根力者念慧二根即前四念處所成以四念處念慧為體故進根即前四正勤所成以四正勤精進為體故定根即前四如意所成如意以三摩為自體故若兼助體即信進念定慧為體以四如意足以欲勤心觀為助伴故故五根五力非離前三科別有體也鈔攝心調柔即四如意足道之元德之母者道是佛道佛道無上而信為道之元德謂功德佛德無量而信為德之母五位謂信住行向地十信之中信亦居初者謂十信位始自初信心二念心三精進心乃至十願心也十一善法信亦居初者信慚愧無貪乃至第十一不害也前所得法即前三科此即前文持其所已得而自分不失也後當得法即七覺支八正道此即前文生其所未得而勝進上求也鈔妙色雅音全體是自心顯現者以自心即彌陀彌陀即自心心佛衆生三無差別佛變化即心變化也又自心色心不二極樂依正莊嚴不離當人一念故心地含諸種者六祖傳法偈也偈云心地含諸種普雨悉皆萌頓悟華情已菩提果自成全體是自心培植者心地無疑即是信心地無懈即是進乃至心地無癡即是慧等先德下引證謂根者非枝葉也力者有力用也若離心別求是摘葉尋枝非根本也是傍他門戶非己力也故必消歸自心以心萬古如如澄湛廣大五根五力孰過於是覺心不起即七覺支者謂覺者覺了諸法也若起心覺境是向外馳求是迷昧非覺了也故必覺心不起一念不生乃真覺支直了心性即八正道者謂若正外有邪正亦成邪故云若法從待生是法還成待必須邪正雙忘方名正道經皆悉念佛念法念僧疏鈔但發明佛法僧不發明如何念今就鈔中約五教說三寶則今念法亦當有五教不同如小教即是有門其念三寶實有能念所念也始即空門能念所念一切皆空也終即亦有亦無門念而不念不念而念也頓即非空非有門能所雙寂無念不念離念頓顯也圓即圓融無礙門一念一切念一切念一念一時頓念非隱顯一切圓成無勝劣也則知念法深淺不同隨機無定然約而言之不出事理二種事即念別相三寶念佛則常念親近求一切智念法則常念修行諸波羅蜜念僧則常念親近學如實行也理即念同相三寶覺心不起常住第一義諦不為二邊所動是為念佛念法念僧即天台大師所謂安心不動稱之為念也鈔比丘五衆者律中五人以上同一羯磨和合無爭如水乳合名和合衆三寶大小乘別者小乘則丈六應身四阿含經四果四向為三寶大乘則圓滿報身大乘方等三賢十聖為三寶三寶名相各別者佛有三身四教六即十義等法有教行理果等僧有凡夫賢聖等一立事就義門者三十二相丈六金身事相佛也立此事相以就覺義以釋迦苦行成道說法度人自覺覺他故名佛寶四阿含等不談實相唯說苦空此事相法也立此事相以就軌持義以四諦之法亦能軌生物解任持自性故名法寶剃髮染衣六和無諍此事相僧也立此事相以就和合義以雖不達實相與理和合而在衆無爭互相愛敬六和為侶如水乳合故名僧寶乃小教之三寶也二會事歸理者非三十二相之佛為佛般若經云若以色見我以音聲求我是人行邪道不能見如來又曰若見諸相非相即見如來又曰如來者即諸法如義故以如理為佛寶法者非以文字為法經云有法可說名為謗法無法可說是為說法所謂無說無聞是名真說般若此以如理名法寶僧者非以剃髮為僧經云須陀洹名為入流而無所入乃至阿羅漢實無有法名阿羅漢亦以如理為僧寶始教之三寶也三理事融顯門者雖云色相不是佛音聲亦復然又云亦不離色聲見佛神通力所謂於法不說斷滅相名曰佛寶雖曰文字性空名字亦離又不離文字說解脫相以文字性空即實相故名為法寶雖云預流非預流羅漢非羅漢又不壞僧相善來比丘鬚髮自落即成沙門名為僧寶事不礙理理不礙事事理無礙乃終教之三寶也四絶相理實門者一念不生即名佛寶五法三自性皆空八識二無我俱遣所謂無有涅槃佛無有佛涅槃若有若無二悉皆離乃頓教之三寶也五融通不礙門者以前四種前淺後深前不攝後後不攝前今則舉前兼後舉後兼前拈一莖草即丈六金身剖一微塵出大千經卷普賢身相若虗空依真而住非國土一即是多多即是一頭頭涉入剎剎圓通乃圓教之三寶也性體靈覺照了諸法者佛者覺也真性之體靈靈不昧了了常知普照諸法而無能所自性佛也恆沙性德皆可軌持者因翻彼恆沙煩惱顯此恆沙性德一一皆軌生物解任持自性自性法也性相不二冥合無違者靈覺之體即恆沙性德恆沙性德即靈覺之體二而不二自性僧也法稱離欲尊者以一切法門能令衆生離諸惑染故又以從來不與染法相應不與諸塵作對故鈔約而言之皆三寶攝者此三十七助道品通大小乘即是法寶此助道法以正觀為體正觀分明即是佛寶此助道品以性相為用性相不二即是僧寶故云皆三寶攝又鳥音之中或明此三十七品悉皆真故悉同如故是即佛攝或明此道品能離念故能隨順入真如故即是法攝或明此道品事不礙理理不礙事故即是僧攝或明含靈本具覺性者世尊成道時曰奇哉奇哉一切衆生皆具如來智慧德相但以妄想執著而不證得也或明性具種種諸相者台教性具法門十法界依正色心性中本自具足但循業發現故一一諸相皆天真之故物非緣起之新成也或明性相和合不二者古云性起為相一多緣起之無邊相得性融千差涉入而無礙是也不善為辭者或錯雜不倫或汗漫無飾或不能反覆抑揚跌蕩頓挫皆是扞格者禮學記篇扞格而不勝注扞拒扞也格讀如凍𠗂之𠗂謂如地之凍堅強而難入也鈔心體本自性離者自性本離言說相離名字相離心緣相離一切法差別之相也鈔自近及遠猶如逝水者孟子云源泉混混不舍晝夜盈科而後進放乎四海性具諸法五句天台圓教義也以別教所詮清淨真如空無一法十界色心從染淨之緣所變起因中必須蕩盡諸相乃歸真性果上何能即色即心即依即正今圓教理具諸法從理具中而有事造雖云理具事造實無能具所具能造所造以即心即法即法即心能造因緣及所造法皆悉當處唯是一心皆悉當處唯是一色唯心唯色對待斯忘妙觀觀之無非三諦故依性起修時一修一切修一證一切證故因窮果證時依正色心法法相即一說一切說也疏如幻法門者佛說一切法本為一切心我無一切心焉用一切法故一切法門皆悉如幻又愕嚴云如幻三摩提彈指超無學華嚴云有無一切法了達悉如幻入於如幻際於彼無依著是即如幻法門也自性本具者以一切法門皆悉如幻而如幻之法皆根本於自性自性之中無所不具所以古人云世間種種法無不從心生一切法如幻故說心如幻譬如工幻師普現諸色像園林華果等幻師之所成是也鈔貪瞋癡即戒定慧者以無始法性為無明故今無明即法性法性為無明故成貪瞋癡無明即法性故即戒定慧如清水濁水濕性無殊三學三毒體性不二也又古云無明業性即法性天台云惑業苦三道當體即是三德祕藏起信云若離覺性則無不覺若離不覺之心則無真覺自相可說善道惡道悉皆如幻者貪等乃惡道之本戒等為善道之因貪瞋癡既即戒定慧則惡道如幻戒定慧不離貪瞋癡則善道亦如幻矣又貪瞋癡戒定慧因也善道惡道果也因既全空果復何有故悉如幻疏以少況多者少謂百千種樂多謂微妙音鈔以前例後者前謂化禽後即風樹滅盡定者九次第定之最後定也此定七識恆行心心所六識之不恆行心心所悉皆滅盡獨有八識故曰滅盡得此定者六根虗靜無復馳逸內外湛明入無所入真安和適悅之極故以喻為風吹身鈔三法忍者一音響忍因聞聖教得悟入故二柔順忍折伏煩惱全不起故三無生法忍無生之理忍可於心故忉利天鼓者華嚴云忉利諸天著五欲樂行放逸時天鼓之中自然出音而告之言此樂無常莫行放逸等雷音是佛國鈔不會父母未生前句者香嚴在百丈會中機鋒敏捷後參溈山山問曰汝在百丈能問一答十問十答百是否香嚴云是山云我不要汝答十答百但將父母未生前本來面目道一句來嚴不能答求溈山為說山云我若為汝說破汝後來罵我且去不為汝說嚴發憤云我拌一生做個常行粥飯僧決要參破後因治地聞擊竹得悟乃向溈山作禮曰若溈山早為我說焉得有今日事一擊忘所知所知即所知障即渠問一答十處到此忽然渾化故云忘更不假修持所謂修證即不無染污即不得又即所謂斷除妄想重增病趣向真如亦是邪又即所謂從今以後不疑天不疑地也動容揚古路動容即動容周旋揚古路謂發揮妙性即所謂左右逢源不知手之舞之足之蹈之也不墮悄然機悄然機謂虗無寂滅湛入合湛等今於涅槃天已大明悟十方世界及與身心如吠琉璃內外明徹故不墮也鈔理含萬法如樹者樹有含藏義能含枝葉華果故理含恆沙功德亦然故云道樹也智周法界如風者風有周遍義無處不到故云色無邊故般若亦無邊智與理冥者如智契如理如風之吹樹而無蹟理隨智顯者如如理因如如智方顯如樹之因風而有聲然而風不知樹樹不知風風樹各住自位所謂各各不相到各各不相知華嚴云譬如長風起遇物咸鼓扇各各不相知一切法如是理智亦然理外無智智外無理理智亦無二本然各不相知非是言其二本乃言其自然交融也有不假造作天然融會意如此說方與下句原無二本合百千種樂下會歸一心疏前後功德繁不各係條下者天親作往生論以釋此經彼論頌中有十七種功德釋此經功德莊嚴以頌對經前後皆明顯可知故不繁引獨此經化禽風樹二種莊嚴引對彼頌變化大乘等四種功德者以彼頌中缺佛化作及無惡道二義故今特引以發明之鈔虗空功德者頌云無量寶交絡羅網虗空中種種鈴發響宣吐妙法音性功德者正道大慈悲出生善根故正報二功德謂上首功德大衆功德鈔若能轉物二句是楞嚴經文文云一切衆生迷己為物為物所轉是故於中觀大觀小若能轉物即同如來以心外無物六句是鈔中釋辭心外無物物即是心是明色心不二但離分別即是般若無有障礙是明離念相者等虗空界鈔意謂經所云轉物者非是有物可轉蓋以心外並無有物一切物皆即是心而所以見有物者以心生分別故但一念不生全體即自顯現所以經說若能轉物即同如來也以此觀之可見自性般若周遍法界而西方水鳥樹林自悉皆說法也起信離念相者等虗空界者論文云所言覺義者謂心體離念離念相者等虗空界無所不遍法界一相即是如來平等法身疏依從正生者若據外教則從太極生兩儀兩儀生四象四象生八卦清濁奠位三才肇分則正從依生今內教則依從正生一念無明引生三細境界為緣引起六粗山河大地因無明而有妄想而成依從正生也鈔籌量名意者相宗云集起名心集諸種子起諸現行故籌量名意籌慮思量自分境界故了別名識照了分別前境界故又意者即第七識籌量者思惟籌量第八見分是我故也此正取第七心王自體思量名意亦兼取遍行五所中思也意識謂意之識即第六識也論云言意識者即此相續識依諸凡夫取著轉深計我我所種種妄執隨事扳緣分別六塵名為意識亦名分離識又復說名分別事識是也念念逐外籌量者念念隨逐外塵思量籌度曾不暫離日夜安於迷亂而不覺也唯生唯死自若於紛擾之中無古無今相忘於散亂之內可懼也旋其意識者謂初心人未能遽依業識修行祗可即就意識回光返照也故諸修行人未得定者皆散位獨頭意識為觀體得上定者亦是定意識現量觀察也扣已而參者謂不逐外籌量但向一句阿彌陀佛上著倒念念體察念念究審鞠其根源也思盡還源者即所謂體究之極於自本心忽然契合也思無所思者即念而無念是離念境界所謂遠離微細念故得見心性心即常住也又復此即不思之思是任運清淨之意故佛果第七亦名為意疏前釋即衆多無有數量廣大無有限量鈔自受用身照真法界者乃無相之身以功德智慧為體故照一真法界他受用身遍照大衆者乃有相之身以色心為體為十地菩薩現起故遍照大衆此約身智分釋光明名為智慧者若身光不是智慧則同土石木偶無情若智慧不即身光則智慧有所不遍故身光之事即智慧之理圓融不二也此約身智合釋四十四光者始從善現照耀終至觸法清淨我於一切無所執得常光者諸佛光明從智慧生凡夫執重智慧不生智慧不生光明何有故蕩一切執者乃能發光明也又有所執者識情無所執者智慧既有智光豈無身光鈔義各有取者東方為震震為羣動之首動即不動表不動智也萬八千者表翻破十八界無明以一界有百界千如成萬八千故彼佛光明最為遠者以與衆生緣深被機普遍故又經經必自讚抑揚隨時亦無礙或難佛光既遠今何不見曰佛光本遍衆生自迷以煩惱心障智慧眼故如日光遍照盲者不見是盲者過非日月咎也諸佛光明所不能及者或有難云佛佛道同則光明亦同今佛光遠近懸殊者何也曰佛光實同因機現異鈔三壽者以下十三句佛有三身壽亦有三法身以如理為身報身以智慧為身應身以應機赴感為身壽者受也領納義也法身以真如領受諸法故名為受雖云領受實無能所以真如即諸法諸法即真如言領受者不隔義也真如無始無終諸法亦無始無終亘徹三際無窮無盡者法身壽也報身則始覺之智領受本覺之理名受雖云領受亦無能所以無有智外如為智所證無有如外智能證於如如空合空似水投水言領受者相應義也始覺有始無終本覺雖徹三際今始出纏亦有始無終從今至當無窮無盡者報身壽也應身則慈悲領受當機故名為受雖云領受亦無能所以佛唯大悲大智為衆生作增上緣令善根成熟衆生自己心中見佛說法言領受者機感相應義也衆生機熟應則隨現衆生機息應則隨亡有始有終一期不斷者此應身壽也又法身者師軌法性還以法性為身此身非色質亦非心智非陰界入之所攝持強指法性為法身耳真如不隔者以一切法悉皆真故一切法皆同如故又報身者修行所感法華云慧光照無量久修業所得涅槃云大般涅槃修道得故此身非身非不身強名此智為報身耳境智相應者如如智照如如境菩提智慧與法性相應相冥也相應者如函蓋相應相冥者如水乳相冥又應身者應同萬物為身也應同連持為壽也智與體冥能起大用如水銀和真金能塗諸色像功德和法身處處應現往然此應身有勝有劣勝即他受用是業識所見者此依中理而住劣即生身事識所見者此依真理而住一期報得百年不斷者如我世尊王宮出家苦行成道三十二相八十種好說法五旬住世八十雙林樹下乃入涅槃此即劣應生身也法身以如理三句謂法身以理為身故即如理為命報身以智慧為身故即智慧為命應身以應機赴感為身故以因緣為命因即衆生能感之因緣即諸佛能應之緣因緣時至感應道交因緣別離感應斯泯觀經疏云下十句六道有生滅法身起應亦示有生滅王宮降蹟雙林涅槃有始有終應身壽也三祇行滿無明斷盡般若現前從自受用現他受用於色究竟天現最高大身盡未來際說法教化有始無終者報身壽也報應即法故非壽法即報應故非不壽豎窮三際無始無終者法身壽也又非壽者非應同連持之壽非不壽者非報智不連持壽雙非二邊冥中法體又此壽非長量亦非短量無延無促云非壽非不壽也然上三壽亦是隨宜機教非圓頓義也若據圓教性具法門三身性具三身融即從性起修性既三身無始無終修亦三身無始無終性既三身融即修亦三身融即舉一即三言三即一不可思議者圓教壽也是故下引釋迦例彌陀入滅雙林乃應身被凡小機機薪既盡應火則忘靈山未散乃報身被菩薩機機既常時佛亦常在舍那千丈乃菩提場所現報身丈六金身乃鹿野苑所現應身二始同時雙垂兩相也佛本不移機自異者法身起用如空谷傳聲明鏡寫影隨聲高下隨相妍動若行雲止猶谷神紜紜自彼於我何為耶鈔僧祇入十大數之首者始自阿僧祇終至不可說不可說轉從百洛叉倍倍積纍者數有三等謂下中上如黃帝算法共有十三數謂十十為百十百為千十千為萬億兆京秭垓壤溝㵎正載也此則十倍之下數也中等數者百倍倍之經云一百洛叉為一俱胝是也上等數者則倍倍倍之俱胝俱胝為一阿庾多是也鈔即長能短即報即應也即短恆長即應即報也無長無短報應即法也長短存焉法即報應也一一圓融言思斯絶者即長能短不可以報言即短恆長不可以應言乃至長短存焉不可以法言以言例思亦復如是鈔多種因者一樂說二發願三總持四供養五弘經六念佛七修禪八行度阿彌陀佛昔為太子下一節具足六度七千歲中脅不至席精進度不念愛欲戒度不念財寶施度不問他事常獨處止禪度意不傾動忍度復教化他人智度如上所引諸因或為國王王子或為輪王或為比丘或為法師或供養佛或說法利人或發四宏誓或行六度所謂根深果茂源遠流長道不浪階隨功涉位耳今人一行不修欲希勝果其猶拳石未辦欲纍七層寶塔其可得乎微妙法門者謂心法妙佛法妙衆生法妙鈔華嚴舉十表無盡者一者數之始十者數之終千為十百萬為十千經中數事必舉十者表無盡也猶是王老師兒孫者南泉姓王常自稱王老師黃檗至南泉一日齊時捧鉢向南泉位上坐南泉來見便問長老甚麼年中行道檗云威音那畔泉云猶是王老師兒孫疏四諦聲教者一苦諦二十五有依正二報是別則二十五有總則六道生死一地獄道作上品五逆十惡者感此道身二畜生道作中品惡逆者感此道身三餓鬼道作下品惡逆者感此道身四修羅道作下品十善感此道身五人道四洲不同皆苦樂相間在因之時行五常五戒及中品十善感此道身六天道二十八天不同修上品十善及禪定為因感此道身上來所釋從地獄至非想天雖苦樂不同未免死而復生生而復死此是藏教實有苦諦二集諦者即見思惑又云四住又云枝末無明又云通惑又云界內惑雖名不同但見思耳見惑有八十八使以五鈍五利十使歷三界四諦下增減不同成八十八思惑有八十一品謂三界分為九地欲界合為一地四禪四空為八共為九地欲界一地中有九品貪瞋癡慢上八地各有九品除瞋使故成八十一也上來見思不同總是藏教實有集諦三滅諦者滅前苦集顯偏真理因滅會真滅非真諦四道諦者略則戒定慧廣則三十七道品此三十七合為七科一四念處二四正勤三四如意足四五根五五力六七覺支七八正道已上七科即是藏教生滅道諦然四諦之中分世出世前二諦為世間因果後二諦為出世間因果皆前果後因者令知苦斷集慕滅修道也阿羅漢揀非前三者一須陀洹此云預流此位斷三界八十八使見惑見真諦故名為見道二斯陀含此云一來此位斷欲界九品思中斷前六品盡後三品猶在故更一來三阿那含此云不來此位斷欲殘思盡進斷上八地思四阿羅漢此云無學又云無生又云殺賊又云應供此位斷見思俱盡子縛已斷果縛猶存名有餘涅槃鈔世尊為憍陳如五人者佛初出家入山修道父王思念命陳如馬勝等五人隨侍五人不勝其苦退居鹿苑佛成道已觀五人宜最先得度故佛至鹿苑說法度之三轉法輪者一示相轉此是苦逼迫性此是集招感性此是滅可證性此是道可修性二勸修轉此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應修三作證轉此是苦我已知此是集我已斷此是滅我已證此是道我已修緣覺觀十二因緣者一無明謂煩惱障煩惱道二行業障業道此二支屬過去三識託胎一分氣息四名色名是心色是質五六入六根成此胎中六觸此出胎七受領納前境好惡等事從識至受名現在五果八愛愛男女金銀等事九取凡見一切境界生取著心此二未來因皆屬煩惱如過去無明十有業已成就是未來因屬業道如過去行十一生未來受生事十二老死此即是四諦所以重開者以緣覺之人先觀集諦所謂無明緣行行緣識乃至生緣老死此則生起若滅觀者無明滅則行滅乃至生滅則老死滅因觀十二因緣覺真諦理故言緣覺此人斷三界見思與聲聞同更侵習氣故居聲聞上束之不出四諦者若流轉門無明愛取三支是煩惱道行有二支是業道此五支為集諦識名色等七支為苦諦若還滅門滅前十二因緣之智為道諦證寂滅理為滅諦算數九章者一方由二粟布三差分四少廣五商均六均輸七當程八盈朒九勾股洛閎一行者洛閎漢武帝時人精於歷數漢時改正朔其所定也算周天數云後幾百年當有差訛必有聖人出而正之唐𢆯宗時僧一行果出復定歷數塢波泥殺曇此云微塵鈔二十三喻下一禪定堅固如須彌山定力持身不為境風所動故二實智照理如明日月親證真如遠離一切障故三願力廣大猶如大海萬行功德皆由願力出生故四權智熾盛猶如猛火斷諸煩惱如火能燒諸薪故五忍辱如地不分貴賤任其踐踏一切悉平等故乃至二十三慈悲廣大猶如慈氏唯心識觀遍緣法界諸衆生故又等法界者慈氏修唯心識定觀法界依正皆從識心流出上而諸佛不增下而蜎蠕不減唯識所現故云等也鈔華嚴二十五經下九句有三圓滿一切諸佛國土莊嚴指所依功德依報圓滿也如來所都主圓滿也不可思議至當成正覺輔翼圓滿也疏自性即空即假是佛有菩薩義者聲聞墮空菩薩出假佛即自性法身不墮二邊而雙即二邊也疏如來淨華聚正覺華得生者淨華即七淨華也如來因中修七淨華果上成佛故正覺得生正覺華指三乘賢聖以三乘賢聖將來成等正覺稱正覺之華也經云直心是菩薩淨土菩薩成佛時不諂衆生來生其國等正此意也鈔戒淨謂身口意始終清淨即正語正業正命也心淨謂三乘制煩惱斷結漏盡即正精進正念正定也見淨謂見一切法之真性不起妄想即正見正思惟也度疑淨者若見未深當時雖了後或生疑若見深疑斷名度疑淨行斷知見淨者行謂苦難苦易樂難樂易四行也斷謂斷諸結也學地中八智未能自知所行所斷既得無學盡智無生智悉自知見所行所斷通達分明是名行斷知見淨鈔依如來智海含潤而生者如來智即湛圓真心法界海慧也念佛衆生得成三昧雖不能游戲如來大寂滅海已沾一滴之潤菩提之焦芽正覺之枯種乃得含潤而生也見佛光明而生慈心者是見光自進佛放光明攝受此人是佛攝令進莊嶽齊街里名鈔大乘不退等者謂既往生已親大乘人聞大乘法發大心修大行趣大果不同此土六心墮落塵劫聲聞故已得不退者凡所已得神通三昧智慧辨才更不喪失不同此土神仙遭跨下羅漢墜雲端一動欲塵皆喪失故未得不退者凡所未得之神通三昧等種種功德更無阻滯任運能得不同此土魔障現前不能前進故鈔信行未備者十信菩薩如空中毛可上可下上之則入聖流下之則入凡流未得不退轉位以無退緣者如前十疑論五種不退等得少分法身者見相似法身入正定聚也證遍滿法身者分斷無明分證法身也妙宗三不退者台教云惑有三種見思塵沙無明見思阻乎空寂塵沙障乎化導無明翳乎法性若破見思證空寂理名位不退永不失超凡之位以見思煩惱六道之因因亡果喪不來三界故若斷塵沙能行化導名行不退永不失菩薩之行以二乘不斷塵沙不知衆生種種機不知對治種種法不能度生此若斷者知法知機任運度生故若破無明親證法性名念不退永不失中道正念以小教權乘無明未斷墮空有二邊無明若斷不墮二邊常居中道故生同居為願不退者以若據三惑未斷似應退轉但以初發大願願力持心不致退轉故生方便為行不退者以若據未破塵沙未能度生未得行不退以七方便人生彼土中有餘佛說法即斷塵沙從空出假即行化導故生實報為智不退者以證中道妙理永不失中道妙智故生寂光為位不退者以究竟窮源永不退妙覺果位故鈔四教各明不退者藏教有七賢聖位自五停心至不時解脫別相念者七賢之第二位也此位能伏見思故不退又別者謂各別身受心法不同故相謂行相觀此四法作不淨等行相故通教三乘共有十地自初乾慧以至佛地性地者第二地也謂之性地者以相似得法性水故此位亦伏見思故不退別教自十信至妙覺有五十二位七住不退者此位菩薩斷見思惑盡與藏通極果相齊故不退圓教自五品至妙覺有五十三位七信回向心也此位菩薩見解與別教迥異斷惑與別教七住相齊故不退鈔前如護明者釋迦未降王宮居兜率天號護明菩薩疏何日當補是疑時又補處者下是疑數鈔又如法藏願云下言不但互見而亦且總攝也鈔願受天樂者昔有貧女處於糞聚以人民所棄殘汁為食迦葉從乞以汁供養尊者問其所願云欲生天數日命終生忉利福勝餘天願作冥王者毗沙國王與維陀始王戰不勝因立誓願願我來世為地獄主治此罪人十八大臣願亦如是今地獄主毗沙王是十八獄卒十八大臣是若合符節者孟子謂舜與文王得志行乎中國若合符節注云符節以玉為之篆刻文字而中分之彼此各藏其半至則左右相合為信也若合符節言其同也疏自性還歸本體者若不明本體唯厭此娑婆欣極樂則隨境遷移逐物流轉非真生彼國故云也又還歸者無不從此法界流無不還歸此法界也從一心中流出四聖六凡則四聖六凡仍舊還歸一心又自性即是本體而云還歸者以自性一向不守自性五道隨緣故今應當還歸也鈔不離當處者古云不離當處常湛然覓即知君不可見又云漚生漚滅無非水雲去雲來不離空若能了此則生彼國者非生彼國生此自性安樂國也何曾咫尺動步者前云乃知匪離跬步寶池湧四色之華等如其下結勸若果能了知本體不離當處則高山平地總西方何須願生彼國如古云正念阿彌陀佛時寶池樹影日遲遲更馳心念生西土又是重栽眼上眉是也如其真如不守自性五道隨緣則是窮子捨父逃逝流落他鄉則應厭此五濁欣彼西方發願往生不可緩也疏入如是勝會故當求生者上乃詳陳依正種種莊嚴故勸發願求生今出其所以中但云得與諸上善人同會一處不言得受種種妙樂唯舉正而不及依者以樂事非珍善友為珍大學云楚國無以為寶世人尚不寶珠玉而寶善人何況出世之教故舉正而不及依也鈔登龍者東漢李膺尚氣節孤高峻白少所交游人被其容接者以為登龍門云與瀛者唐太宗開宏文館以杜如晦等十八人為學士人羡其榮以為瀛洲之選大士求登蓮録者長蘆賾禪師建蓮社一夕夢一人烏巾白衣風貌清美揖而曰願入蓮社乞書一名賾問何名曰普慧又云家兄普賢亦乞書名覺而思華嚴有二菩薩名遂以為蓮録之首卜居猶擇里仁者孔子云里仁為美擇不處仁焉得知疏萬善同歸者恆沙性德不離真如是性善同歸也從性起修全修即性則修善亦同歸矣不達此理捨此惡聚趨彼善聚可謂棄真逐妄東西馳走也鈔矛盾者矛是鎗戈之屬盾干也排也昔人雙賣二物各歎其勝謂盾云矛刺不入謂矛能穿十重之盾智者謂曰我買汝矛還刺汝盾入與不入俱無詞矣而此經大旨下先破海東許靈芝又靈下次破靈芝與海東觀經三福為淨業正因者文云欲生彼國者當修三福一者孝養父母奉事師長慈心不殺修十善業二者受持三皈具足衆戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者此三種業是三世諸佛淨業正因還以持名為正行是取靈芝一半復以持名為發菩提心是取海東一半同歸執持名號則和會其義也善根者下是先釋善根引二經發菩提心者證菩提心為善根也發凡夫心者修五戒十善求生人道天中等是謂無善根者以十善等是三界有漏因果不出輪回故發聲聞心者厭四生如桎梏棄三界如牢獄求趨涅槃等是謂少善根者但念空無相無作三昧不肯莊嚴佛土教化衆生故福德者下是次釋福德引二經孝養父母修諸功德證福德也一切不作是謂無福德者所謂生不修福死歸苦趣也但作此福種有漏因是謂少福德者所謂修福不修慧福盡還沈淪是也善中善下是釋持名乃善中善發心菩提即是圓教五品位此所發之心即是隨喜心妙心體具如如意珠心佛及衆生是三無差別此心即空即假即中初心知此慶己慶人所謂於生死中發大菩提心也伏心菩提即是圓教初信至七信位以初信斷見惑從二信至七信斷思惑盡所謂斷諸煩惱降伏其心也明心菩提即是圓教十信滿心入初住位此位證一心三智以雙亡之力知寂滅相以雙照之力知種種相貌所謂了達諸法實相也出到菩提即是圓教初地至八地位以初地始得法忍光明至八地方名真得無生法忍為深行菩薩難可知無差別離一切相一切想一切執著一切聲聞辟支佛所不能及離諸喧諍寂滅現前所謂出三界到薩婆若也無上菩提是圓教妙覺位永別無明父母究竟登涅槃山頂以虗空為座成清淨法身居常寂光土為圓教佛相所謂坐道場成最正覺也又海東疏下引證菩提即善根阿彌陀即無上菩提者以阿彌陀佛即當人覺體也福中福者下釋持名乃福中福亦有二義者一約持名即修福義二約持名易集福義一名才舉萬德齊圓者如前云持名即持此一心一心之中常樂我淨義清涼不變義等何德不具耶以之修福福易集者即一心持名則萬善普會衆惡盡消以此無惡具善之心修福則衆福皆趨不勞功用故疏親能發起為因二句此約親疏釋因緣也親能發起為因如種子生芽覿體生起故曰親假之助發為緣如雨露生芽從傍助發故曰疏鈔不發正覺菩提乃至不得成佛者如經云以生滅心為本修因欲契如來不生滅果無有是處又經云不發菩提心勤修諸善根魔所攝持是有作之修多劫終成敗壞忘心體極一念頓契佛家故知菩提乃萬善之根本也然須一切福德助成者以有慧無福如鳥一翼如車一輪不能飛空致遠故須修一切福以助成之如起信論云了知自性本無慳貪隨順修行檀波羅蜜乃至了知自性本無愚癡隨順修行般若波羅蜜以福濟慧以事實理者有慧無福慧乃偏枯有理無事理惟空解枯慧不資妙性空解何益真修如前理事雙修依本智而求佛智然後名為大智也鈔孝養父母奉事師長敬上也慈心不殺接下也修十善業身除三邪口離四過意斷三惡也此共凡夫行三皈者佛法僧也具足衆戒者道俗備受微細不犯威儀者三千悉皆不缺也此共二乘行發菩提心者依無作境起無緣誓名發菩提心實相不二而二立因果殊二而不二始終理一信此因果方名為深讀誦大乘修三智解運圓乘行以此解行教其行者名為勸進此大乘不共行業也云何發菩提心而與上二同為福者謂發菩提心既是善根則觀經前二應名為福第三發心何亦名福耶今明福有事理下以福有人天小果有漏有為之事福有稱性無漏無為之理福今菩提心正是般若經中不住相如虗空不可思議之福非有為事相之福故無礙也然今疏下又問云既菩提心是如虗空之理福今經不判歸福德而判歸善根者何也良以善之與福可分可合分則菩提偏屬善根合則菩提亦可云福故鈔以是善根入涅槃界不可窮盡者以稱名善根不與一切有為相應乃增長無為隨順無為之善根也故入涅槃不可窮盡譬如有人食少金剛終竟不消要當穿骨而出稱名功德直至涅槃亦復如是修習無量最勝善根者無量言其廣大最勝言其微妙以稱性之修一修一切修廣無涯畔妙不可測故願憶念無量無邊世界是橫遍一切處去來現在一切諸佛是豎遍一切時所謂一念一切念一切念一念也散心念佛是著實憶持著實體究未入一心者非如今人全不著意徒事唇舌也定意念佛是既得事一心而復於定心中念念憶持心心研究者若是理一心則是離念境界既已無意兼亦不止是定也一心信樂是信願二資持諷誦念是行資持而諷誦而念正用心之極所謂口與心聲聲相應心與佛步步不離也此不往生誰復往生一聲稱念其福勝彼者此一聲乃甚深之聲此一念乃最後之念所謂知聲相空呼響不實能稱所稱皆不可得也故云其福勝彼稱佛名號功德不可思議者正以稱名無能稱所稱不可思議故若稱名之心屬藏通別者便可思議矣聲音遘取牛乳也不以愛戀之心遂得往生者以愛戀之心是情識不是智慧故是但知取相不知妙理故是徒生好樂未起真行故疏單修圓頓不願往生者是宗門師德直明真性不帶纖塵佛來也殺魔來也殺念佛一聲嗽口三日者寧可謂之少善根者謂以持名為多善根則此等師德皆夙具般若靈根乃能爾也寧可謂之少善根耶雖悟一心尚餘後有者謂若悟而即證無生是真善根深厚任渠橫說豎說無所不可教渠往東往西真如說夢若未得無生而自負圓人鈍置淨土亦是善根淺鮮也哲老住京師四十年常坐不臥化後紙襖亦燒出舍利以不修西方生大富貴處青公即青草堂年九十餘感曾家女人送供即為其子後官至宰相覆轍者漢賈誼云前車既覆後車當戒鈔粗細無明猶未盡者細即根本粗即枝末圓人見與佛齊惑全未破以理雖頓悟乘悟併消事須漸除因次第盡故恆沙性德猶未悉備者德有性德修德性德本具修德修成今云性德未備以性從修也以全性起修全修成性修德未圓性德未備故除彼已登實報餘或未免人天者能斷無明證法身生實報土則超六道若不然者縱不墮惡趣亦墮人天焉無後有耶或問曰斷無明證法身菩薩生實報者迥超六道不必言矣生方便有餘者亦超三界不受輪回何但言除實報能免人天不言除方便亦免人天耶答此章問答單論圓人圓人斷無明者即生實報如未斷無明造至七信雖生方便所見之境與實報同不同藏通二教體析之人實生方便故略而不言也以善根不同者謂諸聲聞悉覺真諦未成就普賢行願故修習見佛自在善根者即憶念一切諸佛境界普見法門所謂於念念中悉能供養一切如來智波羅蜜念念中知一切佛不可思議大神通事智波羅蜜等今諸大聲聞本不修習故不見佛也疏自性出生一切法是善根義者根有出生義今四聖六凡色心依正從自性生以從理具起事造故自性富有一切是福德者福德有富有義今四聖六凡依正色心自性本具以彼事造由理具故鈔起大慈無損害心者謂於法界衆生與自性衆生咸欲與無上菩提覺法樂無上涅槃寂靜樂是無損害心起大悲無逼惱心者謂於有情世間及五陰世間皆欲拔境界逼迫之苦煩惱纏縛之苦是無逼惱心不惜身命樂守護者約理則備修德而圓性德約事則求半偈而捨全身自利則如善財不避火坑利他則如不輕甘受打擲捨離諸相者是念諸佛實相身即所謂色身非是佛音聲亦復然若見諸相非相即見如來也起隨念心者隨順也謂順理之念即天台所謂安住中道不為二邊所動名之為念也禮敬諸佛者所有盡法界虗空界十方三世一切諸佛我悉以清淨三業常修禮敬一一佛所皆現不可說微塵數身一一身遍禮不可說微塵數佛普皆回向者從初禮拜乃至隨順所有功德皆悉回向盡法界一切衆生願令常得安樂無諸病苦欲行惡法皆悉不成所修善業皆速成就亦以此十生彼國土者臨命終時唯此願王不相捨離於一切時引導其前一剎那中即得往生極樂世界鈔一聞佛名慈心喜悅五句以佛乃曠劫修慈為體故佛乃斷盡無明最清淨故佛乃迥出常流萬劫難聞故今聞佛名即生慈心乃至淚即出者耳聞佛名心契佛心如須達長者因聞佛字通身毛豎是也今人聞佛名泛爾尋常者不知佛義善根淺故寧受諸惡趣四句惡趣熱惱善趣清涼今寧受熱惱不欲清涼者以有聞佛不聞佛之得失而分損益故惡道聞佛如人涉坑坎險道得覩日月光明善趣不聞佛如人履平坦康莊不見日月之光故上該盛德菩薩下及悠悠凡夫者觀經疏云上品之人始從習種終至解行菩薩中品者從外凡十信以下下品即是今時悠悠凡夫釋云十住名習種性十行名性種性十回向名道種性此三十位總名解行是別教內凡十信即是外凡悠悠凡夫是名字人尚未伏惑修行不精進者疏念境者即所觀之理念法即能觀之智疏萬德成就淨土攝生者因修萬行果成萬德加以四十八願莊嚴淨土攝化衆生不同餘故依之修行者衆生未能了悟自心未得脫體無依必須依境發心趣向有地今依佛名如龍得水如虎靠山有所詣故鈔言名便周者以世間之名名無得物之功物無當名之實名實不能相稱今佛名者名外無實實外無名名實不二故言名便周或謂下難云三界唯心萬法唯識心外無境然則行人止應觀心何為觀境乎答云汝但知心外無境不知境外無心心者全境之心境者全心之境既無心外之境為心所照亦無境外之心能照於境心境一如也不獨心境一如亦復心境互發先借西方假想之境發我靈明妙心以我靈明妙心復發西方真境以境發心以心發境重重互發互顯喻如磨鏡愈磨愈淨愈淨愈磨也又互發者即妙宗所謂據乎心性觀彼依正依正可彰託彼依正觀於心性心性易發也直觀三道顯本性佛者三道即衆生惑業苦也本性乃三德祕藏即法身般若解脫衆生迷三德祕藏為惑業苦三道諸佛悟惑業苦三道為三德祕藏故圓頓行人不必離此三道別觀三德觀苦道即法身幻化空身即法身故觀惑道即般若貪嗔癡即諸佛不動智故觀業道即解脫身口所作即法性之大用故有三昧兼持呪者謂不能直觀本性者更以異方便助顯第一義如方等三昧兼持呪法華三昧兼誦經十六觀般舟三昧及與此經則兼念佛謂之兼者以理觀為正事行為助故或直顯下或問云直觀助顯功行不同證果之時得無深淺故云直觀助顯雖云不同直至成功無二無別方便多門歸元無二故況初學下謂所云助顯皆久修上士理觀精純但假事為助若初學凡夫障染濃厚理觀荒蕪全資彌陀勝境發我靈明妙心須於四字洪名全身著倒故知持名實為修行要術不可忽也疏聞斯受之者謂聞斯殊勝法門通身領荷直下承當勇往直前不為他岐所動受斯守之者謂領斯殊勝法門終身依附念念不離與生俱生不至中道而廢也鈔只消向一句彌陀著倒者古云南無阿彌陀佛宗門頭則公案等是也鈔若不委身二句謂若徹見念佛之妙則自然不惜形骸不顧身命少有愛戀之心則不能一心執持也古云假使筋斷骨枯我此工夫決不退轉又云假使熱鐵輪在我頂上旋終不以此苦退失菩提心一者歸投義下謂前皈命有投義今執持名號一心向往如鳥投林如客投主如游子伶仃唯有思歸一念此但事相精勤猶未明理即事一心二者歸元義謂執持名號還歸一心則背塵合覺返本還源念念還歸自心即名歸元此則不唯事行兼修理觀為理一心鈔非聞不知者此界衆生於六根中耳根偏利耳根聞聲意識了別方始得知故非說不聞者此土說法唯釋迦如來如來演說方始得聞故得無生慧二句引證非聞不知佛法無人說二句引證非說不聞鈔一行三昧者經云法界一相繫緣法界是名一行三昧論云謂一切諸佛法身與衆生身平等無二即名一行三昧欲入是三昧者應繫心一佛專稱名字也即是念中能見過去未來現在諸佛者盡知恆沙諸佛法界無差別相也諸佛法身與衆生心同體無二今但見衆生心不見佛法身者以未能離念故修一行三昧者念空真念獲自本心則諸佛法身於中顯現如鏡中像古云諸佛猶如淨明鏡我心亦似摩尼珠諸佛常來入我身我身遍入諸佛軀是也名必有相者名為能召相為所召既稱能召之名必有所召之體故名相不離一心者心為能現名相為所現既一心稱名得能現體所現名相無不攝故疏復有二義各分利鈍者一者從散入定義二者從定入散義從散入定則利者日少鈍者日多從定入散則利者日多鈍者日少鈔如來得菩提不係於日者經云衆生各自謂佛某日成道如來得菩提實不係於日以日者時也依色心分位假立無有自體故百法中時為二十四不相應行攝今如來得菩提坐斷三際何有於時時者皆衆生妄想分別也故經云一念普觀無量劫無去無來亦無住如是了知三世佛超諸方便成十力七廟者禮記云天子七廟三昭三穆與太祖之廟共為七利鈍二根各一至七者若從散至定則利根一日鈍或至七若從定歸散則鈍根一日利或至七利根者性敏下正是從散入定亦有利根經於下正是從定入散此兩段申明利鈍二根各一至七也鈔口誦而心不念者口誦佛名心馳萬境是為讀佛非念佛也以念從心故心雖念而念不一者雖心念佛淨穢交馳是雖念佛非一心也以一心者純淨故念雖一而有時不一者雖少時一心後復還亂所謂朝則勤而暮則怠一日暴之十日寒之是雖一心還復亂也以不亂在無間故皆非淨業之能事也疏事理雙備者如來以權實二智證真俗二諦之理凡說法時不離二諦依俗諦說法故有事依真諦說法故有理所依之諦真俗不二故一字一語事理雙備也信力成就者事一心人不修理觀唯憑信力如水清珠能清濁水古云清珠投於濁水濁水不得不清佛念投於散心散心不得不一屬定門攝者定有世出世與大小乘及事理諸禪定不同而要之定者無散之謂今念念相續無有二念則心不散亂故屬定攝然彼體究無間至如靜夜鐘聲澄潭月影若未得冷灰豆𪹼㘞地一聲亦屬定攝亦即是事一心而疏鈔專以事一屬憶念亦一往言耳未有慧故者以即就憶念無間念到連念脫落頓入無念即屬慧門古云只一直念去亦有悟日是也今工夫始成片段尚未契入本心故止屬定門也鈔以心緣歷字字分明者此是心念不同前口念而心不念也前句後句相續不斷乃至無第二念者此是一心念不同前心雖念而念不一也不為貪瞋煩惱之所雜亂此是一心不亂不同前念雖一而有時不一也又以心緣歷字字分明是一句不亂前句後句相續不斷是多句不亂不為貪瞋等雜亂是對境不亂也成具下引證不亂言定者四句定能伏妄慧能破妄伏則如石壓草如繩縛賊暫時不動根猶在故破則如鋤斬草如刀殺賊究竟不動以無根故疏能念所念更非二物者以所念者佛是即本覺之理能念者心是即始覺之智若能始本合一方了能所不二天台云諦觀名別其體不殊性三為諦修三為觀修性既融能所莫得是也離於四句唯是一心者謂離一切法差別之相以無虗妄心念故所謂真如自性非有相非無相非非有非無相非有無俱相依一切衆生以有妄心念念分別皆不相應故說為空若離妄心實無可空故無心無念空慧相應故屬慧門諸妄消亡故兼得定鈔能念心外無有佛為我所念者謂一念未生前佛在何所因心起念故佛境現前則所念之佛因能念之心而有若離能念之心亦無所念之佛則佛境從緣無有自性所念佛外無有心能念於佛者謂佛境未現之前心在何所因聞所念之佛乃引生能念之心則能念之心因所念之佛而有若離所念之佛亦無能念之心則心亦從緣無有自性智外無如者心者是智佛者是如心外無佛是智外無如也此乃奪境不奪人古云上園華已謝車馬尚駢填是也如外無智者既佛外無心是如外無智也此乃奪人不奪境古云是處有芳草滿城無故人是也非如非智故唯一心者智外無如以智奪如故非如如外無智以如奪智故非智互奪兩忘則非如非智故唯一心此人境雙奪古云雲散水流去寂然天地空又云人牛俱不見正是月明時是也若言其有五句謂能念之心因所念之佛而有則能念之心本體自空所念之佛因能念之心而有則所念之佛了不可得以心緣境從無自性故有非有也此為空觀若言其無五句謂因所念之佛引生能念之心則能念之心惺惺不昧因能念之心引生所念之佛則所念之佛歷歷分明以性空之處不礙緣生故無非無也此為假觀若言亦有亦無二句謂若雙執有無則正當本體自空了不可得時又靈靈不昧歷歷分明以有奪無也正當靈靈不昧歷歷分明時又本體自空了不可得以無奪有也互奪兩亡則有無雙泯此雙遮二邊之中道觀也若言非有非無二句謂若雙破有無則因本體自空了不可得故得靈靈不昧歷歷分明因無成有也因靈靈不昧歷歷分明故得本體自空了不可得因有成無也互成雙立則有無俱存此雙照二邊之中道觀也有無四句是病三觀是藥若四句既離則三觀亦絶此中有即俗諦無即真諦雙亦雙非即中道第一義諦舉一即三言三即一皆如境也故云般若如火聚四面不可入又云般若如清涼池四面皆可入也非有則常寂下九句結歸寂照難思斯則下總結上二能所情消即如智不二有無見盡即寂照難思見諦即三諦圓融理鈔如法華下謂觀像通二種一真佛二像佛也引法華證觀現在真佛引優填證觀現在像佛栴檀像者世尊成道後嘗往忉利天宮為母說法優填王欲覲佛而不可得乃請目連尊者帶三十二匠往彼天宮各說一相還來人間用栴檀香木刻世尊像觀瞻禮拜以我心目者觀經云其光相好及與化佛不可具說但當憶念令心眼見見此事者即見十方一切諸佛故名念佛三昧想彼如來者諸佛正遍知海從心想生心想佛時是心即是三十二相八十隨形好故當想彼如來所謂以法界心觀法界境生於法界依正色心也無生滅有空能所等相者對上三種念佛持名是生滅相經云諸行是無常念性元生滅故觀像是空有相對像則有離像是無故觀想是能所相有能觀之心所觀之境故又前三皆不離生滅有空能所等相又前三皆不離言說相名字相心緣相今實相之佛過去無始未來無終無生滅相一塵不立處萬法齊彰無空有相照體獨立絶諸對待無能所相又復言語道斷心行處滅詞喪慮亡離言說名字心緣等相是無相不相名為實相也我若欲見阿彌陀佛隨意即見是華嚴解脫長者所說以此證實相者以長者已能了知自性如影響夢幻所見諸佛皆由自心故經文云善男子我見如是等十方佛剎微塵數如來彼諸如來不來至此我不往彼我若欲見安樂世界阿彌陀如來隨意即見知一切佛及與我心悉皆如夢知一切佛猶如影像自心如水知一切佛所有色相及以自心悉皆如幻悉皆如響我如是知如是憶念所見諸佛皆由自心又以此證實相者以如實空方能不空如實不空方顯真空自非遠離諸相焉能隨意現相自非隨意現相莫顯遠離諸相也徹前徹後者理即事故徹前事即理故徹後理一心即實相者如上所言理一心者則能所情消有無見盡離生滅空有等相故即實相也豈得稱名便成實相者以稱名念佛念念起滅是生滅相念時則有不念則無是空有相能念是心所念是佛是能所相稱佛名號以心緣歷是言說名字心緣等相何言即實相耶答曰謂實相者非為滅除諸相而談實相即相無相名實相也治世語言皆與實相不違背者以證意實相則諸所說法無非實相故不相違背雖說俗事亦順正法也經云以是清淨意根乃至聞一偈一句通達無量無邊之義能演說一句一偈至於一月四月乃至一歲諸所說法隨其義趣皆與實相不相違背若說俗間經書治世語言資生業等皆順正法一稱南無佛皆已成佛道者以亂心稱佛是為最易而皆成佛道信乎道無難易顛沛造次無非妙法無非第一義也直謂觀佛法身者謂六十萬億那由他由旬之身是實報身名為尊特亦名勝應而特名法身者為成行人圓妙境也良以報應屬修法身是性若漸教說別起報應二修莊嚴法身一性若頓教詮報應二修全是性具法身一性舉體起修故得全性成修全修在性三身融妙指一即三也是知圓人修行無行不圓圓人對法無法不妙即一句彌陀當體即空即假即中當體即念自性天真之佛而念實無念是無生滅相寂照難思是無空有相如智不二是無能所相不可思議是無言說心緣等相名號何非實相也鈔般若智者即自在決定解力信眼清淨智光照耀普觀境界離一切障善巧觀察普眼明徹也此般若智通已證未證未證即是一心三觀已證即是一心三智三智是果三觀是因果在一心因豈前後因果不二方曰圓修故般若智通證未證也若以般若智專持佛名似屬未證何以故若已證一心三智則已入圓住別地已證無生不消更用求生恐亦不必專持矣今以般若智專持佛名者乃是別向及圓信以下更以異方便助顯第一義據乎妙心稱彼名號託彼名號發我妙心也妙心一發即三智實在一心中得一行三昧斯成就矣德雲比丘示念佛法門者初云我唯得此憶念一切諸佛境界智慧光明普見法門繼復示智光普照念佛門乃至第二十一住虗空念佛門德雲比丘下是先釋一行念佛又修念佛下是次釋一時念佛以如為境無境非佛者釋上觀其法身也法身即如如之理若以如如之理為所觀境則真如遍一切處遍一切處皆佛境也此則以般若智照法界境故云一行念佛先化次報次法者未達唯心依事識觀佛化身已達唯心依業識觀佛報身能斷無明次依般若觀佛法身今則一時而修不歷次第何者化身是用報身是智法身是理智外無如故報即法如外無智故法即報體外無用故法報即應用外無體故應即法報舉一即三言三即一故又一時而修者圓人不獨隨觀一身即是三身但趣舉一塵三身具足所謂此觀微妙即一而三即三而一一觀一切觀一切觀一觀非一非一切如此之觀攝一切觀也若觀彼佛真如法身者能觀即是一心三觀所觀即是三諦一境謂之觀彼佛者是託彼果佛圓明之體顯我衆生性德之佛也畢竟得生住正定者往生之人約有三位一如蓮華未開時信行未滿未名不退但以處無退緣故稱不退二信位滿足以去華開見佛入十住位得少分見法身住正定位也三者三賢位滿入初地以去證遍滿法身生無邊佛土如佛記龍樹菩薩等住初地生淨土等也此中畢竟等是後二位不以色念是不念相好之色不以四智十八法念是不念功德之心諸法自性空者以佛無別色心功德唯有如如理及如如智獨存故無所念是為念佛者華嚴云性空即是佛金剛云若見諸相非相即見如來佛以無境為境則念以無念為念也諦了自心名為觀佛者自心者即法身也諦了法身方為觀佛外求有相佛與我不相干不為境亂名為三昧者三昧之言正受也會境歸心無境可亂方名正定也一體不移名為心印者唯一真心充遍法界湛然常住方名心印不壞也疏雖云一心者前以一心為一行一時等若只以一對一便墮數矣然法身無為不墮諸數雖云一心實則一切諸心無不攝故鈔至誠心者至之言專誠之言實深心者佛果深高以心往求故曰深心亦從深理生亦從厚樂善根生雖有三義而不相捨求高深果須見深理欲契深理須厚樂善根此乃立行依理求果也回向發願心者以真如實念趣果善心二心功德善巧回向願生淨土速證法忍廣拔一切衆生苦惱起信三心者一者直心正念真如法故謂向理之心別無岐路此即二行之本二者深心樂集一切諸善行故謂修具萬德回向心源即自利行本三者大悲心欲拔一切衆苦故謂廣拔衆苦令得菩提即利他行本妙行雖廣三行皆收名殊理一者是以經論配合至誠心即起信正念真如不念真如豈名專實今此一心無虗妄即真無遷流即如即正念真如故深心即起信樂集一切善行以不集萬行豈名立行依理求果今此一心萬善同歸即樂集一切善行故回向發願即起信大悲拔苦如不拔苦衆生豈名回向發願今此一心頓圓物我即大悲拔苦故一清淨心者萬善皆空纖塵不立故直契真如心也二安清淨心者若一行不圓菩薩之心則不安隱安者滿足萬善故廣修萬行心也三樂清淨心者若一有情未度菩薩之心則不喜樂樂者廣度有情故此普度衆生心也垢無不盡者從來不與染法相應故又既入理一則見思塵沙無明無不盡故理無不具者本具恆沙功德故又既入理一則此一心中頓捨萬緣即布施乃至此一心中靈靈不昧即智慧等故慈無不攝者一心即無緣慈體廣攝有情故又既入理一自然不捨法界遍入塵勞故華嚴十種念佛者一寂靜念諸佛本來寂靜衆生心中喧雜何名念佛若能寂靜即是念佛二清淨念諸佛本來清淨衆生心污染何名念佛若能清淨即是念佛三不竭念四明徹念五離塵念六離種種塵念七離垢念八光耀念九可愛樂念十無障礙念諸佛本來塵塵涉入剎剎圓通衆生心中多障何名念佛若去其障礙即是念佛淨名八法者一饒益衆生而不望報二代一切衆生受諸苦惱所作功德盡以施之三等心衆生謙下無礙於諸菩薩視之如佛四所未聞經聞之無疑五不與聲聞而相違背六不嫉彼供不高己利而於其中調伏其心七常省己過不訟彼短八恆以一心求諸功德行無瘡疣生於淨土者瘡疣玉之瑕身之疵也如既益衆生菩薩之善行也苟或望報則瘡疣矣至求諸功德菩薩之善行也苟不一心則瘡疣矣修此八行去此八疵誠為清淨之行而得生淨土也我得憶念一切諸佛境界智慧光明普見法門者諸佛境界指所觀境言一切者橫遍豎窮故智慧光明指能觀之智普見法門即收前二以結其名謂以智慧觀諸佛境界即名普見也二十一念佛門者一智光普照二令一切衆生三令安住力四令安住法五照耀諸方六入不可見處七住於諸劫八住一切時九住一切剎十住一切世十一住一切境十二住寂滅十三住遠離十四住廣大十五住微細十六住莊嚴十七住能事十八住自在心十九住自業二十住神變二十一住虗空智光普照者常見一切諸佛國土種種宮殿悉嚴淨故住虗空者觀察如來所有身雲莊嚴法界虗空界故心外無境界者謂一心不亂即是諸佛境界心外別無佛境界故心外無智照者謂一心不亂即是智光普照悉皆嚴淨心外別無智光照故心外無虗空者謂一心不亂即是莊嚴法界及虗空界心外別無住虗空故鈔心想佛時是心作佛者觀經云汝等心想佛時是心即是三十二相八十隨形好是心作佛是心是佛今釋是心作佛者作有二義一淨心能感他方應佛故名是心作佛即疏文所謂佛本是無心淨故有也二三昧能成己之果佛故名是心作佛即疏文所謂亦因三昧心終成作佛也初作他佛次作己佛此約能感能成釋作也是心是佛者是亦二義一心即應佛故名是心是佛即疏文所謂向聞佛本是無心淨故有便謂條然有異故言即是應佛心外無佛也二心即果佛故名是心是佛即疏文所謂亦無佛之因也初是應佛二是果佛此約即應即果釋是也若論作是之義者即不思議三觀也何者以明心作佛故顯非性德自然有佛以明心是佛故顯非修德因緣成佛即是而作故全性成修則泯一切自然之性即作而是故全修即性則泯一切因緣之性若其然者何思不絶何議不忘既以作是絶乎思議復以作是顯於三觀以若破若立皆名為作空假二觀也不破不立名之為是中道觀也全是而作則三諦俱破三諦俱立名一空一切空名一假一切假也全作而是則於三諦俱非破非立名一中一切中也即中之空假名作能破三惑能立三法故感他佛三身圓應能成我心三身當果即空假之中名是則全惑即智全障即德故心是應佛心是果佛故知作是一心修者乃不思議三觀也由此一心終當作佛四句一心即不生滅因地心也由此因心終成果覺故始從信解終至行證等覺還源直至如來妙莊嚴海故名作也即此一心全體是佛四句一心即真如法性身也本無修證不涉程途全體是佛若言是因對果言因既無當果因是誰因若言是果對因言果既無前因果是誰果故名是也鈔修餘少善名散者以人天小果有漏之因是散心修善故名散善一心不亂名定者心緣一境無有異念故言定善一心復分定散者事一心者雖心緣一境猶屬識心所緣之境念念遷流能緣之心新新不住對前散心故名曰定對後理一猶名為散定善中散善也理一心者見諸法實相以不生滅心契真常之理本自不動本自寂滅定善中之定善也事一心者猶未離六識故為定中散理一心者則是常住真心故為定中定疏即菩薩念佛者以有凡夫念佛三昧二乘念佛三昧今是菩薩念佛三昧故鈔惟言正念實相者以不念有不念空不念二邊不念中道故今謂彼專下謂彼經並無信願往生等語者以正念實相專主理故此經有信願往生者兼事理故事一心則不相同若理一心正彼正念實相也蓋彼下釋疑恐疑云二經同一念佛三昧而有專理兼事之不同者何也蓋彼為能離念者以無念正入此為不能離念者以有念巧入離為因不同同歸無念究竟不別也鈔直指靈知者波羅提云在眼曰見在耳曰聞在手執捉在足運奔悟之則為佛性迷之則為精魂是也又荷澤云知之一字衆妙之門永嘉云不須知知但知而已等門庭施設不同者淨土法門有淨有穢有佛有生是約建立門禪宗法門則淨穢雙非生佛不立是約掃蕩門所證無兩心者彼一切盡掃者頓除妄想直顯靈知此一切建立者使成三昧亦悟靈知故古云參禪本為超生死念佛亦因脫死生但向一邊挨得入兩條門路不多爭傳法四句者初祖云吾本來茲土傳法度迷情一華開五葉結果自然成印心四卷者初祖付二祖曰吾有楞伽四卷亦付與汝即是如來心要法門令諸衆生開示悟入鈔紛然不齊者約善惡無記三性說以三性自體迥異故雜然競起者約八識緣境不同說以眼識緣色耳識緣聲賴耶緣根身器界故遡流窮源不出一心者始從清淨心中無明妄動轉成賴耶次從賴耶轉出前七心王既起心所隨行次第引生五十一種如從源出流也今遡流及源者則心所不離心王心王不起心所不生故心王不離妙心妙心不動心王不現故恆審思量者指七識也此識恆常審推思察量度第八見分為我故恆之與審於八識中四句分別一恆而非審謂第八識不執我無間斷故二審而非恆謂第六識以執我間斷故三非恆非審謂前五識不執我多間斷故四亦恆亦審謂第七識執我無斷故真妄和合者指賴耶也起信云不生不滅與生滅和合非一非異名為阿賴耶識釋曰不生不滅者是如來藏自性清淨心動作生滅不相離故故云和合非謂別有生滅來與真如合謂生滅之心心之生滅無二相故真如全體動故心與生滅非異而恆不變真性故心與生滅非一也念極而忘者忘謂人法雙亡是六識脫落而七識隨六識用事六識既脫則七識自然不行故恆審思量者其思寂焉忘極而化者化謂空空亦空是識陰盡罔象虗無顛倒妄想皆淨盡無餘故真妄和合者其妄消焉巨浪微波咸成止水者巨浪指前七識心心所楞伽云譬如巨海浪斯由猛風起洪波鼓冥壑無有斷絶時微波指第八識心心所楞嚴云如急流水望如恬靜流急不見非是無流濃雲薄霧盡作澄空者濃雲喻前七心心所以前七粗重障真重故薄霧喻第八心心所以第八微細障真輕故鈔若事一心下或問云此之至心或指事一心亦未可知焉知是理耶故云事一心雖亦滅罪如石壓草如冰夾魚冰泮則魚游石去則草長定力已過罪將復現理一心者一心既朗罪性皆空以般若智了知罪性不在內外中間故指理一心也十方衆生下五句明稱佛功勝唯一大乘一切諸法二句出其所以謂何故一稱佛時皆當作佛唯一大乘耶曰以一切諸法唯一相不二相一行不二行故唯一乘所謂二句轉釋一相習如是觀五句明利益一相即畢竟空相離一切諸相故名一相一門即法華中唯有一門而復狹小無生無滅即華嚴所謂一切法無生一切法無滅若能如是解諸佛常現前畢竟空相以破諸法畢竟淨盡名為畢竟又解畢竟名為終竟觀是終竟之法亦不可得則不執有究竟之法名為畢竟空故法華云乃至究竟涅槃常寂滅相終歸於空也五欲即五塵以能動人欲心故遂名欲五蓋即貪瞋癡睡眠掉悔此五能覆蓋真性障諸禪定故名曰蓋五根即信念進定慧禪定即百八三昧等法界初門云以是空慧照諸禪定種種法門無染無著則能出生諸菩薩百八三昧等歸命一心者南無即歸命佛即是心也一聞佛名聞字是心聞即若聞首題名字所得功德不可限量之聞又即心聞洞十方生於大因力之聞鈔一乘大道下四句謂華嚴一乘大道乃頓悟自心之大菩薩境界非樂生淨土菩薩境界以厭此穢土欣彼淨不達淨穢雙非知見不普故今謂下釋彼論意以論中知見不普是指得事一心者非指理一心者若得理一心妙悟自心有何穢之可厭淨之可欣耶此乃縱釋然雖下是奪釋平等法界無生可度者平等真法界佛不度衆生彌勒如衆生如一如無二如故常修淨土教化衆生者淨名經云雖知諸佛國及與衆生空而常修淨土教化於衆生正所謂一乘大道者平等法界無生可度真如界內不受一塵也常修淨土教化衆生佛事門頭不捨一法也事理圓融權實不二一乘大道也普賢菩薩為華嚴長子者他經皆首文殊以重智故此經獨首普賢以宗法界行故鈔不可以仁之難熟者孟子云五穀者種之美者也苟為不熟不如稊稗夫仁亦在乎熟之而已矣疏又此四字若離合釋之者相非即是離相即即是合相非故名不亂是以離釋之相即故名一心是以合釋之一心自一心不亂自不亂故不妨離釋一心即不亂不亂即一心故不妨合釋鈔相即下十一句釋相即名一心即有而無者緣起即性空故即無而有者性空即緣起故二邊叵得二句互奪兩亡緣起性空既俱不可得則非緣起性空之中道亦不存故三德渾然不可分別者有即萬法齊彰屬解脫德無即一塵不立屬般若德中即空有難思屬法身德即有而無解脫即般若即無而有般若即解脫二邊叵得般若解脫即法身中亦不存法身即般若解脫舉一即三言三即一如天王三目伊字三點三德渾然故名一心相非下十四句釋相非故名不亂假非是空緣起非性空空非是假性空非緣起中非假空中道非緣起性空空非是假則能所雙亡成般若德假非是空則能所雙立成解脫德中非假空則雙照雙遮成法身德般若非法身解脫解脫非般若法身法身非解脫般若三德歷然故名不亂又渾然即歷然歷然即渾然一心即不亂不亂即一心也鈔如小教下正明五教一心小教以由心造業等者小教不知八識由六識造善惡業感三界六道苦樂等境故曰一心此假名一心非真一心也以不達唯心之理心外實有前境故始教以賴耶所變為一心者始教知有八識但不即真如以真如凝然不變不隨緣故乃生滅八識含漏無漏種所變現也如云無始時來界一切法等依由以有諸趣及涅槃證得等此以生滅八識為一心終教以如來藏為一心者終教達八識即真如隨緣為阿賴耶識識如夢幻唯一真如此以如來藏為一心頓教以染淨俱泯為一心者染即六識及生滅八識等淨即如來藏以終教歸如來藏雖云至淨以見有如來藏在猶未離念故此則五法三自性皆空八識二無我俱遣一念不生方為一心圓教總該萬有為一心者前四教則前淺後深互不相攝今圓教則周遍含容重重無盡隨舉一塵全彰法界總該萬有為一心也天台四教例此者小即藏教始即通教終即別教圓即圓教頓即天台之離言四教疏具有此意者謂雖無事理之文而意則具足也鈔專念阿彌佛即得往生者論文云如修多羅說若人專念西方極樂世界阿彌陀佛所修善根回向願求生彼世界即得往生常見佛故終無有退若念真如法身者論文云若觀彼佛真如法身常勤修習畢竟得生住正定故雖念亦無能念可念者論文云若知一切法雖說無有能說可說雖念亦無能念可念是名隨順若離於念名為得入疏顯密二義者言教直詮真性開悟衆生普願人人解了無有隱覆曰顯呪語如王密詔唯佛能知諸大菩薩不能曉了但許精持不通解路曰密鈔自疑理性不明所為無益者此專事者疑不明理而阻其事也大勢至下正引事得通理以決疑也不假方便自得心開者方便即觀心究理等今謂若衆生心憶佛念佛現前當來必定見佛不假觀心究理之方便始得心開直下念去念至念極心空自得開悟也自疑稱佛名少或致落空者此專理者疑稱名少而阻其理念念理一下正以理通事而決疑也念念理一念念彌陀者所謂念空真念處處彌陀說法時時蓮蕊化生也故曰其為稱名不亦大乎攝心體心四句攝心即事持事得通理攝心即體心體心即理持理得通事體心即攝心疏隨機不定者根稍鈍人事尚未能奚能究理且先勤事攝心既定然後觀心究理不然妄識紛飛徒勞分別何益之有若根性大利人般若緣深法身機熟莫勤事行直究唯心直捷根源不勞摘葉尋枝故問前云執理而迷事比貧士獲豪家之券又云約理無可念約事則無可念中吾固念之以念即無念故今云徑就理持不勤事行豈非墮前所斥耶答云前之所斥乃執理而迷事耽著頑空不信念佛者今徑就理持是即念返觀正深求淨土不撥事行者故不墮前咎疏二十一字者專持名號以稱名故衆罪消滅即是多善根福德因緣疏自性非憶非忘下憶者對忘而言有憶有忘非真執持直須兩頭撒開中間坐斷乃真執持今者對昨而言有昨有今非真七日直須劫日雙消掃空三際乃真七日若對多名一一則彌多何名一心迥超數量直契無為是名一心若對亂名定定則彌亂何名不亂諦了自心頓超動寂方名不亂鈔本無生滅下生則有憶滅則有忘自性本無生滅何有憶忘過去為昨現在為今自性體絶去來誰成今昨自性一亦不為一為墮諸數故則多尚奚存自性定且無定形有物凝然故則亂將安寄如斯會得終日念佛終日念心以心外無佛佛外無心即佛即心即心即佛心佛無有二故終日念心終日無念者以即佛即心則非佛即心即佛則非心互奪兩亡能所雙消故如是念佛名為真念佛念佛之理豈沾沾事行耶
