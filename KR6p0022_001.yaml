body:
  text: 雲棲古德法師演義門人慈帆智願定本題義開卷佛說等八字是法題後學等十二字是人題法題下自細釋今入文之先理應略陳總一題中約有四對一通別一對通則經之一字別則佛說等五字二能所一對能是能詮即經之一字所即所詮即上五字三教理一對佛說經是教阿彌陀即是理四人法一對佛說即是人阿彌陀即是法首佛字即釋迦牟尼佛從兜率降生王宮為悉達太子出家苦行六年成等正覺者若釋其義則佛字是梵語此翻覺者謂覺了性相之者具有三義一自覺覺知自心本無生滅二覺他覺一切法無不是如三覺滿二覺理圓稱之為滿若準起信亦彰三義一始覺即能證智二本覺即所證理三究竟覺即智與理冥始本不二今經所云佛者乃是三覺俱圓釋迦世尊也又佛地論說佛有其十義天台六即華嚴十身詳具後文說者以宣演得名暢悅為義四無礙辯為體暢則暢出世之本懷悅則悅眾生之獲益今以如來久修久證念佛三昧蘊之在懷適得機宜隨以四辨宣演暢悅本懷令隨機獲益故云說也阿彌陀是梵語此云無量以功德智慧身相光明一切皆悉無量故是無量佛往昔因中為法藏比丘時發四十八願今在西方攝念佛人歸于淨土故釋迦如來為眾宣揚也經者釋有多種不出常法貫攝四義常者三世不易一切諸佛皆如是說故云常法者十界同軌四聖六凡由之解脫故云法貫者貫穿所應知義若無文字無以貫穿義理煥然可觀故云貫攝者攝持一切眾生若無語言不能開曉眾生出生死海故云攝千葉良規百靈常軌詮真利物目為經也又此經唐譯為稱讚淨土佛攝受經今為此名者以佛名人所樂聞又一切功德言佛便周故疏者疎也通也謂經中義理甚深微妙未易窺測故以疏疎通使無疑滯也又亦疏理之義古云人有髮兮旦旦疏理身有心兮胡不如是今乃疏理經中奧理使人得開通心地也鈔者抄略也隨順本疏略加解釋使經疏妙義渙然冰釋也卷者卷懷之義一軸之中包含無盡義理無量法門故人題中學者效也後覺者必效先覺之所為故古人有大徹之後乃終身居學地者今大師自稱後學亦此意也古杭古稱杭州南宋建都更名臨安今曰杭州復古也雲捿寺名在五雲山之麓先是山之巔有五色瑞雲盤旋其上因以名山已而五雲飛集山西隖中經久不散時人異之號為雲棲隖宋時有志逢禪師建寺號曰雲棲寺歲久蕪廢大師愛其岑寂趺坐其間時人為之搆室寺復興焉沙門此云勤息勤修戒定慧息滅貪瞋癡也有勝道說道活道汙道四種不同勝即佛菩薩等說謂說正法者活謂修善品者汙謂諸邪行者袾宏是法諱號蓮池仁和人從性天和尚祝髮徧參知識於笑巖處有所契入遂結茅深谷主張淨土僧臘五旬世壽八十化緣既畢念佛而逝述者傳述也樂記云知禮樂之情能作識禮樂之文能述作者謂之聖述者謂之賢此經雖有古疏數家行世詞雖切而太簡理微露而不彰今茲疏鈔合天台賢首會性相二宗事理雙融宗說兼暢言先聖之欲言發前賢之未發可謂千古獨創今言述者乃謙詞也科分科中通序大意者含二義一通序一經大意以明性贊經二科發揮自性彌陀唯心淨土為修持之本然後依解起行執持名號求願往生其鈍根者單由事相專持名號亦得往生三根普被上下兼收作末法最後方便為一經大旨也二通序作疏大意以感時述意二科明此一經事理雙融性相通備時機執性執相各滯一邊至令廣大法門迷而不覺故竭思累載數易韋編作此疏鈔也開章者是別開章段即總啟十門是釋文者是消釋經文即別釋文義是大意雖明本文未委故別開章段銷釋經文使一經玄文委悉詳盡人人曉了也結釋呪意者呪本不可釋而呪意可釋呪意者拔業根生淨土也此呪本不附經而今歸結於此為之解釋者正顯此淨土法門顯密圓通事理無礙也又見此持名念佛是大神呪大明呪無上無等等呪也序正流通三分者晉道安法師判釋東流一代時教為序正流通三分序者端緒也如絲之得緒能盡一繭之絲經之得序能知一經之旨又序者東西牆也如觀牆序則知堂奧之淺深觀首序則明全經之妙義正宗者一經正所宗尚如法華之唯有一乘法無二亦無三楞嚴之發明常住真心專修圓照三昧此經之依正清淨信願往生是也前之序正序此後之流通正流通此也流者無住通者無塞使此妙法自此界以及他方由現在以及未來無有留礙名為流通為順者言剖出經心方挈出塵之端緒故通序順序分隨文入觀方知大道之攸歸故開章順正宗分拔業障根自然流入清淨海故結釋順流通分淨業者業居苦之先煩惱之後十法界不同皆由所作之業不同古云假使百千劫所作業不忘又云佛十力中業力甚深又云十方諸國土皆依業力生故業不可不淨信者不疑之謂於淨土妙理深信不疑行者趨造之謂於彌陀名號念念明了願者樂欲之謂於極樂世界心心向往此淨土三資糧也亦順者契其大端自能深忍故通序順信資善讀經者隨文入觀故開章順行資識所攸歸無不向慕故結釋順願資初明性者性即常住真心全體是極樂世界阿彌陀佛初明者恐人認阿彌陀佛在自性之外故古云若認他是佛自己却成魔又云求人不如求自己但以無始暗動障此靜明故託彼名號顯我自心耳然西方亦實有阿彌陀佛而即此西方佛亦不在自心外即事即理即理即事大師恐狂愚錯認故首明也二贊經者經即佛說阿彌陀經讚者以此經是一大藏中第一方便故是十方諸佛同所贊歎故以四字名號普接三根直通五教故以依經執持能顯自性於一生中可從博地直登十地故三感時者時即今末法之時感者以時丁末法根多淺薄法門中人非愚即狂故微妙法門或攘臂排為小教或大笑斥作權乘又或終日唯動數珠或窮年但數黃荳大師婆心甚切能不為之傷心也四述意者意即大師作疏之意述陳也與前述字解稍異大師本意全在兼利欲發起眾生之真信故極論念佛之宏功爾蓋欲以一句彌陀徧引羣生出於苦海那容不饒舌耶五請加者加是三寶加被請者祈請也佛滅度後凡有著述皆皈三寶冥希加被良以自己一人心力有限而佛具無緣大慈能令精誠祈請者自得勝智故請加也通序靈明二句是純真非濁二句是絕妄靈明是照洞徹言此照體橫徧十方湛寂是寂常恒言此寂體豎窮三際即楞嚴所謂常住妙明不動周圓也修證即不無染污即不得故非濁一切浮塵相無非妙覺體故非清迷時似背而此本不屬迷故無背悟時似向而此本不屬悟故無向即圓覺所謂一切眾生本來成佛生死涅槃猶如昨夢也大哉是贊詞以非幻不滅故云真體見猶離見見不能及有何可思三世諸佛到此口挂壁上有何可議其唯者歸結之辭註此經以自性為宗者自性謂眾生性德之佛非自非他非因非果即是圓常大覺之體而此經所談行法正為顯此之覺體蓋以據乎心性稱彼名號名號可彰託彼名號觀于心性心性易發也又復經中一切依正皆彰我自心無量光即自性照無量壽即自性寂觀音即自性悲勢至即自性智聲聞即自性真菩薩即自性俗種種莊嚴即自性萬德萬行若一毫法從心外生則不名為大乘法也問全彰自性乃屬華嚴降此以還何得有此答華嚴乃諸經王諸經皆華嚴眷屬今經以華嚴性海為宗既宗華嚴何妨約性又諸經從法華開顯之後不論何經總皆𢆯妙皆可稱性故諸經不離自性者三乘十二分教教教皆歸妙性言言盡攝真如若離自性皆為魔境故靈覺者不同木石之無心虗空之頑冥明顯者體露堂堂無遮無障不得稱靈者日以陽明照晝月以清涼照夜雖有光明而不顯靈覺彼既不自顯人自不得稱也無緣而照勿慮而知謂之神解大地莫能識其端至聖猶未窮其頂謂之不測不照覆盆者以日月之光屬相不屬性故輝天地透金石者以心光徧乎法界一切諸法無非佛法故靡所不徹者若通與隔對是通還成隔非對隔說通之徹乃真徹也不染者從來不與染法相應不與諸塵作對不搖者萬古如如無有變異不得稱湛者大地雖常自寂然而土石諸山穢惡充滿不湛也如淨琉璃內外瑩徹謂之瑩淨寸絲不挂纖塵不立謂之無滓難逃壞劫者以三災到時劫火洞然須彌七金悉為灰燼故推之無始引之無終者以真如自體非前際生非後際滅畢竟常恒不斷不異故無恒不恒者恒外有不恒此恒亦非恒恒不恒二邊俱遣乃真恒也云有不受一塵者濁者有也具足諸法方謂之有今自性離一切法差別之相所謂非有相非無相非雙亦相非雙非相非一相非異相非非一非異相非一異俱相是不立一塵非有也何濁之有云無不捨一法者清者無也不立一塵方謂之無今自性滿足一切功德所謂有大智慧光明義故徧照法界義故真實識知義故常樂我淨義故乃至滿足無有所少義故名為如來藏是不捨一法非無也何清之有捨此而有所去方可謂之背今則匪離跬步湧現寶華不出戶庭圍繞行樹雖欲縱之將去何所故無背迎之而有自來方可謂之向今則無行無住如是而來不動不起如是而來若欲迎之從何所迎故無向意該善惡凡聖等者孟子道性善天台說性惡一則就事造邊說一則就理具邊說今則如實空中善既不立惡亦何存祖云廓然無聖非聖也經云凡夫者即非凡夫非凡也有無如上性無前際非生也性無後際非滅也本自具足無法可增非增也本無一物無法可減非減也染淨千差非一也一味平等非異也以一切言說假名無實但隨妄念不可得故當體得名者常言大者對小之稱今則不然直指性體名之曰大具常徧二義者涅槃云所言大者名之為常此明體無變易又言大者其性廣博猶若虗空此明體性周徧無法可比者世間最大莫若虗空經云迷妄有虗空空乃有始此法無始又云一人發真歸元十方虗空悉皆消殞空乃有終此法無終是豎窮無法可比也又云十方虗空生汝心內猶如片雲點太清裏空乃有際此法無際是橫徧無法可比也喻金喻月亦復如是無可比也三界虗偽唯此真實者虗者不實如空中華本無所有偽者不真如鍮似金畢竟非金所謂太山有崩裂大海有枯竭一切榮華皆有衰謝一切眷屬皆有別離也唯有真如諸法中實所謂有物先天地無形本寂寥能為萬象主不逐四時彫是也非幻不滅出圓覺經經云幻身滅故幻心亦滅幻心滅故幻塵亦滅幻塵滅故幻滅亦滅幻滅滅故非幻不滅蓋謂此性無有變異畢竟常住不同諸幻終消滅也不可破壞出起信論論云從本以來離諸名相畢竟平等不可破壞蓋謂此性在染不破法身不壞不同有為可破壞也萬法不出一心之體者謂一切萬法皆吾心體非離萬法別有心體起信云心真如者即是一法界大總相法門體楞嚴云此見及緣元是菩提妙淨明體又云一切浮塵諸幻化相其性真為妙覺明體所謂撲落非他物縱橫不是塵山河及大地全露法王身也體該相用名之為體者起信云一者體大謂一切法真如平等不增減故二者相大謂如來藏具足無量性功德故三者用大能生一切世間出世間善因果故今則若相若用俱歸此體為真體也不可思議者下是先合解心言路絕謂從本以來離言說相離心緣相一切法不可說不可念名為真如故不可思者下是次分解法無相想謂有相可思無相難思汝暫舉心塵勞先起是思之有過也思亦徒勞是思之無功也心欲緣而慮亡者舉心欲緣思慮先亡以真如無相想即心絕故理圓者理性圓融不可分析如一多交徹大小互融真妄交參染淨不二等言偏者如言一則遺多言大則失小談真則違俗說染則違淨等所謂開口成雙橛揚眉落二三也是言之有過也言不能盡是言之無功也口欲談而詞喪者開口欲談言謂先喪以至理絕言無容措口故如善天女者華嚴云自在天王有天采女名曰善口於其口中出一音聲則與百千種樂而共相應等至理極名者如名真如則可以不妄不變思議或名圓覺則可以滿足虗靈思議或名佛性則可以離過絕非思議皆非至理極名今名不可思議則至理之極名無以加也法性佛性者智度論云佛名曰覺法名不覺是乃以智為佛以理為法賢首據此故云無情無知覺指其性為法性有情有知覺指其性為佛性然二性雖分屬情與無情法性亦可通有情以眾生乃諸法中之一法故故曰兼無情分中謂之法性佛性唯局有情不通無情以木石等無知覺故故曰獨有情分中謂之佛性且指佛性而言者自性實通二種如華嚴云若人欲識真空理心內真如還徧外情與無情同一體處處皆同真法界今云爾者但以此經重一心念佛求願往生乃借彼佛境顯我自心故且指有情佛性也性而曰自自有二義一自然之自二自己之自法爾如然非作得者妙性天然不因修得迷時無失悟時無得有物渾成本自如如故此自然之自也是我自己非屬他者以外道或計自然或計因緣或計虗空或計天與不一而足此皆迷己為物所轉不知此性本非天降不屬地生亦非人與乃當人自己不屬於他故此自己之自也對萬法曰本心對始覺曰本覺無知之知謂真知無識之識謂真識無有虗妄無有變異名為真如若就當經下是解釋序文已竟下復配屬諸經今先就當經配光壽也絕待交融者光與壽似對待法而其實舉光則融壽舉壽則融光原非二物有何對待一切功德謂無漏性功德無量者具足圓滿不可思議也而以此句當非濁非清二句者以但有清濁向背即有對待不融通便不是性功德便非無量今無清濁向背是一切功德皆無量也全體是當人者謂梵語阿彌陀此云無量壽無量光而自性寂即是無量壽自性照即是無量光寂照不二即是光壽交融則阿彌陀佛豈不即是當人自性又初句明無下配三大也用大者謂眾生心具有無邊妙用論云三者用大能生一切世間出世間善因果故今此靈明無所不照即是能生一切世出世善因果也相大者謂眾生心具有如來智慧德相論云二者相大謂如來藏具足無量性功德故今此湛寂無所不含即是具足無量性功德也體大者謂眾生心是一法界大總相法門體論云一者體大謂一切法真如平等不增減故今此靈心絕待迥絕二邊即是不增不減一味平等也即三即一雙泯雙存者體非相用乃至用非體相即三也而又離體無相用離相無體用等即一也一即三則一泯三即一則三泯雙泯也而又一即三則三存三即一則一存雙存也存時即泯泯時即存非泯非存不可思議又初句言照下配三德智慧光明徧照法界名為般若離一切染得大自在名為解脫心體離念法界一相名為法身是三種皆具常樂我淨四德故皆云德然有果上修成三德因中性具三德今指因中性具而言也又以四法界下配四法界法者軌則也界有性分二義事法界界字是分義以眾生色心等法一一差別各有分劑故理法界界字是性義以眾生色心等法雖有差別同一體性故事理無礙法界者理由事顯事得理成理事互融性分交徹故事事無礙法界者一切分齊事法稱性融通一多相即大小互融重重無盡故不可思議配事事無礙者以前三法界同教一乘猶可思議後一唯華嚴別教一乘不可思議也分攝於圓者或曰事事無礙唯屬華嚴今經何得有此故曰一大時教唯華嚴為圓圓為能攝一切故諸經無不攝歸華嚴今此經有少分事事無礙故得分攝於圓也然通序大意先明性者一切法門全歸自性千經所演無有餘因今此念佛往生必先明自性彌陀為本然後一心稱名求願往生必於寶剎速證無生直入聖階度生亦廣所謂先悟毗盧法界後修普賢行門也設使不明性體罔意造修縱得往生祗成末品先明自性意在斯乎序澄濁二句先敘工夫三祇二句次贊超勝澄濁而清者以佛名號投于亂心亂心不得不淨如水清珠投于濁水濁水不得不清也返背而向者一向流落他鄉不思故國今則迴神寶剎將覲慈尊也一念是智片言是境越僧祇謂智超勝齊諸聖是境妙圓僧祇者無數劫也問三祇行滿即坐道場成正覺今念佛者縱得往生尚未得佛何乃便越三祇耶答今三祇是約信解以三昧功成之人雖功行未滿而法身已明三祇極果以解了故亦可言超也此約解言不論功行又越僧祇是實語不必但約解說以三祇行滿方得成佛此是藏教果頭佛今經是圓頓教但得上生即登初地而果頭佛上與圓教七信齊豈不是越僧祇于一念妙用有二在如來說經是利生之妙用以四字徧引眾生出於苦海豈非至妙在眾生持名是自利之妙用以四字直使初心登乎智地又豈非至妙註畢竟平等者論云一切諸法從本以來離諸名相畢竟平等唯是一心今寂照之體無有清濁向背正是等同一味唯一真如故云畢竟平等唯是一心也約生滅門者上明性一科是約真如門說今讚經是約生滅門說也論云依一心法有二種門一者心真如門二者心生滅門心真如者即是一法界大總相法門體心生滅者依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名為阿黎耶識云云此即生滅門也以不如實知不覺有其念者論云阿黎耶識有二種義一者覺義二者不覺義所言覺義者謂心體離念即是如來平等法身所言不覺義者謂不如實知真如法一故不覺心起而有其念今釋不知真如法一謂不了如理一味也得見心性心即常住名如實知即此不知即是根本無明心起有念即是業相論云依不覺故心動說名為業也然此雖動念而極微細緣起一相能所不分即當黎耶自體分也無明所覆失本流末者無明即根本無明即不如實知也覆謂覆葢真性本即真性末謂三細六麤既失本自流末渾亂真體者如楞嚴云譬如清水清潔本然有諸世人取彼土塵投於清水水亡清潔容貌汩然名之曰濁復使淨潔者楞嚴云如澄濁水貯於淨器靜深不動沙土自沈清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明無明所引等此無明亦即根本無明覺即本覺塵即三細六麤由無明生業相乃至造業受報是漸遠真如之覺隨逐境界之塵如窮子捨父逃逝故名曰背返其去路者謂不須別尋歸路即就路還家便得返身見父先破執取計名空其人執次破相續智相蕩其法執次破三細賴耶歸於覺體斯之謂向也修證即不無者南岳讓禪師參六祖祖問甚處來讓云嵩山祖云恁麼物恁麼來讓云說似一物即不中祖云還假修證否云修證即不無染污即不得今謂且就眾生一期修證似有澄返之蹟修證即不無也而於自性實無得失增損染污即不得也不退有四以未斷煩惱生同居土為願不退破見思生方便土為行不退破塵沙分破無明生實報土為智不退破三惑盡生寂光土為位不退則不退名同而淺深自別力用力字內含三義一者本性功德力二者行人念力三者彌陀願力本性如舟船念力如櫓棹願力如順風三力周圓必登彼岸故三藏謂經律論又佛藏菩薩藏聲聞藏十二部謂修多羅重頌授記孤起無問自說因緣譬喻本事本生方廣未曾有論議用從體相而出者佛證平等真如恒沙性德然後流出報化之用演說此經是如來之用固從體相而出今眾生依經念佛頓超即證亦以本有真如本具性德方有如是力用故云從體相而出也稱性而談指華嚴正直而說指法華方便未彰者以華嚴唯談性海圓融緣起無礙相即相入帝網重重六相十玄四種法界等二乘賢聖尚如聾啞末法下凡豈能修證故方便未彰法華正直捨方便但說無上道開方便門示真實相開權顯實會三歸一皆不明示進修方便故亦方便未彰浩博難持如廣修萬行等幽深罔措如直悟一心等即方便成圓頓者稱彼名號方便法也上品上生即登初地豈非圓頓為通𢆯祕訣換骨神丹如後文所贊又前是下是總結兩節性德修德出天台教自性清淨離垢清淨出起信論性淨障盡出圓覺經互融一句總頂上三種互融不二者謂全性起修全修即性性外無修修外無性也又舊云性淨障盡互融不二者以全性起修時破全性之無明斷全性之生死終日本體終日工夫性淨即障盡也以全修即性時雖破無明破無所破雖斷生死斷無所斷終日工夫終日本體障盡即性淨也序故我世尊乍說三乘者故字承上妙用來我者親之之辭乍說三乘指華嚴之後法華以前四十年所說之法終歸一實者指法華經此經蕩化城之執教解草庵之滯情開方便之權門示真實之妙理故等頒珍賜者如諸子出宅等賜大車其車高廣眾寶莊校等更錫殊恩者殊恩言異常之恩因上有如是至妙之用故於一代時教中復出此經也註非究竟者隨宜之權非出世本懷也如經云我此九部法隨順眾生說入大乘為本以故說是經是也乘本無三者如經云十方佛土中唯有一乘法無二亦無三權說有三者如經云除佛方便說但以假名字引導於眾生始成正覺演大華嚴者謂如來於菩提場成等正覺與四十二位法身大士及宿世善根成熟天龍八部等如雲籠月為說圓滿修多羅菩薩萬行因華莊嚴一乘果海大教難投者如文殊普賢諸大菩薩各各領解得益其上德聲聞積行菩薩如聾如盲杜視絕聽於是如來脫舍那珍御之服著丈六弊垢之衣退歸鹿苑說四諦十二因緣六波羅蜜之三乘權法後乃會權歸實者阿含之後復經方等彈呵般若淘汰四十年餘至法華會上方能會歸一乘也權即三實即一大車謂大白牛車即大乘妙法也不論大根小根三句對上始成正覺演大華嚴說謂華嚴純接上根下根絕分今則上自不退菩薩下及悠悠凡夫三根普利故亦不待根熟四句對上大教難投五句說謂法華待根成熟方乃會歸今則不俟彈呵無煩淘汰即得西歸故不次之擢者言此土修行漸漸斷惑方出生死如授官者必循資格次第升授今念佛法門不必漸漸斷惑但得往生即超生死喻如不循次第頓授高官也蔭序之官者言此土修行功圓行滿方成聖果如得官者必明經中式或汗馬成功今念佛法門不必功行圓滿仗佛願力疾登彼岸喻如祖宗遣廕現膺爵祿也念佛恩中之殊者念佛之比其餘法門固為殊恩而念佛一門復有多種如觀像觀想實相等而觀像則像去還無因成間斷觀想則心麤境細妙觀難成實相則上智乃克承當中下未能領荷唯此持名至簡至易普攝諸根鶴沖鵬舉驥驟龍飛殊恩中之殊恩也序指四十八願門者法藏比丘於世自在王佛所發四十八願佛乃一一拈出指示眾生故曰指四十八者如國中無三惡道願乃至最後即得諸忍究竟願願曰門者門門不同此非彼故開一十六觀法者因韋提啟請乃為宣說今日始創故曰開一十六者始自落日懸鼓觀終至三輩往生觀觀曰法者各有法則修不一故歸乎普度者如四教四弘各有四種今則純是眾生無邊誓願度也普謂豎窮橫徧歸者謂雖有四十八種不同而要其所歸則無非普度也宗乎妙心者宗猶主也謂雖有一十六種不同而究其所主則無非妙心也妙心者謂十六觀中若依若正皆以法界心觀法界境生於法界依正色心也註悉是空假中道圓寂一心者觀法有二有事有理事觀者且如日觀行人面西正坐觀日欲落狀如懸鼓閉目開目日相現前名為事觀理觀者又二有次第一心次第三觀者先觀此日由想所成全體性空無有自性為空觀復有觀想因緣成此日相則不壞假相為假觀以此二觀為方便次觀假處全空空處全假非空非假為中觀是乃先空次假後中為次第三觀也一心三觀者所觀之境即真即俗即中能觀之觀即空即假即中以一心三觀觀三諦一境而境外無觀觀外無境境觀雙忘唯一妙心此即以具日之心觀於即心之日令本性日顯現其前為一心圓妙之觀法也序廣以廣多廣博為義廣多者如來性中本有妙用潛興密應無有窮盡廣博者此無盡願一一同於覺性無有分限大以豎窮橫徧為義豎窮者此願盡未來際無有休息橫徧者此願充滿十方無有邊際先有始義即行遠自邇之意又先有急義即先務之為急意貴在知先者由彌陀悟入法性從性起願性無盡故願亦無盡故知欲入彌陀願海必先悟徹自心不悟廣大之心不入廣大願海故深謂觀深妙玄謂理幽玄經中觀法乃以法界心觀法界境生於法界依正色心豈非深妙經中依正但應色一相可照三身依報一塵即寂光土豈不幽玄約者簡約也唯此四字更無別法何等簡易又約者要約也念佛功成無事不辦何等要約尤應守約者以十六妙觀乃全性成修全修成性悟心上士乃克行持初學行人無由湊泊故舉名兼眾德者由名召體體外無名體具眾德則名亦兼眾德故一稱名即稱佛眾德也專持統百行者以一心持名萬緣自捨即布施行一心持名三業自淨即持戒行等註幽顯聖凡者幽指三途顯指人天聖指三乘凡指六道茫無畔岸者以心無盡故願無盡也初心靡及者妙宗鈔云觀雖深妙本被初心若能進功何憂不就而大師如此說者葢有二義一者以今正建立持名法門故二者初心亦甚不同有具足圓解之初心乃至有茫然未識之初心故守約謂修身施博謂天下平但得見彌陀者永明四料簡云無禪無淨土鐵牀并鐵磨萬劫與千生沒個人依怙有禪有淨土猶如帶角虎現世為人師將來作佛祖有禪無淨土十人九錯路陰境若現前瞥爾隨他去無禪有淨土萬修萬人去但得見彌陀何愁不開悟先務之急者孟子云知者無不知也當務之為急堯舜之知而不徧物急先務也觀雖十六言佛便周者十六觀經題曰觀無量壽佛經者以十六觀法不出依正主伴佛是正報舉正足以攝依日地行樹寶池等無不攝故佛是化主舉主足以攝伴觀音勢至乃至九品往生無不攝故佛雖至極唯心即是者佛雖萬德果人實不離當人現今一念以心外覓佛即邪魔故至簡至易者一心執持至簡而不繁至易而不難此守約也萬法唯心者古云三界唯心萬法唯識又云應觀法界性一切唯心造心清淨故何事不辦者既得其本不愁其末也下文六句正釋此句之義運想宛然者謂三昧既成想行樹則行樹明想寶池則寶池現想菩薩則菩薩在前想如來則如來宛爾以三昧心中隨心現相故舉念便登者解脫長者言我欲見阿彌陀佛隨意即見是也此施博也大聖悲憐者天如云觀法理微眾生心雜雜心修觀觀想難成大聖悲憐直勸專持名號彌陀即是全體一心有二義一者阿彌陀佛即是全體一心以佛復本源究竟覺體故起信云離念相者等虗空界無所不徧法界一相即是如來平等法身夫法界一相是離念之心體也而即是如來則如來豈不是全體一心二者阿彌陀佛四字即是全體一心此四字在我心中明明歷歷迥然獨照四字之外無我心我心之外無四字豈不即是全體一心又復真念佛者唯色唯心唯觀唯境一名一字無非實相豈不即是全體一心心包眾德者以真如體中具足無漏性功德故此心不為三際遷流曰常不為二死逼迫曰樂具八自在我曰我離五住污染曰淨本來妙明曰本覺方始出纏曰始覺不妄不變曰真如離過絕非曰佛性諸佛所得之智曰菩提諸佛所證之理曰涅槃四諦者苦集滅道也苦為逼迫相集為招感相此世間因果也道為可修相滅為可證相此出世間因果也此四諦通大小乘有生滅無生無量無作四教不同然四諦是境非行今云行者舉所觀之境顯能觀之行也序萬慮咸休是妄心初息一心不亂是正念成就從茲承專持來究極根咸休來註念念塵勞者塵者不淨勞者不逸聚緣內搖趨外奔逸是其相也剎那中有九百生滅者剎那時極速也經云眾生一念有九十剎那一剎那中有九百生滅生住異滅者有為四相也生表此法先非有滅表此法後是無異表此法非凝然住表此法暫有用分齊頭數者此非彼曰分齊各有緒曰頭數甲滅乙生者約彼此說如貪滅瞋生等俄去倐返者約一法說如纔滅復現也獅子杲日喻正念百獸與霜喻萬慮出窟潛蹤者獅子出窟時四足踞地振尾出聲水性之屬潛沒深淵陸行之類藏竄孔穴飛者墮落諸大香象奔走失糞名咸休也以上是正釋故永明以下是引證數息者數息觀也數出入息從一至十對治散亂法也此法通世間出世間禪如根本禪多由數息而入而六妙門亦先以數息為首請觀音亦必以數息為助也初心在緣曰覺細心觀察曰觀正是此人數息工夫但渠工夫既成更欲增進覺覺觀不休亦即是病遂借稱名為轉治也但字字分明亦是覺句句接續亦是觀云何即破覺觀葢是以毒攻毒用兵止兵毒盡兵消身心安樂耳又或此人徑就理持研究之極頓入無心三昧亦不可知此正是一個咸休樣子故取之以為驗也休之又休即所謂精進更精進放下又放下也源本是萬慮之源頭根本近言之即是融通妄想以為其本窮謂浮想消除於覺明心如去塵垢此即是事一心也遠言之則是罔象虗無顛倒妄想以為其本窮謂倐然隳裂圓明精心於中發化此即是理一心也事理一心皆為成就念佛三昧三昧者梵語此云正定亦云正受離邪名正離散名定以一心不亂不同凡夫之不定外道之邪定也不受諸受名為正受以一心不亂無一法當情名正受也序乃知下是明理一心境界匪離四句正說唯心淨土也處處兩句言觸處洞然珍禽兩句言一味平等細玩註中自見跬步湧華者謂心華燦發左右逢源清淨光明之體當處出生也又心包法界既妙悟一心即萬億剎外之蓮華亦不離寸步也戶庭繞樹者謂覺林增長道樹滋榮長養眾善之體隨處發現也又法界唯心既妙悟一心即萬億剎外之行樹亦不出戶庭也彌陀說法者鵲噪鴉鳴盡是深談般若溪光山色無非全露遮那也處處者即古人所謂熾然說無間歇也蓮華化生者從悟而迷是為胎藏受生從迷而悟是為蓮華化生也時時者即經中所謂常在於其中經行及坐臥也禽鳥指有情堂院指無情舉此二種見情與無情同成正覺也偕音並彩正是法平等無有高下處註既得四句明即此一心即是淨土何必四句明不必往生方成淨土然則四句顯唯心境界無差別相等同一味也故曰句總結印壞文成者涅槃二十七云譬如蠟印印泥印與泥合印滅文成以喻凡夫現在陰滅中有陰生今借此文以喻往生行人此土陰滅彼國陰生須知垂終自見坐金蓮身已是彼國生陰故也成論明極善極惡俱不經中陰如䂎矛離手也序念空真念者念即念佛之念真念即真如體念到極處和念脫落頓離念相謂之念空離念相者等虗空界法界一相即是平等法身故云真念生入無生者生即生死之生無生即無生忍生本無體以念為體起信云一切諸法唯依妄念而得住持今既念空所謂皮既不存毛將安附自然髑髏粉碎五陰消亡從有生悟入無生矣又生即念佛之心無生謂無生之理雖念性元生滅既由有念得入無念是從生滅頓入無生矣念佛念心者既到真念田地則其念佛已無能所能念心外無有佛為我所念所念佛外無有心能念於佛智外無如如外無智如智不二名念佛即是念心也生彼生此者既到無生田地則其淨土已無彼此遊神億剎實生乎自己心中孕質九蓮匪逃乎剎那際內彼即是此此即是彼彼此無分云生彼不離生此也心佛眾生一體者佛者果德之稱眾生穢惡之號心者靈明之體念佛未至一心心不是佛佛不是生判然不一今既念佛即是念心則反本還源不見生佛假名惟一妙明周徧法界以即佛之生念即心之佛無二相也中流兩岸不居者苦域是此岸樂是彼岸非苦非樂是中流念佛未至一心中流兩岸截然不同今既生彼不離生此則不見彼岸不見此岸并不見非彼非此之中流矣古云海藏多羅一葉舟不居兩岸不中流一篙撐出虗空外惹得春風笑點頭是也註念極而空約修邊說念體本空約性邊說無念之念是終日無念終日念佛也念實無念是終日念佛終日無念也又此二義亦乃相須由念極而空方知念體本空工夫不到不悟本體也又由念體本空方得念極而空本體不空縱念不空也達生體不可得者由心空故大地平沈虗空粉碎推求五陰色心了不可得也不生而生者如以不生為不生非真不生也生即不生是真不生故永嘉謂誰無念誰無生若實無生無不生等又生即念念生滅此生滅妄心本自虗妄無有實體故云體不可得達者悟心之本空也既悟心空則終日念佛終日無念生而不生也終日無念終日念佛不生而生也生而不生則生元不可得不生而生則不生亦不可得是真無生也故云以念佛心入無生忍三無有別者謂迷此法有眾生名悟此法有諸佛名此法諸法中實有心名然而迷悟本空中邊不立諸佛眾生及心皆假名也假名無實全體即真故三法相即無有差別二邊謂有無中道謂非有非無亦有亦無不著不安正是離四句處自心是佛是禪者自心覺照即是佛自心靜慮即是禪謗自本心者以淨土乃自心之淨土故是謗佛者以不離自心即是佛故是自謗其禪者以不離自心即是禪故序此則理之一心者以一心念佛有事有理上文所指乃理一心也全歸上智者以理一心無方所無形相不可湊泊無容擬議非宿具般若靈根單刀直入者鮮能悟入通乎事相者不悟自性彌陀唯心淨土但以妄念念佛離此生彼是則生佛宛然淨穢歷然以我之生求彼之佛厭此五濁欣彼樂與彼理性全無交涉此則鈍根所行也序守愚之輩者愚亦不能障道故云人一能之已百之等而過在守字乃高推聖境畫地自限之輩小慧之流者學般若菩薩須求大智慧小慧者狂慧也偏慧也非真慧也又此二人之病在執著兩字故經云眾生處處著引之令得出註事依理起者事不自事因理而事因自性彌陀故勸人念彌陀因唯心淨土故勸人生淨土理得事彰者理不自彰由事乃彰因念彌陀方顯自性彌陀因求淨土乃悟唯心淨土由是心是佛方乃是心作佛因是心作佛方顯自心是佛故數他寶者華嚴云如人數他寶自無半錢分等判然心不是佛者是口口談空步步行有喫得肉已飽求尋僧說禪者是故下伸正意約理無可念者以實相理中絕思絕議舉心即錯動念即乖故念即無念者以即事即理即念無念捨念而求無念是猶撥波求水滅器求金是斷滅見豁達空非無念本體也即本智求佛智者本智即本有之智不因修得不由學成本自具足者所謂本覺是也佛智由斷惑而顯修證而成出纏方得者即所謂始覺是也本智約理具佛智約事造也序相繼謂一字一字分明一句一句接續不虗入品者謂但能念念接續無有間斷則已能伏妄得少分淨可成末品又或此人夙有靈根即於此時頓明諦理隨其淺深或中或上俱不可知故曰不虗明謂於自本心忽然契合即所謂一發一切發也反受禍者謂若是修行人則墮邪外若凡夫外道則福盡受輪若口口談空步步行有者則徑墮三途無有休息故云受禍註著事而信不切者如今世人口念彌陀心馳五欲空談淨土繫念娑婆也成就淨身者謂三業毫無污染即所謂純清絕點一條白練也永明云求淨土者縱饒未明道眼也須成就淨身心實了明謂三智一心中得已登初地入無生忍於自本心有大開悟者不正之謂狂狂慧者雖有智慧非真慧也有從學問得者有從工夫得者有從邪師得者種種不同馳騁者大率謂十方諸佛一口吞盡何處更覓彌陀十方世界徹底掀翻何方別求淨土再說念佛求生早是鉢盂安柄頭上加頭也不明之謂頑頑虗者雖著空理非真空也如癡人口口談空凡夫四無色定外道無想以及非非想陰境空魔乃至圓虗無心種種不一耽著者大率堅守執著一向入空各各自謂成無上道也輕談謂形於口蔑視謂存於心不咎鈍人反抑利者謂著事鈍根不知理性應當呵責開其慧性破其愚蒙使由事入理可也何乃捨彼愚夫反抑利者葢以鈍人自知不如斤斤自守無驕無恃無過無非利者不然故抑之也畫虎弗就者馬援戒子云龍伯高敦厚周慎杜季良豪俠好義效伯高不得猶為謹敕之士所謂刻鵠不成尚類騖者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也序遂使垂手徒勤者彌陀慈父終日垂金色臂接引念佛眾生眾生不肯念佛是垂手徒勤彌陀終日望眾生求生淨土如慈母倚門望子眾生不肯念佛是倚門空望若約理觀者手表提攜之悲目表照了之智同體之悲不離眾生為垂手深淵自然之智徧在六趣為倚門望子徒勤空望是真如內熏無明而無明全不顧真如也今生多生一誤百誤者今生遇此殊勝法門如久客他鄉乍聞家信應當勇猛精進求願往生而乃悠悠揚揚漠然不顧豈非大誤又不唯今生之誤今生以及多生一誤而成百誤也古云狹路相逢如不薦者回要見定還難是也註凡厥有心定當作佛者圭峰云頃以道非常道諸行無常今知心是佛心定當作佛故佛教持名非教念他佛也乃念我自心非教成彼佛也乃成我自佛耳序末法對正像言正者證也以現量智證實相理初一千年有教行理果故曰正也像者似也以比量智依稀見道彷彿不真第二千年有教行理而無果證故曰像也末法則空騰似量唯尚鬬爭徒有教理而無行果故曰末也四教各有內外凡若乃未通四教博地凡愚名下凡也陬者偏隅也窮極也此方在閻浮之極東故名震旦國大師一生自居學地不敢以先輩自處故稱晚學罔通玄理謂未能實契妙心空談即依通禪客文字學人聽其言也超賢聖之前稽其行也落凡庸之後素鄙謂平素自鄙註自量二字極佳聖之所以成聖賢之所以益賢也生之不時者不生正像去聖時遙也報之不勝者非聖賢應蹟是業繫凡夫也見之不廣者不生中華佛國親炙多賢廣其聞見也智之不深者非為耆師宿德久修道行智慧深遠也序斯經贊揚極樂勸生極樂故望樂國為家鄉斯經指示彌陀勸念彌陀故仰慈尊如怙恃千生流浪不知何處是我家鄉萬劫逃亡未識何人是我父母斯經指出敢不懸望而企仰耶註既揣鈍根者為人不可不自揣自揣若果利根則丈夫自有沖霄志不向如來行處行今既鈍根必須師古師古二字出尚書謂後覺者必效先覺之所為也寂滅淨土下實就理說但飄泊思歸亦可雙約事理寂滅淨土即常寂光土也此乃當人故鄉田地是安我法身立我慧命處捨離飄泊者迷自本心隨逐六塵也約事則是不願往生貪戀此土思歸一念是念念稱理而觀大事未明如喪考妣也約事則是常憶常念字字分明句句接續行住坐臥唯此一念無第二念也古云身雖未到蓮華土先送心歸極樂天又云西方勝友待多時收拾身心早歸去是也佛以大慈下雙約事理約事則四十八願廣度有情是接引眾生此方念佛彼土標名是懷我以聖胎水鳥樹林咸宣妙法是飼我以法乳佛慈加被身心精進不退菩提是荷其恩力而得成立也約理則自性彌陀念念不離是慈悲接引真如本覺內熏無明是懷我以聖胎復作境界之性引發現行是飼我以法乳折旋俯仰穿衣喫飯不離者箇是荷其恩力而得成立也古云野老負薪歸村婦連宵織看他家事忙且道憑誰力問翁翁不知問渠渠不識嗟哉今古人幾箇知恩德是也劬勞之德者詩云哀哀父母生我劬勞欲報之恩昊天罔極螟蛉異姓者詩云螟蛉有子蜾螺負之教誨爾子式穀似之懷慕終身者書云人少則慕父母知好色則慕少艾大孝終身慕父母左右無方者禮記檀弓篇云事親有隱而無犯左右就養無方定省不違者禮記曲禮上篇凡為人子者冬溫而夏清昏定而晨省此三句約理則念念迴光反照隨順真如約事則從生至老行住坐臥夙興夜寐一句彌陀無間斷也序心是大師普心道是佛法大道尟見其全者古來非無妙疏但於斷簡殘編略見一二尟見全文也數解僅行者惟海東疏越溪解大佑略解而已總收部類者此經與大彌陀經為同部與十六觀鼓音王後出彌陀偈經為同類部者部書其文雖不同而同一行門是一部書也類者流類為行雖不同而同歸淨土是一流類也一行者文殊般若會云何名一行三昧佛言法界一相繫緣法界是名一行三昧修是三昧者不取相貌繫心一佛專稱名字隨彼方所端身正向於一佛念念相續即一念中能見過去未來諸佛等會歸玄旨者以淨土一門會歸華嚴十玄妙旨如後分圓中所明貫穿諸門者以念佛一門貫穿一代時教諸行法門如後釋一心不亂處所明銷歸自己即如後文節節稱理之談是也迴向菩提即如下文同證寂光無上果是也註不可思議不出依正因果依則同居即寂光正則應化即法身因則七日便得功成果則一生便即不退何可思議肌膚在表所入不深者初祖欲返天竺命門人曰汝等盡言所得道付對曰如我所見不執文字不離文字而為道用祖曰汝得我皮尼總持曰我今所解如慶喜見阿閦佛國一見更不再見祖曰汝得我肉道育曰四大本空五陰非有而我見處無一法可得祖曰汝得吾骨最後慧可禮拜依位而立祖曰汝得我髓今言膚者謂所見甚淺也堯舜尚竭心思者書云堯舜之道不以仁政不能平治天下又曰既竭心思焉繼之以不忍人之政而仁覆天下矣性海為宗者華嚴四分五周六相十玄四種法界二十重華藏及無量香水海皆從一心流出故以性海為宗也世出世間不出心外者世間染法出世淨法染淨雖殊不離自心以離心無六道離心無三乘故淨土依正皆是本覺者依即寶池行樹等正即佛及菩薩三輩九品等如後文所明寶池即自性之汪洋沖融行樹即自性之出生眾善聲聞即自性真菩薩即自性俗佛即自性中等又復一念具足三千而三千中生陰二千為正國土一千屬依國土依正既居一心一心豈分能所故曰一一皆是器器唯金是全妄全真義流流入海是會妄歸真義無不從此法界流無不還歸此法界者法界謂一真法界即起信心真如門流有流出義謂從平等法界一念不覺流出三細六麤種種境界還有還轉義謂若離心念則無一切境界之相而一切境界全是妙明鬼神與通者管子云思之思之又重思之思之不得鬼神其將通之非鬼神之與通乃精誠之極也序偈中初八句是先皈命次八句是正請加初中又二初四句就本經三寶後四句指無盡三寶次中有三初二句先出請加所以中三句是正求加被後三句是迴向菩提娑婆此云堪忍佛具三緣慈名大慈此經聲聞眾中舍利為首菩薩眾中文殊為首故特標出二土句是橫徧一切處過去句是豎徧一切時如來清淨心者如來從實相般若流出文字般若故此經即是如來清淨心寂光無上果者四十一位法身大士皆證寂光而非無上唯妙覺一位乃為無上果也註歸投者如鳥投林如客投主如貧人投大家總攝六根者六根是別身命是總還歸一心者元依一精明分成六和合今返六和合還歸一精明也孺子封侯者陳平微時為里社分肉甚均社老稱孺子善宰平曰使平得宰天下亦如是肉矣孺子遂以此知名後魏無知薦於高帝封功臣時封陳平為曲逆侯平曰臣非魏無知無由得進帝曰若子可謂不背本矣臨終先供釋迦者劉遺民臨終見佛乃焚香謝云若非釋迦如來贊揚淨土焉有今日事拜謝已乃隨佛往生現生接引者不現身語冥冥加被精心陰速發彼神識也臨終接引者現身語意攝其神識歸於淨土也希有者如隋珠卞璞世所希有今佛則如優曇華時一現耳法則如來因中捨身而求半偈僧則天帝尚發願為末法比丘豈非以希有之故離垢者如美玉無瑕精金出鑛今佛破五住污染法稱離欲僧離世染也勢力者如錢可通神能使亡者續死者生勢力也今三寶能降伏諸魔制諸外道何等勢力莊嚴者如瓔珞嚴身七寶嚴土莊嚴也今三寶現微妙身成微妙土說微妙法化微妙眾何等莊嚴最勝者世間勝妙無過七寶今佛稱兩足尊法稱離欲尊僧稱眾中尊是最勝也不改者精金百煉愈新愈妙今佛則法身常住無有變異法則火不能焚水不能漂僧則逢魔不退遇難轉堅是不改也事理同別者住持三寶為事一體三寶為理佛不是法等為別又佛有三身四教法有教行理果僧有十聖三賢四果四向皆別也同體三寶為同內自約理外他約事著述皆皈三寶者示學有所宗不敢自用自專也用蠡測海者東方朔客難云以管窺天以蠡測海以挺撞鐘豈能通其條貫考其淺深發其音聲哉如來真淨土者上三土未為真而寂光乃為真然寂光亦有淨穢不同四十一位法身所居為穢土唯佛一人所居為淨土今曰如來真淨土則是常寂光淨土也名之為真者妙宗云諸佛如來所游居處真常究竟極為淨土是也寂照不二者謂寂而常照照而常寂即寂即照即照即寂名常寂光者常即法身寂即解脫光即般若是三點不縱橫並別名祕密藏諸佛住處無量甚深法性也圓滿大覺者離迷曰覺離小曰大離因曰圓滿更無過者天台云無上士者如十五夜月圓滿具足眾星中王最上最勝威德特尊更無過者是也一切種智者究盡諸法實相邊際智滿種覺頓圓也經云下是防伏難恐有人問纔得往生何乃便證無上果故云云也開章教起所因者聖人言不虗發動必有由非無因緣而宣斯典故首之以起教因緣佛教雖廣不出三藏十二部未委此經何所攝屬故受之以藏教等攝已知此經三藏之中修多羅攝五教之中屬終頓圓未知頓圓之義深淺廣狹故受之以義理深廣既知義理包博沖深未審此經被何根器故受之以所被階品已知此經被機普徧未知能詮何為體性故受之以能詮體性已知能詮之體如是該羅未審所宗尊崇何義故受之以宗趣旨歸已知此經旨趣沖玄未審當部等類為有幾種故受之以部類差別已知部類詳略同別未委譯自何時凡有幾譯以至註釋持誦有何靈驗故受之以譯釋誦持大旨既陳隨文解釋先明總題使知綱領故受之總釋名題總義雖知別文難曉從如是我聞至終為何等文是何等義使沈隱之義彰於翰墨故受之以別解文義也註五重玄義者乃能召之名所詮之體會體之宗宗所成用上四教相如天台教今賢首則有十門差別大同小異稍有詳略者此詳彼略也此中釋名即天台名此中能詮體性即天台體宗趣旨歸即天台宗所被階品即天台用餘五即天台教相也章先明總者總括一代時教也一大事因緣者非三非五為一稱體而周曰大出世儀則曰事眾生本具為因諸佛指示為緣開示悟入佛知見者三智圓顯曰佛知五眼圓明曰佛見諸佛知見眾生本具住行向地為開示悟入開者如開千年寶藏示者一一指陳悟者豁然曉了入者和身一倒也念佛心即最初事理二持之心入佛知見乃最後寂光無上果即此事理二持皆從有念而起念之既久根塵自空諸念自落若復精進不已和念佛之念亦復脫落頓入無心三昧自然五陰俱銷圓明發化如是乃超十信十住十行十迴向四加行心菩薩所行金剛十地等覺圓明入於如來妙莊嚴海圓滿菩提歸無所得是之謂入佛知見也註本欲度生成佛者法華云佛自住大乘如其所得法定慧力莊嚴以此度眾生若以小乘化乃至於一人我則墮慳貪此事為不可不得已權說三乘者法華云我所得智慧微妙最第一眾生諸根鈍云何而可度尋念過去佛所行方便力我今所得道亦應說三乘後至機熟會三歸一者法華云十方佛土中唯有一乘法無二亦無三除佛方便說唯此一事實餘二則非真終不以小乘濟度於眾生方酬本意者法華云我本立誓願欲令一切眾如我等無異如我昔所願今者已滿足種種法門淺深不一者如阿含保證方等彈呵般若淘汰等何須徧歷三乘者如前越三祇於一念齊諸聖於片言等章憫念末法者末法則去聖時遙聖賢隱伏邪法熾盛之時最可憫故出勝方便者眾生有恒沙煩惱佛說恒沙法門皆方便也唯此法門方便中之方便故曰勝方便激揚生死凡夫者凡夫出生入死曠劫沈淪不知生死可厭涅槃可欣如法華經云不識苦盡道不知求解脫故化導二乘者二乘但證徧空不悟法性沈空滯寂中止化城不信有他方淨土故勉進初心者初發心菩薩欲於娑婆世界救度眾生忍力未充自他俱溺有何利益必須求生淨土親見彌陀得忍方可還來故盡攝利鈍者教小則不被大根教大則下根絕分今則上自菩薩下及悠悠凡夫無機不接故護持多障者此土業風浩大塵境麤強難於修進今則念佛眾生佛常住頂永無魔事故的指有念心者有念即念佛之心無念即真如之體一切法門無非教人離念歸於真如今此法門不必捨念得入無念故實悟無生者法本無生眾生迷昧於無生中妄見生滅受大苦惱縱欲滅生歸無其生轉熾今乃巧示往生實悟無生故悟無生有二或於此土理一心成即悟無生或往生之後見佛聞法乃悟無生徑中之徑者念佛已是修行徑路而持名念佛但以四字洪名直登不退事不繁而功極大故為徑中之徑註念入無念者念體本空因妄故有今以妄息妄如以毒攻毒病愈體平妄窮真露故生得無生者生無有體以念為體念不空則生不空念空則生空故章為作津梁者津濟度處梁橋也以一句彌陀運此岸眾生置於彼岸是為作津梁也佛成道下雖文有三轉說大悲有三而正意重在末法觀題中末法二字可知註二萬歲時即入劫濁者以二萬歲前煩惱輕微邪見薄少人天眾盛三惡道稀壽命久長時猶未濁故釋迦出時人壽百歲者於住劫中今當第九轆轤小劫有四佛出劫初八萬歲減至六萬歲拘留孫佛出減至四萬歲拘那含佛出減至二萬歲迦葉佛出減至百歲釋迦佛出減至三十歲小三災即起至於十歲減之極也又過百年增一歲增至八萬四千歲金輪王出世增之極也過是以後第十小劫又過百年減一歲減至八萬歲時彌勒下生此後復有九百九十五佛相繼而出盡二十小劫滿大三災起壞世界也經道滅盡者始自首楞嚴經般舟三昧經終至十二分教悉皆滅盡獨留阿彌陀經住世百年最後方滅也法滅時袈裟自然變白藏經自然無字十六羅漢盡收世間一切經法貯於銅塔遶塔經行歎言釋迦法滅然後此塔沈至金剛際則世界法滅也滔天之際大夜方沈者喻眾生煩惱日深無明日厚古云癡雲靉靆性天昏識火交煎心鼎沸是也章入道多門者如楞嚴二十五人各說圓通方便淨名三十二士共談不二法門等不值佛世謂釋迦已過慈氏未來得常見佛有三義一臨終之際佛來接引二已生之後常見彌陀三禪觀之中得覩聖相不斷惑方便者如小乘必斷盡見思方出三界大乘人直至命根斷盡業識枯乾始出生死故云毫釐繫念三途業因瞥爾情生萬劫羈鎖今此念佛但能伏妄即得往生故不修餘行方便者如布施必須三輪空寂持戒則不缺不破乃至隨定具足方曰波羅蜜誠非易修也今茲念佛不出一心萬行具足故得疾解脫方便者依餘法修千生煉性百劫調心方得解脫禪門雖云一生了道亦乃多劫熏修如永嘉云吾早曾經多劫修不是等閒生誑惑是也今茲念佛但稱念彌陀疾登彼岸故註法門者軌生物解曰法聖智通游曰門道體幽𢆯者道無形相無方所不可湊泊無容擬議論語云仰之彌高鑽之彌堅瞻之在前忽焉在後是也從門始入者楞嚴云忽蒙天王賜與華屋要因門入論語云不得其門而入不見宗廟之美百官之富權巧接引令得入門者此門徧一切處頭頭可入法法堪歸古云處處綠楊堪繫馬家家有路透長安其如眾生不知處處逢渠頭頭錯過也崎嶇難行者如前浩博難持幽深罔措等紆迴難到者如僧祇積行曠劫勤修等韋提徧觀願生極樂者世尊從頂放光照十方界復收寶光結為金臺其中普現十方佛土令韋提徧觀韋提獨願生於極樂也真如三昧有正觀有方便正觀即法界一相一切諸法平等無二方便者謂推求五陰色之與心終不可得若能觀察知心無念即得隨順入真如門故二門止觀者止謂止一切境界相有離境除心二法觀謂分別因緣生滅相有法相大悲大願精進四行是法指修行五門謂一施二戒三忍四精進五止觀也初學是法者指不定聚眾生修信未滿者其心怯弱是內心既劣娑婆不常值佛是外缺勝緣故信行難成將欲退也信心有四種一者信根本所謂樂念真如法故二者信佛有無量功德常念親近供養恭敬發起善根願求一切智故三者信法有大利益常念修行諸波羅蜜故四者信僧能正修行自利利他常樂親近諸菩薩眾求學如實行故就者成就即信成就發心也論云信成就發心者發何等心略說三種一者直心正念真如法故二者深心樂習一切諸善行故三者大悲心欲拔一切眾生苦故難者謂修行信心經一萬劫方得成就故終無有退約有三種一如蓮花未開時信行未滿未名不退但以處無退緣故稱不退二信位滿足以去華開見佛入十住位得少分見法身住正定位也三者三賢位滿入初地以去證徧滿法身生無邊佛土如佛記龍樹等住初地生淨土也此經則七日二句是引本經為證而四段文中皆引本經為證者明分此四種非臆見也直至惑盡始得出離者思惑不盡不出三界塵沙不盡不出二乘界無明不盡不出菩薩界帶惑往生者觀經上上品生者斷無明惑中上品生者斷見思惑乃至中下品生者始斷見惑若下輩三品則全未斷惑但稍能伏妄成就淨身即生彼國故云帶惑往生也六度萬行有大小乘事理不同而理中又復深淺如天台四教所明不出一心萬行具足者此一心亦分事理若理一心具足萬行自不必說即事一心雖未入理而於藏教事六度事萬行亦可云具足也智論中罪即是障以罪能障道故復云障也此念佛乃得滅者彼佛有不思議威神力故不思議大願力故故此念阿彌陀即大般若如人從地倒還從地起也此疾得解脫之一證十住斷結經中死此生彼皆因欲故西方無欲故頓超生死此疾得解脫之二證起精進力聽此法門者聽法有三耳聽心聽及於神聽下士耳聽如風過耳中士心聽頗能解義上士神聽深悟實相今言精進聽法是不以緣心聽法以神聽也蟻山風水者蓮宗寶鑑云餘門學道如蟻子上於高山念佛往生似風帆揚於順水章激揚生死凡夫者生而死死而生萬劫千生無有窮已故名生死凡夫激者激勵令人起厭揚者鼓揚令人起忻沈迷自性者迷者昏迷沈者迷之極也自性即註中平等法門由最初一念無明生起六麤三細遂性心失真顛倒行事輪迴是中自取流轉也示苦樂兩土者謂樂之與苦域金寶之與泥沙胎獄之望華池棘林之比瓊樹誠由心分垢淨見兩土之升沈也開折攝二門者眾生耽戀娑婆佛則極言娑婆之苦以折伏之眾生罔知淨土佛則極言淨土之樂以攝受之是於念佛一法具折攝二門也勝心謂勇猛心精進心淨業所以不得成就皆由悠悠揚揚心不猛利耳果能一日用力發大勇猛發大精進工夫無不成就故云勝心既發淨業斯成註迷心逐境者不知心之本空從始洎終念念生滅是謂迷心不識境之本寂隨逐六塵對境造業是謂逐境田蛙井鮒者莊子云田蛙不可語於海者拘於𭏟也易經井卦爻辭云井谷射鮒於事何濟者謂若是大鵬金翅搏風九萬水激三千者可責以沖霄田蛙井鮒責之何益若是上根利智心遊域外足蹈大方者可教直悟自心生死凡夫教之何用得無生忍者無生指法性而言無少法生無少法滅故曰無生忍者指始覺智言以始覺智契法性理心中了了吐露不出如忍事人非懷非出名無生忍也章二乘執空者二乘人單修正觀者但念空無相無作兼修助觀者多由四空以入滅盡故皆執空又復聲聞人多於四諦中居滅已休更不前進成纏空種緣覺人多於覺明中即立涅槃而不前進生不化種故多執空不修淨土者自謂已得涅槃故又復厭離有為故乍得我空者空有四種一人空二法空三空空四空空亦空今但初得人空也即生耽滯者謂沈空滯寂墮無為坑飲三昧酒也淨佛國土教化眾生者淨名經云菩薩取於淨國皆為饒益諸眾生故寶積當知直心是菩薩淨土菩薩成佛時不諂眾生來生其國深心是菩薩淨土菩薩成佛時具足功德眾生來生其國乃至六度萬行等心不喜樂者向由著有故受輪迴今得人空輪迴乍息味著偏空涅槃之樂聞說菩薩廣行萬行淨土化生自然不生一念好樂之心也註但悟蘊中無我不知蘊亦是空者空有二一我空謂無我人眾生壽者此是二乘所證二法空謂無色受想行識此是菩薩所證今文蘊中無我是我空也蘊亦是空是法空也小乘觀身不淨觀受是苦觀心無常觀法無我故悟蘊中無我若照見五蘊皆空則是大菩薩境界故彼不知亦是空者以五陰法自性不生則無有滅本來涅槃故如諸下引華嚴為證古謂下引古語為證無他佛之說者小乘但知有釋迦不知十方諸佛此句影略大教有他方諸佛有剎海之談者如華藏世界品有十不可說佛剎微塵數世界種一一世界種有二十重無盡世界此句影略小乘唯知有娑婆諸佛菩薩具三緣悲四種智涅槃五行無作四宏故為廣大無盡心即境故不礙境境即心故不礙心楞嚴云見與見緣并所想相如虗空花本無所有故云本性自空一切諸法不出色心二種今眾生是色法度生是心法既一切自空豈非終日度生終日無度乃知二字直貫至終日無度中有兩節諸佛菩薩四句應上文淨土化生心不喜樂心不礙境六句應上文執境為有唯欲避境趨寂大率小乘病根只在但悟蘊中無我不知蘊亦是空兩句以但悟蘊中無我故唯知所證為極不復知有大乘妙用聞淨土化生自心不喜樂也今日回心乃知大乘妙用如是廣大如是無盡爾以不知蘊亦是空故不知一切浮塵幻化當處出生隨處滅盡遂執境為有唯欲避境趨寂也今日回心乃知本不相礙當體全空度而無度耳章初心菩薩有四教不同藏通兩教菩薩乃至別教初地以前圓教初住以前皆是何以故觀經上上品方登初地此初地者圓初住也則此初心菩薩是別圓地住以前皆是自可想見又復起信論十信位人懼信心難就當求生淨土及信心成就而為信成發心乃是三心圓發正是圓教初住則此初心菩薩是別圓地住以前皆是更可想見別圓既如此藏通益可知大心雖建者初發心菩薩上求佛果下化眾生不同二乘不求佛道不教眾生故勝忍未成者勝忍無生法忍也初心菩薩煩惱未除無明未破未證無生理故正定聚指極樂世界說以彼土人皆有定力不退轉故若論斷惑則信成就發心者方名入正定聚彼土唯上品上生者是也忍證無生句是倒語法以法忍有三種一者音響忍二者柔順忍三者無生忍今謂所證之忍乃是無生也且夫六心下謂若不求生淨土便欲苦海度生則有舍利等之覆轍可鑑也自足者初心菩薩必各有所得往往就所得處自生滿足即如圓人十信滿心尚有頂墮之病是知自足兩字是初心病根故此特為指出註註中三引智論文字自具縛凡夫至由此墮落為第一段是總證勉進全文之意自又喻二人救溺至如得船者為第二段是別證正文乘大願船二句自又云譬如嬰兒至救度眾生為第三段是別證正文弱羽纏枝二句具縛縛字是內為煩惱所縛聲色所縛縛字是外為六塵所縛未得忍力聲色所縛者得忍菩薩視色如盲聞聲如聾所謂百花叢裏過一物不沾裳龐公云但自無心於萬物何妨萬物常圍繞鐵牛不怕師子吼恰似木人看花鳥今不然也凡夫無力下當雙合二喻謂若離彌陀或墮三途坑井或渴法乳而亡又若近彌陀依淨土之樹枝成無生之翅翮方能飛三界之空自在無礙也已證六住者別教七住方名不退今止證第六故尚有退緣因逢乞眼者身子因中發大乘心因天帝化作婆羅門為之乞眼身子與之婆羅門即棄地踐踏由是退失大心覩相獲益者華嚴云大威光太子覩波羅蜜善眼如來成正覺獲十種益首自念佛三昧名無邊海藏門終至得智光明名一切佛法清淨藏以世人觀德人之容尚能意消況見佛妙相甯不得益也良由下是明以念佛為父葢有二義一方便義二親種義方便者淨名云智度菩薩母方便以為父而今即以妙心緣歷名號正是最勝方便故為父也親種者親傳真種而今即念彼佛成我自佛即念本佛成今始佛正是親傳真種故為父也即真涉事者念體本空則念處即真不妨念佛則不礙涉事即真而不涉事是理非方便涉事而不即真是有為之法與無為隔亦非方便今即真而復涉於事是名方便也又復真謂真理事謂念佛即真涉事者謂雖即觀理而歷念佛事也此於附法託事從行三種觀中正是從行歷事觀理也能以清淨妙行莊嚴佛土者知空不著空是名為真空淨名云雖知諸佛國及與眾生空而常修淨土教化於眾生此證七地念佛往生也了知佛法皆唯心量者悟一切法皆自心現量也得隨順忍者唯心妙理隨順忍可此三賢位比觀相應或入初地則現觀相應矣龍樹初地往生者佛云南天竺國中大名德比丘厥號為龍樹能破有無宗世間中顯我無上大乘法得初歡喜地往生安樂剎摩差末得忍往生者菩薩生地經云時摩差末得不起法忍五百清信士女皆得不退轉地壽終俱生無量壽佛國已上證三賢初地往生也至如文殊普賢等則等覺菩薩亦欲往生如華嚴偈中說了達自心無不化往者論云若觀彼佛真如法身常勤修習畢竟得生入正定故汝若悟心萬牛莫挽者悟心之士知淨土唯心生淨土者非生淨土生自己心中也雖曰了明去佛尚遠者古云頓悟雖同佛多生習氣深風停波尚涌理現念猶侵又云識冰是水猶賴湯氣以消鎔悟妄即真尚依佛慧而熏煉也註杜視絕聽者清涼云高不可仰積行菩薩曝腮鱗於龍門深不可窺上德聲聞杜視聽於嘉會今釋曝腮者如禹門三級魚躍不過者曝腮而還也常法即是依律定罪毋擾亂其心者謂當直談罪性本空不在內外中間等也擬之螢光者證道歌云有二比丘犯淫殺波離螢光增罪結維摩大士頓除疑猶如赫日消霜雪是也不淨數息者舍利弗教弟子一修不淨觀一修數息觀久之皆不成心欲返道往見世尊世尊問二人在家何業修數息者曰守墳墓修不淨者曰冶金器世尊乃令二人易觀修之不久皆證道果三心即觀經所云一者至誠心二者深心三者迴向發願心圓者圓頓無次第故又圓融無彼此故又圓滿無缺少故此是圓人就圓融三法而發心也當知發此三心是因是未生淨土時事是圓十信位中事直入無生是果是已生淨土時事是證圓初住時事三心圓發直入無生者謂但能三心圓發者生淨土時即直入無生也十念舊有兩釋一謂但至心稱念十聲即為十念一謂不論句數但盡一口氣為一念盡十氣為十念又有臨終始十念者如張善和是也有一生行十念者如智仙法師是也成功亦可分事理說如但得信力成就稍能伏妄是事成功若根器大利觀力成就疾能破妄是理成功大率即此一行隨其根器隨其用心可分九品也又當知此句是因下句亦生彼國方是果又復當知此等十念成功者皆因夙世有大善根或今現生素習禪觀故一時用力頓斬塵勞若根器稍劣素無質地者不可圖此僥倖而廢專持名號也五欲三毒無量煩惱是鈍使偏乘外道一切見病是利使但偏乘已斷見惑者則不名使而亦是病如楞嚴生纏空種與不化圓種豈不是見病耶大生廣生者易經繫辭云夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉章正念分明即後文事理二持大率根鈍者聞佛名號常憶常念以心緣歷字字分明前句後句相續不斷行住坐臥唯此一念無第二念是為正念分明根利者聞佛名號不惟憶念即念反觀體察究審鞫其根源體究之極於自本心忽然契合是為正念分明此正念分明正是不虧正見正是願力威神正是大光明中正是直至道場誰能嬈者寶鏡遁妖可將王度事說王度將寶鏡懸樹樹即為雷所擊大蛇死於樹下又復以鏡照一女子女子即乞藏鏡願得一醉而死醉後臥牀乃一死狐註禪是禪定觀是觀想今合言禪觀乃舉一切三昧之總名也若分言之則禪有世間禪出世間禪出世間上上禪觀有析空觀體空觀次第三觀一心三觀等陰是五陰魔謂魔羅此云殺者能殺行人法身慧命故此陰魔若如楞嚴所說不出天魔心魔見魔三種擊是擊動發是發現眾生有此陰即有此魔不修觀行故隱而不發今既修禪將破此陰遂擊動諸魔魔即現也易識易遣者正念分明即般若智照也識者智能辨故遣者智能破故如起信云或有眾生無善根力則為諸魔外道鬼神之所惑亂若於坐中現形恐怖或現端正男女等相當念唯心境界則滅終不為惱又天台止觀中具明識遣之法檢彼自知智照精朗魔不得便者良由正念分明即是第一遣魔之法故楞嚴云主人若迷客得其便當處禪那覺悟無惑則彼魔事無奈汝何汝如沸湯彼如堅冰煖氣漸鄰不日消殞章心本無念者心即真心念即妄念真心之中本無妄念起念念佛豈不反乖其心以毒攻毒用兵止兵者妄想之念能害我法身傷我慧命乃毒也兵也念佛之念念念生滅未與般若相應亦毒也兵也然非念佛之毒不能攻妄想之毒非念佛之兵不能制妄想之兵雖同一妄想有雜有專有淨有穢迥不同故病愈冦平者如妄想既遣即妄即真無離妄念別求真念永嘉云無明實性即佛性幻化空身即法身註心體離念者起信云所言覺義者謂心體離念離念相者等虗空界無所不徧法界一相即是如來平等法身實相念佛者離一切諸相方名實相即所謂直心正念真如也麤念暫息細念猶存者即楞嚴所謂內守幽閒猶為法塵分別影事又雖覺明虗靜無復麤重前塵影事而生滅根元猶如野馬熠熠清擾祖師云百尺竿頭坐的人雖然得入未為真百尺竿頭重進步十方世界現全身即緣慮作修進者古云善用兵者不必別動干戈即以賊攻賊用盜殺盜亦名就路還家也念一佛名換彼百千雜念者雜念因六塵有離塵則無念念扳緣心心不住乃違真之念念佛之念雖亦是妄從信心生專注一境近真之念也古云如將蜜果換苦葫盧是也妄從真起者謂念佛雖妄而又離真無妄妄從真起如波逐水生也即念即空有二義一是念極而空即用心之極和念脫落也二是念體本空即終日念佛終日無念也居然本體亦二義一反妄歸真義謂妄窮則真露也二全妄全真義即觀相元妄觀性元真也然此兩句中二義都重前一義葢以本文題目的指有念得入無念故萬法虗偽唯是一心者謂一切境界唯心妄起故有若心離於妄動則一切境界滅唯一真心無所不徧觸目菩提者頭頭皆是法法皆真明明百草頭明明祖師意東坡云溪聲盡是廣長舌山色無非清淨身章現相者如雞後鳴瞻顧東方已有精色七地僅名者以此地無相觀雖已成分別智雖已離而現識未亡於一切色未大自在故僅得現相耳八地乃得者以此地現識已亡入一切法如虗空性入一切法本來無生無起無相初中後際皆悉平等無分別如如智之所入處是名真得無生法忍也亟欲滅生求無生者古云大患莫若於有身故滅身以歸無勤勞莫先於有智故泯智以淪虗入有得空即凡成聖者求生淨土入有也乃悟無生得空也入有為凡夫得空成聖果也註淨無量身口意者七地菩薩以深淨心成就身業成就語業成就意業所有一切不善業道如來所訶皆已捨離一切善業如來所贊常善修行故意略同此者天台教云初住即得無生清涼云初地已去但得無生法忍明相現前未為真得則天台說初住得者亦得無生法忍光明也離一切心意識分別者了別名識指第六言籌量名意指第七言集起名心指第八言然第八中有業轉現三相今所離者乃是現相即楞伽所謂現識也分別者此六七八雖麤細不同俱各有種種分別今至八地一切皆離也滅非真滅者乃斷滅之滅非寂滅之滅也斷滅之滅乃妄滅寂滅之滅為真滅楞嚴云生滅既滅寂滅現前是也終成輪轉者如無想外道五百劫定力已過中有現前謗阿羅漢身遭後有墮落地獄輪轉諸趣也如牛壞車者牛以牽車為苦便壞其車主人復造如人厭身為苦速滅其身不知此身雖滅復受餘身求生而不乖無生者證道歌云誰無念誰無生若實無生無不生喚取機關木人問求佛施功早晚成升仙如許仙拔宅飛昇蕭史乘鸞羽化驟貴如虞舜發於𤱶畝膠鬲舉於魚鹽捨祕訣而耕空言謂不念彌陀為尋文索義之教棄神丹而服狂藥謂不求淨土為捕風捉影之禪章萬里迢遙者漸漸斷惑漸漸證真漸離生死鶴沖鵬舉者古云百鳥不到處鷹能到鷹不到處鶴能到又南華云北海有魚其名曰鯤鯤之大不知其幾千里也化而為鵬怒而飛其翼若垂天之雲搏扶搖而上者九萬里去以六月息者也驥驟龍飛者凡馬日行不過百里良驥有追風逐電之能然不及神龍變化飛騰人莫能測也註多種淨業如觀經修觀鼓音持呪等今以持名與之較量則彼是徑路持名是徑中徑也本部大本即廣陳依正備載修持等今以持名為之揀別則彼是徑路持名又徑中徑也豎出三界者先斷欲界九品思方出欲界次斷色界三十六品思方離色界次斷四空三十六品思方超無色界又先修根本四禪方出欲界次修四空定方離色界次修滅盡定方超無色界橫出者即不斷惑不修禪但得稱名一心便帶惑往生出三界也重處偏墜者如前云以施戒力或作王臣富貴自在乃至廣作眾罪由此墮落等易無思無為等者凡物有心必有思惟易無心也何有於思何有於為方其蓍未揲卦未求辭占象變隱而無蹟寂然不動矣及其感而揲蓍求卦也則受命如響而來物之遂知通變極數而爻象之畢洩遂通天下之故也葢無思而無不思無為而無不為極天下之至神乃能如此不然寂則淪於靜矣感則滯於動矣其孰能寂能感之如此哉為力稍難是不甚簡易須行乃至也為時稍久是不極迅速須疾乃速也不稽歲月是極迅速不疾而速也不假作為是極簡易不行而至也章廣陳依正者小本依報如池水則但曰有七寶池八功德水大本則廣談池之量池之數及水之隨心作用等小本正報如弟子則但曰聲聞弟子無量無邊大本則廣談諸上善人講經誦經聽經坐禪等備載修持者此則執持名號一心不亂大本則備說捨家離俗而作沙門等懸繒散華飯食僧眾等繁簡就經文說博約就行門說又更無他說單指持名正是崇簡去繁但得一心便生彼國正是舉約該博註為樂廣樂略者如來說法隨機不定如良醫應病授藥楞伽云彼彼諸病人良醫隨處方諸佛為眾生隨機應量說辭簡而益明就能詮之文說事約而倍勝指所詮之義說廣談諸福細分三輩辭繁也但持名號但生彼國辭簡也即為多善多福俱得不退菩提理益明也廣談諸福猶分三輩事博也但持名號但生彼國事約也即為多善多福俱得不退菩提功倍勝也章前九為通者前之九因通四種念佛後一為別者後一徑中之徑別在持名兼前總義者總一代時教為一大事因緣出現於世也註為教眾生念佛者不教眾生修餘行此句指前九因猶通四種念佛為教眾生持名念佛者不教眾生觀像念佛等此句指後一因唯持名念佛為教眾生持名念佛而入佛知見者不教眾生念佛往生淨土而已此句兼前總義為入佛知見也章藏教分中者藏有含攝義謂含攝一切所應知義故教有開示義謂開示眾生令得正見故分有分劑義謂分劑頭數各各不同故各何攝屬者言藏教分三種各有不同今在藏中是屬何藏在教中是屬何教在分中是屬何分也註此云契經者謂上契諸佛之理下契羣生之機若契理而不契機則法不逗機是閒言語非經也契機而不契理如樵歌牧唱治世語言不詮妙理亦非經也調伏者謂調煉三業制伏過非使身口意悉歸清淨對法者法有二種一勝義法即涅槃是善是常故名勝二法相法通四聖諦相即體性相狀也對亦有二一者對向謂向前涅槃二者對觀觀前四諦其能對者即無漏淨慧及相應心所俱有多義者契經或曰線或曰蓆經井索聖教等對法或名伏能勝伏他論故或名通能通釋經文故調伏或名尸羅此云清淨或名波羅提木叉此云保解脫等十藏品顯戒律者第二戒藏廣談戒律始從普饒益戒終至無毀犯戒明十種戒律故問明品顯論議者十首菩薩互相問答論量妙理經中始從文殊以一心種種差別問覺首以萬法體虗顯性答終至覺首復以佛境界問文殊以生界法界無別答章菩薩藏是大乘法如華嚴法華所說等聲聞藏是小乘法如四阿含所說等註緣覺人不藉教者緣覺有二一緣覺出有佛世稟如來十二因緣而得覺悟二獨覺出無佛世獨宿孤峰觀緣悟道所謂觀物變而悟非常覩秋零而入真道今之所指乃獨覺也自利利他者始為眾生求生淨土終以證忍還來度生故華嚴包無量乘者清涼序云若乃千門潛注與眾典為洪源萬德交歸攝羣經為眷屬是也葢以華嚴如大海諸經如百川華嚴如天子諸經如侯王無不攝故二乘種不生者往生論云大乘善根界等無譏嫌名女人及根缺二乘種不生暫有終無者小乘臨終迴心向大得生淨土以二乘根熟故聞水鳥樹林說無常苦空等法順其夙習暫證小果而心則已入大乘也章判教謂判釋東流一代時教亦頗有不同如劉虬二教南中三教天台四教等今不依彼乃依賢首所判五教也但說偏空曰小初示衍門為始終歸一實為終一念不生全體現故謂之頓重重法界總圓融故謂之圓註人空即前蘊中無我法空即前蘊亦是空縱少說法空者如經云無誰老死無是老死上句人空下句即法空也又曰諸法無有我亦復無我所人法亦然六識三毒等者小乘不信有八識獨有六識三毒為能熏六識為所熏三毒熏六識流轉生死為染根本三毒不熏六識以戒定慧熏六識即證涅槃為淨根本也未盡法源者尚未窮七識況八識真如耶由第二時但明於空者法相宗中以佛初於鹿苑轉四諦法輪說諸法為有為初時第二時中依徧計所執說諸法皆空即諸部般若之一分是然依他圓成猶未說有為二時第三時具說徧計性空依圓是有契合中道方為了義今賢首合彼二三兩時為始教以第二時但明於空空是大乘初門第三時定說三乘隱於一極皆非至極故總為始也廣談法相者謂色法十一心法八五十一個心所法二十四個不相應六個無為成百法其所云性亦是相數者以六無為是性既有六種亦是相數也依生滅八識者法相宗中真如凝然不動不許隨緣以依生滅八識建立諸法如云無始時來界一切法等依由此有諸趣及涅槃證得是也界為因義即第八識種子中道妙有者真空妙有二而不二空即有故定性聲聞得成佛有即空故定性闡提亦得成佛方盡大乘至極之說者以一切眾生皆有佛性皆當作佛方為盡理也其所云相亦會歸性者如云三世五陰法說名為世間彼滅非世間如是但假名又云有諍說生死無諍即涅槃生死及涅槃二俱不可得等如來藏即自性清淨心八識即黎耶體依如來藏八識者謂非生滅八識乃依不生滅心之八識也論云依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名為阿棃耶識是也隨緣謂真如隨緣如楞伽云譬如巨海浪斯由猛風起洪波鼓冥壑無有斷絕時成立者謂此識之中以不覺熏本覺故生諸染法流轉生死以本覺熏不覺故生諸淨法反流出纏成於始覺依此二義徧生一切染淨諸法而一切諸法仍不離自性故云隨緣成立諸義類也不說法相唯說真性者起信云一切諸法唯依妄念而有差別若離妄念則無一切諸法自相可得等一念不生即名為佛者古云心有也曠劫而墮凡夫心無也剎那而成正覺統該前四者前之四教前淺後深不該攝故不圓滿故無盡法界者統惟一真法界分為事理等四法界有為無為等五法界乃至無量法界也性海圓融等者性海圓融不礙緣起法法相即法法相入如千珠寶網重重無盡也以四法界對之則性海是理法界緣起是事法界圓融無礙是事理無礙法界相即下是事事無礙法界章所具義理當復云何者以圓頓二字自是名相而有名必有實有相必有體其中所應知之義所當證之理尚未細明故云當復云何註其事甚難者難行能行難忍能忍斷難斷之惑證難證之真其道甚遠者從初發心直至成佛經五十五位真菩提路如楞嚴中說又起信云經一萬劫成就信心經一僧祇滿足十向乃至三僧祇滿方得成佛彈指圓成者古云彈指圓成八萬門一生取辦僧祇果章五法三自性等出楞伽經一念不生是心體離念無念則無一切境界之相故悉空悉遣註名相妄想攝盡世間法正智如如攝盡出世間法名相是妄計性者妄計是六七識徧計性安名執相無有定體是虗妄計度故曰妄計妄想是緣起性者妄想指八識自體此八識仗因託緣而生故曰緣故教中云眼識依九緣生起耳識依八緣鼻舌身三識各依七緣意識依五緣七與第八皆四緣生起也正智如如是圓成性者正智即無分別之智如如即無分別之理理智不二乃圓滿成就之性故曰圓成賴耶此云含藏以含藏根身器界諸種子故末那此云傳送以此識內則依第八以為我體外則依第六以為我用自無體用故曰傳送識人無我法無我者我見為內屬人我所見物為外屬法能性若空是人無我所相亦空是法無我已上亦皆入五法者一八識入五法謂八識自體入妄想六識所計屬名相轉識成智屬正智所證屬如如二無我入五法謂人法二執屬名相妄想二無我理屬如如證二無我之智屬正智亦屬正智如如下當配三自性而文中不言者以上文三性已入五法中故若欲配之則所念之佛屬妄計能念之心屬緣起念力成就屬圓成不以有心念等者有心墮妄想乃增益謗今則若言其有則能念之心本體自空所念之佛了不可得非有也無心墮斷滅乃損減謗今則若言其無則能念之心惺惺不昧所念之佛歷歷分明非無也亦有亦無墮相違謗今則有處全空空處全有互奪兩亡非雙亦也非無非有墮戲論謗今則因有念顯無念因無念顯有念互成雙立非雙非也又不以有心念居一切時不起妄念也不以無心念於諸妄心亦不息滅也不以亦有亦無心念住妄想境不加了知也不以非有非無心念於無了知不辨真實也更有何念者四句既離百非亦絕也念而無念是名一心者云念則非空云無念則非有念奪無念無念奪念互奪兩亡則雙遮二邊因念成無念因無念又成念互成雙立則雙照二邊以照奪遮以遮奪照非遮非照唯是一心註事謂緣起無邊理謂性海無盡事理謂圓融無礙事事謂主伴重重相即相入華嚴全圓今得少分者一無情說法同二一含無量同三不動周徧同四見聞獲益同五八難頓超同六出生無盡同七雙垂兩相同八教主法身同九不可思議同十頓齊佛境同此十配華嚴十種𢆯門可以意得如本無差別即不動寂場無量無等謂無量世界無等世界即徧周法界也圓覺佛者謂道窮妙覺位極於茶究盡諸法實相邊際智滿種覺頓圓圓顯十身富有萬德如十五日月圓滿具足最上最勝究竟覺也普門法者普是徧義門曰能通華嚴中具無量波羅蜜門一一門中復出無量法乃至一一句能充徧法界一一字能通大涅槃故曰普門八難謂地獄餓鬼畜生盲聾瘖瘂世智辨聰佛前佛後北俱盧洲無想天以受此果報不得聖化故稱為難此是凡夫住事八難又復有餘中三十心為三惡道住無我法名為北洲地前法愛如長壽天未有初地十種六相名諸根不具地前智淺如世智辨聰不窮中理如佛前佛後此是二乘住理八難舍那釋迦雙垂兩相者兩相謂千丈圓滿報身與丈六老比丘相雙垂即二始同時不動寂場而游鹿苑也淨名名小不思議者如借座鐙王請飯香土室包乾象手擲大千及菩薩種種不思議解脫皆不可思議也不動智謂不生不滅心即是一法界大總相法門體也同為華嚴流類者謂華嚴是源而此則是其流華嚴是本而此則是其類此類字與聖人之於民亦類也類字相似此流字與流流入海流字相似章定善散善者十六觀門為定善定心成觀故執持名號為散善散心稱名故彼經妙觀宗乎一心者以若就事上直觀依正豈名微妙今觀若依若正乃法界心觀法界境生於法界依正色心是則名為唯依唯正唯色唯心唯觀唯境豈不名妙故知妙觀皆宗一心心性徧周無法不造無法不具若一毫法從心外生則不名為妙觀也註已非全散何況理一者若據事持應名散心今專注一境已非全散理一心者悟自本心本自不生本自不動何為散也即空即假即中是一心三觀觀三諦一境也斯乃稱性而觀絕待而照修此觀時祇一觀而三觀觀於一諦而三諦即一而三即三而一故空為法界一切法趨空無假無中無不空假為法界一切法趨假無空無中無不假中為法界一切法趨中無空無假無不中也此觀成時證一心三智亦名一切種智中論云因緣所生法即空即假即中釋論云三智實在一心中得即此意也超乎次第者以有次第三觀先修從假入空觀次修從空入假觀然後雙遮雙照流入薩婆若海此是別教行相今是圓觀故頓超也了不可得者能所性空故能所歷然者不礙緣起故非空非假互奪兩亡雙遮中道也常空常假互成雙立雙照中道也遮照同時故不可思議觀即念念即觀者觀乃注想一境念乃明記不忘則觀念似別然觀曰心觀念曰心念則同宗一心彼則以法界心觀法界境此則以法界心念法界佛毫無差別故言即也名念佛三昧者執持名號故一行三昧者繫緣法界專稱名字故諸佛現前三昧者一心功成佛現其前故般若三昧者一心不亂即大般若故普等三昧者一心功成無法不攝故智者大師於觀經分散分定者觀經中因韋提希啟請唯願世尊教我思惟教我正受故世尊以三種淨業答思惟十六妙觀答正受天台疏云三種淨業散心思量名曰思惟十六正觀說名正受是即屬散屬定也三種淨業者一者孝養父母奉事師長慈心不殺修十善業二者受持三皈具足眾戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者若修三種福為三惑染不稱淨業於十六境不照三諦不名妙觀四性不生者謂達此心自他共無因不可得無心無念也與空慧相應者空慧即大般若智以無虗妄心念離一切法差別之相也註但名故名散善者以若有定心佛身自現今不見身顯是無有定力故名散善也劣應故名散善者以定力若深則所見之身自然高大今是劣應顯是無深定力故云散善也劣應是丈六身凡夫小乘依事識所見者勝應是圓滿報身是大乘人依業識所見者非木菩提樹下之身者以劣應身在木菩提樹下成道以吉祥草為座報身則七寶樹下成道以天衣為座也即勝即劣生法不二者劣即生身勝即法身言相即不二者以佛真法身猶若虗空應物現形如水中月紛紜自彼於我何為故華局故名散善者以若有深定則所見之華自然廣大今局於小顯是無深定力故名散也五逆不生名散善者以具大定者速入聖階度生亦廣今濟度功狹顯是無有大定故名散也止屬下品名散善者以具正定者必於寶剎速證無生今止成下品顯是無有正定故名散也獨要三意者一謂佛身不屬諸數而那由恒沙不無數計則此經為獨要一也此可對前佛是劣應一疑二謂用心不涉次第而先日次水自覺繁長則此經為獨要二也此可對前但聞佛名一疑三謂游歷不分高下而上輩三品乃徧十方則此經為獨要三也此可對前止屬下品一疑生身尊特猶待辨疑者有言六十萬億那由他之身乃是生身葢以淨土之身勝於穢土穢土生身丈六淨土生身宜爾許高大也四明尊者以十三重問答辨此決是尊特身也註隨其心淨佛土淨者經云是故寶積若菩薩欲得淨土當淨其心隨其心淨則佛土淨肇註云淨土葢是心之影響耳欲響順必和其聲欲影端必正其形此報應之定數也淨名即維摩詰五百童子之一也以此經由淨名示疾說起故遂以名經深者佛果深高以心往求故云深心亦從深理生亦從厚樂善根生故十地經云入深廣心涅槃經云根深難拔故言深心法華者實相妙理巧喻蓮華法喻雙彰名實並顯云妙法蓮華也般若此云智慧從方等之後出大般若轉教付財融通淘汰約時則禺中時約味則從生酥出熟酥也圓者滿足周備此外更無一法覺者虗明靈照無諸分別想念即當人自性也觀佛三昧者以此經是說念佛法門修行正定故六念者佛法僧施戒天六事安心不動稱之為念也涅槃疏云前三念他後三念自施戒是自因生天是自果戒是止善施是行善天有近果遠果近即二十八天遠即第一義天也然謂菩薩六念則是念同體三寶一心戒施第一義理也涅槃此云大滅度是如來斷德具常樂我淨四義此經是第五時所說十心向往者一於眾生起大慈無損害心二於眾生起大悲無逼惱心三於佛法不惜身命樂守護心四於一切法發生勝忍無執著心五不貪利養敬重淨意樂心六求佛種智於一切時無忘失心七於眾生尊重恭敬無下劣心八不著世論於菩提分生決定心九種諸善根無有雜染清淨之心十於諸佛捨離諸相起隨念心寶積者此部廣談妙法猶如珍寶積集豐盈也一經大旨即念佛往生也維摩丈室容八萬座者維摩詰從須彌燈王佛所借三萬二千獅子座皆高八萬四千由旬置於丈室無所妨礙於毗耶城及四天下亦不迫迮悉見如故起信謂令人發起大乘信根因緣分者此論通有五分一者因緣分二者立義分乃至第五勸修利益分今當第一說造論因緣有八種也信位初心謂十信中初信心也有四種機者論文云五者為示方便消惡業障善護其心遠離癡慢出邪網故六者為示修習止觀對治凡夫二乘心過故七者為示專念方便生於佛前必定不退信心故八者為示利益勸修行故有如是等因緣所以造論疏云自此下四種機當信位初心四中前三為下中上三人後一策以勸修也禮懺滅罪者論云若人雖修行信心以從先世來多有重罪惡業障故為諸魔鬼之所惑亂或為世務牽纏或為病苦所惱應當精勤晝夜六時禮拜諸佛誠心懺悔得免諸障善根增長故被初機者疏云此當下品也修習止觀者論云所言止者謂止一切境界相是依真如門止諸境相無所分別即成根本無分別智所言觀者謂分別因緣生滅相是依生滅門分別諸相觀諸理趣即成後得智被中機者疏云此當中品也求生淨土者論云若人專念阿彌陀佛願生彼界即得往生常見佛故終無有退若觀彼佛真如法身常勤修習畢竟得生依正定故被上機者疏云此當上品也註信生佛不二者迷此心為眾生悟此心為諸佛諸佛乃覺悟之眾生眾生乃沈迷之諸佛古云諸佛心內眾生塵塵流轉眾生心中諸佛念念證真也又復此信即是起信信根本慈雲信自心而彼根本外尚有信佛信法信僧不疑自心外尚有不疑師不疑法今獨舉根本自心者以信淨土唯心為淨業之獨要也如子憶母者楞嚴言十方諸佛憐念眾生如母憶子子若憶母如母憶時母子歷生不相違遠不堪承受甘露法味者楞嚴云如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露今羸劣破漏豈堪承受雖有諸過亦名為器者如觀經下三品皆五逆十惡臨終發心皆得往生註下智觀者等下智是但解偏空而根稍鈍者彼即觀思議生滅十二因緣從他聞聲而解了故成聲聞菩提中智亦但解偏空而根大利者彼即觀思議不生滅因緣悟解甚深因緣法故成緣覺菩提上智是解但中理者彼即觀不思議生滅因緣心廣無量故成菩薩廣大行故得菩薩菩提上上智是解不但中理者彼即觀不思議不生滅因緣一切種清淨故一切佛法皆成就故得佛菩提是同是十二因緣一法而因智慧不同觀察不同而所得遂各各不同也非隨因感果而何諸天共器者淨名經云譬如諸天共寶器食隨其福德飯色有異三獸同河者永嘉集云譬如象馬兔渡河足有長短而分深淺註下品猶勝天宮者如云六欲諸天具五衰三禪尚自有風災假饒修到非非想不若西方歸去來章先明隨相者相即文義之相隨有二義一者文隨於義義隨於文文義二相交相隨順而為教體故二者且未會歸一心先隨文義外相談能詮體故十門推本者一音聲語言二名句文身三通取四法四諸法顯義五攝境唯心六會緣入空七理事無礙八通攝所詮九事事無礙十海印炳現二謂所詮義者或難云此明能詮體性何故所詮之義亦作能詮耶當知以義對名句文則義為所詮若以義對理而言義為能詮理為所詮也註或以聲為教體者攝假從實故名等有展轉義非正教體故依聲有名依名有義如依父有子依子有孫父為體故或以名句文身為教體者以體從用故唯識云此三離聲雖無別體而假實異亦不即聲等名詮法自性者如無量壽佛無詮非有自性量詮分限壽詮永年佛詮大覺句詮法差別者如無量壽佛詮法則廣大若云量壽佛詮法則少狹矣文為上二所依者藉文彩連合之功方顯名句之用也假實體用兼資者名句文為假二十四不相應行攝故聲為實十一色法所攝故聲為體名句文為用註法能顯義者色聲香味觸法塵塵皆為教體眼耳鼻舌身意根根盡入圓通所謂翠竹黃華無非般若白雲流水盡是真如松風昨夜熾然說自是聾人不肯聽章唯識者唯有揀擇決定顯勝三義識有了別義略而言之唯遮境有識揀心空故曰唯識文義皆識所變者變有二一者因緣變有實體用是前五及第八識二者分別變但可為境是六七二識今聲為因緣變有實體用故名句文及所詮義乃分別變但可為境無實體用故本影四句者本者實有本質影者自心影像本如鏡外之物影如鏡中所顯之影識如鏡體註唯本無影者是認影為本小乘不知唯識現者以小乘人不達三界唯心心外有境如小兒執鏡中之影為實不知乃鏡光所現之影故淨識即第六識心王以六識相應心所既轉成妙智則心王豈不是淨識以純無漏故妙觀察智者唯識論云轉八識相應心所成大圓鏡智轉七識相應心所成平等性智轉前五識相應心所成成所作智轉六識相應心所成妙觀察智五七八三智能現種種身唯妙觀察智能於大眾中雨大法雨聞者識上所變者他佛宣說若文若義本質聞者識上變起文義而緣如鏡對像自變影故增上是助意互為增上者佛無眾生佛不說法是眾生於佛為增上緣眾生無佛說法眾生亦不能自變文義而緣是佛於眾生為增上緣如月無水不能現影水無月亦不能現影是互為增上意離眾生心更無有佛者謂佛本是無心淨故有以心淨故諸佛即現若離眾生心更無有佛也何以故法身妙理無有色相迭相見故教中云佛果無別色心功德唯有如如及如如智獨存是也大悲即眾生緣無心攀緣一切眾生而於眾生自然現益如涅槃經我實不往慈善根力能令眾生見如斯事大智即法緣無心觀法而於諸法自然普照如日照物無所分別為增上緣者如涅槃云波羅奈城有優婆夷屈請眾僧奉施醫藥有一比丘身嬰重病良醫診之當須肉藥是優婆夷割其股肉切以為羮施病比丘服已病差女人患瘡苦惱發聲稱佛我在舍衛聞其音聲於是女人起大悲心是女尋見我持良藥塗其瘡上還復如本善男子我於爾時實不往至波羅奈城持藥塗彼當知皆是慈善根力令彼女人見如是事此即大悲大智為增上緣也根熟眾生心中現佛說法者華嚴云諸佛無有法佛於何有說但隨其自心謂說如是法等不教之教者如維摩詰嘿然無言文殊歎曰是真不二法門世尊洗足已敷座而坐須菩提讚言希有世尊經云法性本空寂無取亦無見性空即是佛不可得思量是也尊者無說我乃無聞者空生宴坐石室中空中帝釋散華供養空生曰散華者誰曰我天帝釋也何以散華曰以尊者善說般若尊者曰我本無說帝釋曰尊者無說我乃無聞乃真說般若也此四皆言唯識者唯識有二一勝義唯識二世俗唯識今初句唯本無影非唯識即前之隨相門二句亦本亦影是世俗唯識三句唯影無本通世俗勝義以無本質應是勝義以有影像應通世俗故四句非本非影唯是勝義唯識也勝義唯識即後歸性一門此當門名世俗唯識四句料簡實通前後也心樂出離五句是唯影無本而實無說無聽是非本非影既不離此二句此文此義非識所變而何故識為教體也章歸性者因一念無明迷此性體而現起八識次從八識體變起萬境今遡流及源反末歸本故歸性也八識即心生滅門所謂不生不滅與生滅和合非一非異名為阿黎耶識也此識有覺不覺二義今是不覺義中無明不覺生三細境界為緣長六麤故云能變之八識也一心即本源之一心所謂是心則攝一切世間出世間法依於此心顯示摩訶衍義也此心有真如生滅二門是雖體絕有無相非生滅而迷之則生死無窮解之則廓爾大悟故云能現之一心也註從真如流出教法者具足言之則從真如流出根本智從根本智流出後得智從後得智流出大悲心從大悲心流出十二分教今但依源頭說故云從真如流出也重頌如授記如者謂重頌亦是真如授記亦是真如一切皆如者一切差別教法皆從緣無性即是真如是故虗相本盡真性本現也出仁王經經云波斯匿王白佛言云何十方諸佛一切菩薩不離文字而行諸法相佛言大王法輪者重頌如授記如十二分教一切皆如等譬之物不離夢者物譬隨相夢譬唯識人譬歸性生法是因緣所生之法生法本無一切唯識即物不離夢識如夢幻但是一心即夢不離人皆以一實相印為教體者印有二種一三法印二實相印凡經詮空無相無願三法乃小乘經詮一實者乃大乘經也章無礙者前二科攝末歸本會相歸性前淺後深不能相融今此一門本末融通性相不二舉一全彰圓融無礙也心境理事本自交徹者心外無境境外無心心者全境之心境者全心之境則心境不二理外無事事外無理理者即事之理事者即理之事則理事圓融註生滅門者謂迷此法界為三細六麤為流轉門滅此三細六麤歸一法界為還滅門此二門迷時妄生真滅悟時真生妄滅總為生滅門也真如門者謂真如自體迷時不見妄生真滅悟時不見真生妄滅非生非滅非染非淨之體即真如門也一心原有二門者論文云依一心法有二種門云何為二一者心真如門二者心生滅門是二種門皆各總攝一切法是也真如即是生滅者以真如不守自性五道隨緣故全真如為生滅不變隨緣也生滅即是真如者雖五道隨緣而緣起無性故全生滅即真如隨緣不變也心即是土下乃以理成事門理隨事變一多緣起之無邊也土即是心下乃全事歸理門事得理融千差涉入而無礙也章通論佛教因緣為宗者教中云諸法從緣生諸法從緣滅我佛大沙門常作如是說乃至法華最後極談亦曰以一大事因緣出現於世註無因邪因者計萬法從虗空生從自然生等是無因或從冥諦生或從自在天生或從太極生等皆邪因也因緣故生滅者謂因緣和合虗妄有生因緣別離虗妄名滅因緣故即空是因緣所生法我說即是空因緣故即假是亦名為假名因緣故即中是亦名中道義此四句若對五教言因緣故生滅是小乘教即空即假是始教即中是終頓圓三教以終為雙照二邊中道頓為雙遮二邊中道圓為遮照同時不思議中道也若對四教言生滅為藏教即空為通教即假為別教即中為圓教以別教但中對圓為假故不出有空等者以第一我法俱有宗此唯有第二法有我無宗第三法無去來宗第四現通假實宗此三通有空二法第五俗妄真實宗第六諸法但名宗此二唯空第七三性空有宗為法相第八真空絕相宗亦是空第九空有無礙宗為法性第十圓融具德宗為圓融註論言者是天親論章宗乎法性者以此經屬終頓二教終教多談法性少及法相其所云相亦會歸性出中道妙有一切作佛此經正是中道妙有皆登不退故頓教總不說法相唯說真性一念不生即名為佛此經一心不亂即得見佛故註兼備交資而得往生者有信願而無依正則信願何法故必依正清淨以資信願也有依正而無信願彼依正清淨自是清淨於我何為故必信之願之以資親證彼依正二報也皆不出自心者恐問云既是依正信願往生為宗趣何又言法性為宗故云也彼經亦兼眾說者華嚴經有以無礙甚深法界為宗有以緣起為宗法界緣起相即入故有以因果為宗以此經廣明菩薩行位之因及所成果故有以海印三昧理實為宗有以因果理實合為宗以因果是行位理實是法界故以上各各互缺今賢首總兼眾說共為宗趣也上句為宗下句為趣者彼經因果緣起為宗理實法界為趣此經依正清淨為宗信願往生為趣章別明者展轉推尋也正是大師極論其宏功令人發起真信處世人多疑此經文義麤淺教義一對足以破之愚者多執事而迷理事理一對足以破之狂者多執理而遺事境行一對足以破之或疑念佛正涉有為行寂一對足以破之或疑念佛自救不了寂用一對足以破之一教義者教謂言教義謂義理智者能於一字中尚解無量義愚人雖讀盡貝書祇是尋行數墨而已故教義一對不可不發明也二事理者事即依正信願等事理即一一消歸自性彼執事而迷理正由不知旨趣故三境行者境謂法界境即阿彌陀佛是行是法界心即一心執持是此即所謂繫緣法界專稱名字一行三昧也四行寂者行即一行之行寂即寂光之寂修一行三昧欲證寂光無上果也五寂用者寂即常寂本體用即恒沙妙用證此本體發起妙用還度眾生方是大乘妙旨也註不徒為語言文字者古云汝終日轉經不知終日經轉葢以其徒為語言文字故也所以說誦經千卷不如解經一偈顯發事中所具至理有二義一是隨文入觀即一一消歸自己一是依事造修往生彼國發明自性唯心之理徒為事緣之蹟即所謂終日死鑽故紙與終日喃喃但掐數珠者以境為宗境字若依後文解釋標念境者以四字名號為境則此處當云境即是所稱之名而言即是所觀之理者何良由所念阿彌陀佛四字全體即是法界全體即是當人自心而自心一念具足三千性相自心一念即空即假即中豈不是所觀之理能觀之智即當人稱念之心靈靈不昧無有間斷者是對能觀之智故名為境者以所念之佛對能念之心即名為境也而其實心外無境境外無心又復自性唯心之理忘能所絕對待何言境也故云理雖非境對能觀之智亦得言境也正欲即此以為真境者當知此字即自性唯心即所觀之理即阿彌陀佛四字名號離我心性別無名號離此名號別無心性全體法界為真境也而起觀行執持名號者謂以此名號為真境而起執持之觀行也此正是從性起修性既離言行亦無住雖云執持實離四句絕百非無念之念也強抑妄心者有定無慧名曰癡禪若墮無想則成外道故理體雖寂不妨起行持名以幻修幻以楔出楔幻盡覺圓乃歸真寂也今依正觀即是後文理持至於一心即後理一心有作是有為有作對無作說妄計是虗妄徧計對圓成說謂若不歸空寂則是有為有作之修多劫終成敗壞故沈空滯寂者耽著空寂之體不起利生之用乃二乘有餘涅槃之境也註平等即壽命清淨即光明覺即佛也支婁迦讖等是五譯人支婁迦讖漢明帝時人光武中興故名後漢明帝即光武子也康僧鎧魏人曹丕篡漢國號曰魏支謙吳人孫權稱帝國號曰吳法賢趙宋時人趙匡胤為天子國號曰宋菩提流志南北朝魏人魏主本姓拓䟦改姓元國號魏亦有未盡謂已盡美未盡善也亦可舊文緊要處彼亦採取未盡高下失次者下品不發則不發為劣矣上竟不言上亦劣耶上竟不言不言為勝矣下言不發不發亦為勝乎故曰失次也同一發心正往生要旨者不發菩提心則小乘而已二乘種不生故知發心乃往生根本也註伽陀此云孤起頌十大願王者一者禮敬諸佛二者稱讚如來乃至第十普皆迴向華嚴稱性而談法華正直而說二經皆歸極樂者以欲入毗盧性海先歸淨土𢆯門欲悟一乘實相先入西方安養二經始終既爾中間諸經可知故知淨土一門一代時教之總持法界眾生之歸地也章詳略同別者詳謂大本略謂此經同謂同類別謂非部非類註嬴秦者周時有非子者是伯益之後善養馬周孝王愛之封於陝國號秦後并吞列國而有天下以其姓嬴故云嬴秦苻秦者東晉時氐種也苻堅強盛雄據關中國亦號秦是為苻秦姚秦者羗種也姚萇為苻堅將後堅為晉兵所敗萇遂據關中傳子興是為姚秦周禮掌四方之語者東曰寄南曰象西曰狄鞮北曰譯皆官名也寄言能寄寓風俗之異於此象言能倣像風俗之異於彼狄鞮則欲別其服飾之異譯則欲辨其語言之異周官通謂之象胥而世俗通謂之譯也又譯釋也猶言謄也謂以彼此言語相謄釋而通之也遣將呂光者秦苻堅建元十三年使呂光伐丘茲國破之擁眾歸至涼州因據州稱涼王光死姪呂隆降秦乃迎師入關居逍遙園章二經聯比者聯謂聯續比謂比並什師譯之於前奘師譯之於後有聯續義兩經意義無相違背有比並義註卓然自立者師十一歲時見諸沙彌劇談戲笑乃呵曰夫出家者為無為法何得更為兒戲可謂空喪百年識者知師德器非凡矣註孤山十疏通經者一文殊般若經二遺教經三般若心經四瑞應經五四十二章經六不思議法門經七無量義經八普賢觀經九阿彌陀經十首楞嚴經世稱十經疏主云註寶王論等者草堂飛錫法師作念佛三昧寶王論天台智者大師作釋十疑論龍舒居士王日休作淨土文無盡居士張商英作求生淨土文侍郎王古作直指淨土決疑集吳群沙門大佑作淨土指歸集無功居士王闐作淨土自信錄慈雲懺主遵式作淨土略傳善導和尚作偈偈云漸漸雞皮鶴髮看看步行龍鍾惟有徑路修行但念阿彌陀佛永明壽禪師作神棲安養賦諸家懷淨土詩如中峰西齋楚石諸師等註枝低只為挂金臺者詩云我師一念登初地佛國笙歌兩度來惟有門前古槐樹枝低只為挂金臺註如西齋空谷天奇毒峰等皇明楚石琦禪師有西齋淨土詩空谷隆禪師有空谷集天奇禪師號㷀絕老人有煢絕集毒峰善禪師有語錄行世章羣星悉皆拱北者論語云為政以德譬如北辰居其所而眾星拱之註永明以宗門上上品生者永明壽禪師秉單傳之旨作宗鏡錄萬善同歸集等入滅後有僧經年遶其塔人問故曰我病入冥見殿左供一僧像王勤敬禮密詢之乃杭州壽禪師也凡人死皆經冥府此師已往西方上品上生矣圓照標名蓮境者宋時圓照本禪師初參天衣有省後一志念佛住淨慈有雷峰材法師神遊淨土見一華殊麗問之曰待淨慈本禪師耳又資福㬢公至師所禮足施金而去人詁其故曰吾定中見金蓮華人言以俟本禪師耳後臨終坐逝諡圓照僧叡蓮華出榻者僧叡從羅什法師稟受經義後預廬山蓮社宋元嘉十六年忽告眾曰吾將行矣面西合掌而化眾見叡榻前一金蓮華倐爾而隱有五色香煙從其房出清照說偈西歸者宋清照亨律師初依靈芝習律專修淨業六十年臨終念佛說偈曰彌陀口口稱白毫念念想持此不退心決定生安養九流者謂儒流道流陰陽法流名流墨流縱橫雜流農流文潞公名彥博為宋宰相封潞公蘇長公名軾為翰林學士自號東坡十萬緣者勸人念佛書名蓮錄滿足十萬人西方公據者長公往來南北每帶一西方變相而行人問之曰此我生西方公據也捨仙學而回心者宋葛濟之句容人久事仙學妻紀氏獨精誠念佛元嘉三年方在機杼忽覺空中清明乃瞻仰四表見西方有佛現身寶葢幢幡映蔽雲漢喜曰經言無量壽佛其即此耶遂五體投地濟之驚異就之紀氏指示佛所濟之亦見佛半身祥雲五彩親里咸覩濟之由是回心念佛焚仙經而修觀經者後魏曇鸞性嗜長生受陶隱君仙經十卷後遇菩提流志乃問曰佛有長生不死術乎志笑曰長生不死吾佛道也乃授十六觀經曰學此則三界無復生六道無復往其為壽也恒沙劫石莫能比焉此吾金仙氏之長生也曇大喜遂焚仙經而修淨土業岐黃而念佛者元吳子章業醫一生念佛至正間無疾念佛而逝岐黃者岐伯與軒轅黃帝問答作內經等書為醫家之祖荷耒耜而稱名者晉張銓高逸好學耕鋤間帶經不釋後入廬山蓮社研窮內典多有悟入宋景平元年無疾西向念佛而逝冥君敬禮即壽禪師羅剎休心者有羅剎在一聚落其民日送子與食有子歸信三寶一心念佛遂不能食因得歸真際所詣詣者在也不疑何卜者唐太宗為秦王時與太子建成相忌欲舉兵眾疑恐不勝命卜之張公謹取龜投地曰卜以決疑不疑何卜
