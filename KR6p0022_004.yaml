body:
  text: 疏感應道交者念佛功成衆生機熟為感無心扳緣衆生而於衆生自然現益為應道交者即所謂菩薩清涼月常遊畢竟空衆生心垢盡菩提影現中也鈔前有將謝四句凡人命未終時善惡之境未現前者以宿業未完今業未熟故現果未盡當果未現也臨命終時則夙業已盡今業已熟當果現前矣唯識云由諸業習氣二取習氣俱前異熟既盡復生餘異熟是也大本法藏下是引二部證佛力言諸經者下是引諸經雙證二力一心信樂是自力與諸比丘住其人前是佛力能正受持是自力阿彌陀佛住其人前是佛力專心憶念是自力佛現其前是佛力念佛衆生攝取不捨是觀經第九佛觀中文攝取不捨者以無緣慈攝諸衆生衆生不念佛則已念則為佛所護終得離苦永得安樂釋論云譬如魚子母若不念子則爛壞衆生亦爾佛若不念善根則壞能正受持者凡人念佛心帶異計或雜餘想不名正受持正受持者離乎四句不雜餘緣是名正受持也本有佛性力者真如內熏力也真如內熏人人皆然今不得此力者如木有火不假鑽燧火終不現雖具真如不藉師友教誨真如亦不現也鈔六十萬億是報身亦名尊特身亦名勝應身丈六亦名劣應身亦名常身化佛是隨類化身登地方見報身者十信三賢菩薩不斷無明不證真如但見應身登地已去分斷無明分證法性乃見報身展轉細妙若無明已盡位窮妙覺則無佛可見以菩薩機忘如來應息諸佛無有彼此迭相見故故曰如來現起他受用十地菩薩所被機也又起信論云一者依分別事識凡夫二乘心所見者名為應身以不知轉識現故見從外來取色分齊不能盡知故二者依於業識謂諸菩薩從初發意乃至菩薩究竟地心所見者名為報身身有無量色色有無量相相有無量好離分齊相常能住持又為凡夫所見者是其粗色非受樂相故説為應初發意菩薩等所見者以深信真如法故少分而見知彼色相莊嚴等事然此菩薩猶自分別以未入法身位故若得淨心所見微妙其用轉勝乃至菩薩地盡見之究竟若離業識則無見相前説依別教起信依圓教圓教十住即別教十地故別十地見報身展轉細妙圓十地見報身更展轉細妙也鈔楞嚴止觀辨之甚悉者楞嚴開五十種陰魔而受想二陰是鬼神魔天魔止觀開十境三障四魔而魔事境是業障天魔不與修多羅合者修多羅中謂應身有三十二相八十種好報身有八萬四千相相有八萬四千好若相好之數或多寡不定悉為魔事不與本所修合者如本所觀西方之佛今佛從東來唯觀坐相今見臥相等如幻非實下是永明語此乃如來下是大師出從真起化之意如鏡中形非內非外者若言形在鏡內不妨當體全空若言形在鏡外不妨鏡中顯現佛現亦然若言佛在心內不妨實在西方若言佛在心外離心實無有佛如夢中事不有不無者若云夢事是有及至於醒了無所得若云夢事是無正當夢時原有夢境佛現亦然若言是有自心顯現當體全空若言是無感應道交不壞幻相水清則月自來心淨則佛自現者謂水雖清天上無月不能現如心雖淨無佛悲願為緣不能現又如月雖明地中無水不能現如佛雖有悲願之緣衆生心垢不能現執佛從心現不信西方有佛執佛西來不信自心顯現皆邪見也鈔華嚴十五下是釋文載聖經疏云西域下是釋法傳西域神遊大方下是釋不應疑阻華嚴頌者經云又放光明名見佛此光覺悟將歿者令彼隨念見如來命終得生其淨國見有臨終等鈔幽幽綿綿即是第五顛倒微細精想所謂如急流水望如恬靜流急不見非是無流也命根未斷者若識陰盡則能超越命濁識陰未盡則十二類之命元未斷也又幽幽綿綿命根未斷者滅一切見聞覺知內守幽間百尺竿頭人也人亡家破煙滅灰飛者人空法空空空亦空百尺竿頭重進步也此約斷惑證真説然而下謂佛體本然不因斷顯時時顯現物物全彰但人自不覺爾此約本然性德説是故下古偈云彌勒真彌勒化身千百億時時示時人時人自不識是也疏暖盡識去者衆生息暖識三緣和合假立命根識即賴耶見分息暖即賴耶相分此八識者來為先鋒去為後殿暖盡識去正八識離體時也鈔心神惶怖動止揮霍者溈山云臨行揮霍怕怖慞惶前路茫茫未知何往未免憎愛父母者經云見明色發明見想成異見成憎同想成愛流愛為種納想為胎交遘發生吸引同業小聖初心不能正知出入者古云菩薩有隔陰之昏聲聞有出胎之昧是也隨業受生者七賢女經云來入瓶中以縠覆其口縠穿飛去識心隨業走謂業識成形依四大住四大分張業識隨業轉也一切國土唯想所持者起信云一切諸法唯依無明妄心而得住持若離妄心則無一切諸法自相可得楞嚴云想澄成國土知覺乃衆生等彼國邊地即是疑城在九品之外者以其無真實信心故也在定之心即是淨土此據寂光而言然亦不妨實有事相鈔非以欲愛為因四大為體者經云一切衆生皆以淫欲而正性命又云愛欲為因愛命為果衆生愛命還依欲本西方上善皆承淨因力隨願往生若有若無清虗微妙之身豈此因此體耶指端出乳者北洲男女左右分行其男女夙有緣者路傍樹林下垂覆之成夫婦事事畢樹起即分散去無復相認婦乃有孕産子道傍不顧而去其往來者以指端置兒口中指即出乳須臾長大鈔上之三品有生彼即得陀羅尼者此乃從空出假即十回向道種性人及圓教十信滿心人陀羅尼者一能持善二能遮惡是總持也經一小劫得無生忍者此乃侵斷塵沙已入別十行已得性種菩提及圓教八九信人到彼一劫始入聖種性證無生忍無生忍言登別圓初地初住也經三小劫得百法明門者此乃初破見思已入別十住已得習種菩提及圓教第七信人到彼三小劫始入聖種性得百法明門言百法明門者於相宗百法皆證三諦乃以百法而為明達三諦之門三諦若明則了一切心大歡喜名歡喜地也中之三品有生彼國即得阿羅漢者乃小乘退失大心之內凡忍位及世第一人於臨命終時聞讚方等回心向大得生淨土因無漏道熟便證小果然回向心須至別教七信以上圓教觀行四五二品方是中品上生人也生彼半劫得阿羅漢者是小乘之暖頂二位人其回向心能至別教六信以下圓教觀行二三兩品方是中品中生人也生彼一劫得阿羅漢者乃小乘之外凡其回向心能至別教初二兩信圓教觀行初品方是中品下生人也下三品人若論階位全未伏惑但聞法稱佛能滅業障而得往生乃名字人也隨功淺深分於三品問何中三品生皆是小聖下三品生乃云得入初地發無上道心發菩提心者豈中品乃皆劣器下品反皆大根耶答中品往生行人德行有餘智力不足皆在此土勤修戒定不發大心特於臨終發大乘心乃得往生故順其先習但證小果若下品行人則五逆十惡乘急戒緩凡夫特由臨終善友開發而得往生由戒緩故生居下品由乘急故後皆不經小果直入大乘也如龍女八歲成佛廣額屠兒放下屠刀千佛一數是也鈔約法下諸無起作之理即不生滅性本覺理也慧心即離垢出纏始覺智也安此者以始覺之智契本覺之理如智不二也忍者如忍事人心不懷疑亦不説出心中了了吐露不出意也約行下報行對集行説集行者念念勤修心心趣入加功用行乃有功用道屬前七地之行也報行者不必舉心運意任運流入薩婆若海無功用道乃第八地之行也智冥於理出行體也行無別體以智為體無相三句明行相也理無相無功故行亦無相無功理曠若虗空湛如渟海故行亦曠若虗空湛如渟海心識下二句明用行體如日妄惑如暗報行現前妄惑不起故經云八地菩薩離一切心意識分別始名真得無生法忍如前所説鈔孤山三輩齊觀經六品者以大本三輩純明善行不及惡人觀經下三品人皆五逆十惡人故靈芝三輩對上三品者以大本三輩皆發菩提心觀經後六皆未及故剋實而論下謂前三説乃據行據位取義不同非尅實之論若尅實而論則煩惱菩提皆無實法煩惱之性即菩提性前念是惡後念是善又何礙也惡人既已成善豈不賢聖同科如阿闍世弒父害母應墮阿鼻後因重悔得無根信即上品攝是也況中下耶鈔隨念淺深佛應稱之者事一心念則淺理一心念則深淺則以事識見佛但見應身之劣深則以業識見佛乃見報身之勝鈔正觀默照本心者以一心三觀照三諦一境如智相應隨流識性也古云心隨萬境轉轉處實能幽隨流認得性無喜亦無憂是也助行備修萬善者雖照本心不修萬善則性亦不朗如論云如人但念摩尼寶珠不加種種磨治之功珠亦不淨但念真如不假種種萬行磨治真如亦不明淨故雖了知自性本無慳貪不妨隨順無貪修檀波羅蜜以修行萬行自然隨順真如故二事俱得了達四淨土者如此正助雙修事理雙備先伏見思生同居淨次斷見思生方便淨次斷塵沙無明生實報寂光淨如止得事善者謂不修正觀徒修事行能伏見思生同居淨遠作三土因耳故知淨土下尋常以淨土一門唯攝鈍根凡夫禪宗圓頓法門乃究理菩薩境界若如上論則淨土正究理菩薩境界悠悠衆生乃兼容耳圓機體道最上淨業者圓聞妙理起圓信解解入寂光苟加願力導之如輕帆得遇順風上品上生何疑焉愚朴之輩不明理性但信心稱名發願往生亦得生彼故知淨土一門上及不退菩薩下及悠悠凡夫三根普被上下兼收無不度也正觀通上中者默照本心能斷見思塵沙即上品但伏不斷即中品助行通中下者修萬行時能伏見思即中品全未能伏帶惑往生即下品鈔自經論所明至確有明證三引大本三引諸經皆證上品從蓮華生也自果爾則上上文中至義必周也是反覆辨明無蓮華二字之意錯雜不倫進退無據者若曰蓮華之類不應下有臺字則進從蓮無據若曰金剛臺紫金臺之類不應上有蓮華二字則退從蓮又無據愚意至前後互顯耳詳明文缺義周十如即如是相如是性如是體如是力如是作如是因如是緣如是果如是報如是本末究竟等一切諸法不離此十亦各具此十也如是者指法之辭謂諸法有如是之相如是之性乃至如是而窮盡無非實相也報者答果曰報但上上品下是明上品殊勝之義華開漸晚二句上品中生經宿華開即得見佛上品下生經一日一夜蓮華乃開七日之中乃得見佛乃至下品上生經七七日華開見佛下品中生經於六劫華開見佛下品下生經十二大劫華開見佛證道漸遠者上中經一小劫上下經三小劫得無生忍住歡喜地乃至下上經十小劫得入初地下中經於六劫發無上道心下下十二大劫發菩提之心問極樂九品下是釋明妙宗鈔或有差誤鈔不了佛智志意猶豫者若了佛智則知非淨非穢淨穢歷然無彼無此願生彼國以不了故半信半疑依違不決也又猶豫者利根執自性彌陀唯心淨土不信十萬億外有世界極樂鈍根執事不信自性唯心之旨皆猶豫也臨命終時方悔己過者直至四大分離空無所獲方悔平日不修淨業故云看教參禪逐外尋未曾回首一沈吟前程黑暗路頭險始覺從前錯用心是也才入邊地見七寶城即便止住者修諸功德願生彼剎兼了佛智則徑生極樂不修功德願生彼剎又不了佛智則竟滯娑婆今因修諸功德又臨終自悔故得入邊地不滯娑婆以不了佛智志意猶豫故見七寶城即便止住亦有自然快樂如忉利天者古云華中快樂如忉利不比人間父母胎是也故名胎生者胎在生藏之下熟藏之上不見不聞今不得見佛聞法故名胎生如剎帝利下喻胎生也犯法喻信力不堅幽之內宮等喻疑城自然快樂閻浮金鎖繫其兩足不得自在喻五百歲不見佛聞法如處胎也識其本罪謂志意猶豫之罪能了佛智方名深自悔責鈔是最後心者此心之後更無餘心故名為大心者以垂死之人必知不免諦心決斷勝百年願力是心名為大心以捨身事急故如人入陳不惜身命名為健人也又復大心亦可即是菩提心以此心之後更無餘心則是頓入無心三昧即是頓離念相豈不為大豈不即是菩提心蓋以九品行因行行通乎九品如五逆罪臨終十念為能消功屬下下品若能伏惑即中品若根器大利頓能斷惑如闍王重悔得無根信即是上三所攝豈非五逆隨於懺功自分九品也且十念得生皆是夙有靈根者十疑論云臨終遇善知識十念成就者並是宿善業強始遇知識等妙宗鈔云此雖造惡已曾修觀故使臨終善友勸稱十念定心則成亦是法行乘急戒緩人也由乘急故得值善友縱現世不修三昧亦是宿種今熟故得往生故今大心説即是菩提大心亦無不可況本鈔文當知即是一心不亂若事一心猶未為大若理一心豈不即是菩提心是故名為大心疏以生於自心故不往而往者既云自心則無往既云生於自心則無往而往無往而往生則決定生往而無往去則實不去也今之往生與昔人何礙耶鈔華嚴重重法界不出一心者重重法界不出四法界四法界不出一真法界一真法界即當人自性也心無界限等者此心廣大無有方所無有彼此去至何所釋上不往狀其易穢等者乃離穢往淨離舊往新之往非離此往彼之往也釋上而往解脫所説者善財童子第六於住林城參解脫長者長者即入普攝一切佛剎三昧次從三昧起告善財言我見如是等十方各土佛剎微塵數如來彼諸如來不來至此我不往彼乃至隨意即見等以佛來去隨心現故經云若人欲了知三世一切佛應觀法界性一切惟心造是也疏兜率內院昔人亦願往生者兜率乃欲界第四天分內外院外院是天人所居內院是菩薩所居三災亦無所損昔人願生者如白香山云海山不是我歸處歸則須歸兜率天是也鈔必智斷功德堪與聖流者智斷即證智斷惑功德內院皆證智斷惑聖人所居無此功德不堪與會故極樂求生無論惑業者求生淨土但得事一心功成即帶惑業往生仗彌陀不思議願力如載巨石不至沈淵如上所説奘師謂內院易生者奘師為相宗師德而彌勒為相宗之祖故奘師常於定中見彌勒聖相臨終歸於兜率常勸人修唯心識定故謂內院易生也彌勒猶居等覺者以尚在因位未為極果猶清辨謂今彌勒未是遍知俟龍華道後方復問津即其事也後生龍華者彌勒下生經云彌勒菩薩即於出家之日便得成佛坐於龍華樹下華林園中三會説法第一會度九十六俱胝衆乃釋迦佛法中造佛像者第二會度九十四俱胝衆乃釋迦佛時五種法師讀誦大乘經者第三會度九十二俱胝衆乃釋迦佛法中供養僧者華嚴較論國土者心王菩薩於衆會中告諸菩薩言佛子此娑婆世界中釋迦牟尼佛剎一劫於極樂世界阿彌陀佛剎為一日一夜極樂世界一劫於袈裟幢世界金剛堅佛剎為一日一夜袈裟幢世界一劫於不退音聲輪世界為一日一夜佛子如是次第乃至過百萬阿僧祇世界最後世界一劫於勝蓮華世界賢勝佛剎為一日一夜普賢菩薩及諸同行大菩薩等充滿其中鈔不得戒而得增益受戒者梵網云千里內無能授戒師許佛菩薩像前受戒要須懺悔得見好相即便得戒見好相者佛來摩頂見光見華等若不見好相雖懺無益然雖不得戒而得增益受戒一聞千悟者如脅下施拳隔江招手誦藥王而親見靈山逢吹鐙而頓傳心印是也疏自性無形是不顛倒義者形者相也一切諸相皆倒心妄境今真如自性非一相非異相非非一異相非一異俱相離一切法差別之相有何倒妄自性無垢是生極樂義者垢者染也一切染法皆苦因苦果今離垢法身出煩惱礙智礙離和合相純淨明故成法出離鏡寧非極樂鈔是則求於正相尚不可得等正者對倒而言若有正相與倒何異無正無倒是名真不顛倒是則求於淨相尚不可得等淨者對垢而言若有淨相與垢何別無淨無垢是名真淨土鈔指掌者論語云其如示諸斯乎指其掌注云言易見也鈔靈知體上彌陀聖衆終日現前者自性寂即無量壽自性照即無量光慈即觀音智即勢至等常寂光中無時不往者常即法身寂即解脫光即般若三德祕藏行住坐臥不相離故奈何下結勸鈔人天希有歷劫難逢者佛未出世人間止有輪王説十善法天上止有帝釋説出欲論等皆有為因果不出輪回縱佛出世亦先説人天小教直至方等時方有此超生死出輪回之妙法故經云諸佛出於世懸遠值遇難假使出於世説是法亦難等出世間因指小乘四諦十二因緣法此法能超三界不墮輪回但依事識修行心外見法不悟唯心故猶可思議也又通教無生四諦別教無量四諦法此法能超二乘不墮偏空但道後方證因果不融淨土則理外修成萬法乃不由心具雖塵劫修道廣遊佛剎指彼淨土但是體外方便未為了義故猶可思可議也出世間上上因者以回神億剎實生乎自己心中孕質九蓮匪逃乎剎那際內是十方淨穢卷懷同在剎那一念色心羅列遍收法界苟或事理攸隔淨穢相妨安令五逆凡夫十念便登於寶土二乘賢輩回心即達於金池也哉是則大乘中大乘了義中了義佛法之妙過此以往不知所裁是不思議功德出世間上上因也鈔無量壽無量光三寶道品種種等此指所施之法也此法或出音敷演或現相指陳以彼土衆生六根清淨得大總持六塵皆説六根皆聞法法頭頭無非妙法故水鳥樹林下四句此彌陀神變也衆生皆具相好神變等此衆生神變也以彼國種種妙用雖彌陀神變所成若衆生不得神變不能受用經云方便是菩薩淨土菩薩成佛時於一切法方便無礙衆生來生其國是也難信之法三句經云若不往昔修福慧於此正法不能聞已曾欽奉諸如來故有因緣聞此義般若云若人一念生淨信者當知是人不於一佛二佛而種善根等同居即寂光者在下品往生但見同居圓心大士即是寂光池閣蓮華無非般若欄網行樹盡是真如所謂道人緣慮盡觸目是心光也應身即法身者在中下往生但見應身圓心大士即見法身一一光明俱是三德祕藏一一相好何非圓極一心所謂微妙淨法身具相三十二也空尋文疏勞身心者四十二章經云博聞愛道道必難會守志奉道其道甚大永嘉云吾早年來積學問亦曾討疏尋經論分別名相不知休入海算沙徒自困是也疏自性離心言相者以一切法不可説不可念故名為真如也鈔無記者冥冥昏住於善不善無所記別曰無記今緘口忘機正是無所分別故落無記是思之不得議之不得不思不議亦復不得是真不可思議也古云不可以有心求不可以無心造不可以語默通其斯之謂與鈔不生不滅者本無有生焉得有滅無去無來者無所從來何所至去無增無減者果佛圓明之體即衆生性德之佛故湛然常住者寂而常照照而常寂故如如不動者上如是智下如是境心境符合得不動空有等法故有無斷常皆是妄心計度若離妄心自無一切法差別之相也東屬春生於卦為震者易曰萬物出乎震震東方也又曰震為雷其究為健又曰震動也即動即靜應萬變而常寂者不遷論云不釋動以求靜即求靜於諸動是故旋嵐偃嶽而常靜江河競注而不流野馬飄鼓而不動日月歷天而不周也鈔百福所成者世尊因地修行百福果位感一種相好修無量福感無量相好百福者如大千衆生悉瞽不見悉皆醫治復明乃稱一福也鈔七金者一持雙二持軸三擔木四善見五馬耳六象鼻七魚嘴皆有金色光明七重環繞須彌山外高廣形量次第減半如須彌高八萬四千由旬持雙即四萬二千由旬是也名稱高遠踰於須彌者自有高而不遠遠而不高者今兼二者豎出三土橫遍沙界仰之彌高望之彌遠法界衆生莫不瞻仰也疏佛光廣照兼身智二光智光者如經云我以智慧光廣照無央界身光者如光明覺品放光照一世界十世界乃至不可説世界不可窮盡等鈔淨極光通者無明蕩盡般若圓彰故此即智光光明無量即身光鈔舉因該果二句因不該果果不徹因者權乘因果也非一乘因果也一乘因者諸法實相是一乘果者亦諸法實相是智而不悲二句智而不悲小乘偏真之智悲而不智凡夫愛見之悲非大乘一切種智即悲之智無緣之悲即智之悲也行非願起二句行非願起偽行也願不行成虗願也非菩薩無作妙行稱性之願也堯仁者通鑑云堯仁如天舜孝者舜父頑母嚚象傲克諧以孝禹儉者菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宮室而盡力乎溝洫湯寬者伊尹贊湯曰代虐以寬鈔外求智慧可盡二句古云從門入者不是家珍向自己𮌎中流出方始蓋天蓋地是也又香嚴聞一答十問十答百而死於父母未生前句下及問擊竹方云一擊忘所知更不假修持等鈔常為真實等四句各有事理永嘉云正直語者有二一稱法説令諸聞者信解明了二稱理説令諸聞者除疑遣惑柔軟語者亦二一者安慰語令諸聞者歡喜親近二者宮商清雅令諸聞者愛樂受習和合語亦二一事和合見鬬爭人諫勸令捨不自稱譽卑遜敬物二理和合見退菩提心人殷勤勸進善能分別菩提煩惱平等一相如實語者亦二一事實者有則言有無則言無是則言是非則言非二理實者一切衆生皆有佛性如來涅槃常住不變鈔十無盡藏者謂信藏戒藏慙藏愧藏聞藏施藏慧藏念藏持藏辨藏其説法時以廣長舌充滿世界者即第十辨藏也菩薩且然者以圓教菩薩初住即得普現色身三昧故疏證小謂人天小果漏無漏因大事謂開示悟入佛之知見鈔色身三昧即普現一切色身三昧得此三昧現一現多現小現大隨意自在是為大事同法華者法華神力品佛出廣長舌相上至梵世贊歎法華證一大事因緣也今六方諸佛現此舌相贊歎淨土豈小因緣也鈔諸佛相同則心同等者經云十方諸如來同共一法身一身一智慧力無畏亦然今外相既同內心何不然耶又心智願即法報應三身即法身般若解脫三德鈔溪聲即是者東坡詩云溪聲即是廣長舌山色無非清淨身是也情與無情融成一舌者是法界一相畢竟平等平等之中何分生佛及與萬象舌即法界法界即舌者以趣舉一塵無法不具故所謂舌為法界一切法趣舌也所謂華藏世界所有塵一一塵中見法界也所謂一時頓現非隱顯一切圓成無勝劣也説遍覆時豈不兩橛鈔令其安隱無諸障難者觀經疏云若為佛慈所護終得離苦永得安樂是也令其精進無有退墮者釋論云譬如魚子母若不念子則爛壞衆生亦爾佛若不念善根則壞是也念佛佛念感應自然者首楞嚴云十方諸佛憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛等鈔八地菩薩常為如來護念者以此菩薩已入無功用地住於報行若如來不護者彼時即入究竟涅槃棄捨一切利衆生業故諸佛親現其前説種種法與此菩薩無量無邊起智門常為如來之所護念也鈔普眼法門遍乎法界者普眼有二一大智普眼普照法界二大悲普眼普照衆生今雖兼二者意重大悲衆生遍法界則大悲遍法界大悲遍法界則此法門亦遍法界一説一切説也鈔純真絶妄四句謂真如本無妄染此真誠實也外教以六識不起虗偽一味專誠便為誠實者非也以此識因塵而有離塵則無全體是妄故一視一聽等者古云日用事無別唯吾自偶諧頭頭非取捨處處勿張乖朱紫誰為號邱山絶點埃著衣并喫飯運水及搬柴是也又視聽言動莫不與俱者所謂吾人食息起居無不承他恩力也亘古亘今常護常念者所謂真如內熏無有間斷也行住坐臥不離者箇者所謂夜夜抱佛眠朝朝還共起也上約自性出纏説不離此約自性在纏説不離也鈔大智無盡有二釋初一義約豎窮橫遍釋第二義約三德三智釋德智相對者以一切智即觀空之智般若掃蕩諸法故道種智乃觀俗之智解脫乃建立諸法故一切種智觀中道之智法身迥出二邊絶諸對待故鈔實大聲宏等名者實之賓也佛於僧祇劫海修無量行故名稱普遍聞於十方鈔權智照事者廣行萬行廣度衆生知法知機觀根授法熾然分別等實智照理者正念真如不生分別言語道斷直契無為如智不二等事理炳然雙照不昧者正權智照事時即實智照理熾然分別一切法於第一義而不動正實智照理時即權智照事心外無法滿目青山荷擔一切佛法者一切佛法不出二諦二智能擔曰大𦦨肩佛也鈔南方為離者易云離也者明也萬物皆相見南方之卦也火內暗而外明者離麗也一陰麗於二陽之中其象為火體陰而用陽也本光是衆生本來有此光明也鈔導引衆生令生勝意者衆生智淺不知佛境若不贊揚勝意不生故欲引導衆生令生勝意必須自贊也如釋迦世尊亦自贊云我是如來應供者我是知道者開道者説道者等亦普召羣機令生勝意也觀音師觀音者楞嚴云我於過去遇觀世音如來彼佛教我如幻聞熏聞修金剛三昧唯我獨尊者悉達太子初降生時一手指天一手指地周行七步目顧四方曰天上天下唯我獨尊鈔志公現十一面者梁武帝嘗召畫工張僧由寫志公像志公以指分披面門作十一面觀音相或慈或威或定或慧僧由竟不能下筆鈔建立義者上以大智建立菩提下以大悲建立衆生故鈔佛光映蔽一切者天人之光但蔽日月聲聞之光兼蔽天人支佛之光兼蔽聲聞菩薩之光兼蔽支佛唯佛光明映蔽一切之大光也鈔見思惑者見者若云見理時能斷此惑即從解得名若云見祇是假假者不實為義即當體受稱思惑入修道位重慮緣真此惑即除名思惟惑此從解得名若云思假及愛惑者此當體受稱然見惑從法塵起能障真理思惑從五塵起能牽三界此皆約欲界多分説細論不拘塵沙惑者謂衆生見思數多如塵沙乃他人分上之惑菩薩之行專為化他若令衆生能斷見思之惑於菩薩即是斷塵沙惑亦名別惑者別在菩薩所斷故也無明惑者謂於一切法無所明了故曰無明此惑乃業識種子煩惱根本聲聞緣覺不知其名別在大乘菩薩定慧雙修萬行具足方斷此惑故亦名別惑也內法內名外法外名能知能解名一切智能知一切道種差別分別無謬名道種智佛智中必雙照三智具足名一切種智此三智是果三觀是因始終心要云空觀者破見思惑證一切智成般若德假觀者破塵沙惑證道種智成解脫德中觀者破無明惑證一切種智成法身德然非智不斷非斷不智心要先言破惑後言證智是非斷不成智也今鈔先言智證後言破惑者是非智不能斷也鈔八萬四千清淨寶目者楞嚴云由我獲得妙妙聞心故我能現衆多妙容乃至二目三目四目九目八萬四千清淨寶目或慈或威或定或慧救護衆生得大自在毫相如琉璃筒者如來現相初生時牽長五尺苦行時長一丈四尺成道時長一丈五尺中空外明如琉璃筒鈔有染之智不發妙光者外道邪智二乘偏智皆無明為體不發妙光佛乃五住究盡淨極光通達也疏自性清淨者以性離惑染從本以來一切染法不相應故鈔湛若虗空者如實空中離一切法差別之相無虗妄心念故曾何涯際者離念相者等虗空界無所不遍故鈔八音者一二如文三和適音四尊慧音五不女六不誤七深遠八如文吳其沼乎者子胥言越十年生聚十年教訓二十年後吳其沼乎止遏者佛證法身得無盡藏所有神通妙用不可止遏也上義約體此義約用鈔譬如日天子下日輪普照喻也喻遇惡不息利益經中合法云不以衆生其性弊惡邪見瞋濁難可調伏便即棄捨不修回向不以衆生不知報恩退菩薩行不以凡愚共同一處捨離一切如實善根不以衆生數起過惡難可忍受而於彼所生疲厭心釋曰弊惡合生盲邪見合乾闥婆城令人妄謂為實故瞋濁合修羅手日為帝釋先鋒彼瞋故覆障也不知恩合閻浮樹崇巖邃谷凡愚共同一處合塵霧煙雲以雲霧能遍虗空猶彼凡愚同一處住故衆生數起過惡合時節改變謂頻起過忒乍善乍惡如彼晝夜陰陽易度等鈔梵網千珠者大梵天宮有網羅幢紅光互射彩色交輝時佛觀諸羅網因為説無量世界猶如網孔各各不同別異無量佛教門亦復如是等又種種法門互相融徹者一門涉入無量門無量門涉入一門也上義約遍覆説此義約交融説疏自性含攝不可盡者淨法滿足無有所少杳莫邊涯絶諸分量也鈔萬物之所成終成始者於時則為羣陰剝盡一陽復生於物則為實理具備生育之原於人則為智而為衆事之幹百千法門是般若德無邊德用是解脫德同歸方寸總在心源是總一法身德也覓之則無相無形者以自性非有相非無相非非有非無相非亦有亦無相非一相非異相非俱非相非一異俱相遠離一切諸相故出之則無窮無盡者此圓覺性本有過塵沙之妙用潛興密應無有休息無有窮盡故本來具足不假他求者妄心外念求之不盡淨德性滿無假外求也衆生心即凡夫本具性德如來藏是果佛圓明之體而衆生性德之佛非自非他非因非果即是圓常大覺之體故即名如來藏又衆生心者即是生滅門中不覺義依一念無明遂成業識復從業識轉起事識以隨事扳緣分別六塵是衆生心相也又如來藏者即是生滅門中覺義謂心體離念法界一相即是如來平等法身是即名為如來藏也而衆生心即名如來藏者以不覺心不離本覺故論云若離覺性則無不覺若離不覺之心亦無真覺自相可説又云譬如種種瓦器皆同微塵性相如是無漏無明種種業幻皆同真如性相是也鈔出入三界自在無礙者凡夫入三界為生死縛不得自在二乘出三界為涅槃縛不得自在佛悲智雙行往來自在故師子一吼百獸畏懼者永嘉云師子吼無畏説百獸聞之皆腦裂香象奔波失却威天龍寂聽生欣悅五種怖者一不活二惡名三死四惡道五威德四無畏者一一切智無畏二漏盡無畏三決疑無畏四説苦盡道無畏軌持義者若理法則能軌生物解任持自性如學人從緣一念得悟自性即此悟由乃從性軌生非外得故若教行等法則能軌正身心持令不失也鈔餘乘説法是為雜染者輪王説戒善帝釋説出欲實有善當行有惡當止二乘説四諦十二因緣法亦實有生死可厭涅槃可欣皆雜無明之染而不清淨若佛説一乘之法則染污清淨總屬空華生死涅槃無非夢幻唯此一事實餘二則非真所謂純一不雜具足清白梵行之相也覺非迷類者凡夫三諦俱迷二乘不迷真而迷俗菩薩不迷真俗而迷中佛乃三諦齊覺超九界衆生故佛即衆生者若依生佛對説則九界為生佛乃大覺今言佛即衆生者經云衆生無上者佛是則佛乃無上衆生也佛在異類者對九界云佛為異類若十界皆生則佛為同類也五分法身通大小乘今云五分乃大乘轉五陰身心得五分法身一切人天修羅外道二乘之香者人天有戒善香修羅有下品十善香外道亦有邪定邪慧之香二乘有戒定慧解脫解脫知見香疏斷智二德者如來果上有智斷恩三德今略恩德也鈔止能滅惡有體無用者聲聞雖斷煩惱證涅槃不能從空出假廣度衆生但有五分法身之香而無大用之光有體無用也佛則內斷煩惱具功德之香外度衆生出大用之光體用雙彰也以法身本具性德者雖云萬德嚴身然此萬德屬修修無別修皆從性起修以有恆沙性德方有恆沙修德不然修不從性乃有作之修無干性體云何能嚴法身耶佛之四德翻破凡夫無常計常等四倒二乘常計無常等四倒佛證三德祕藏不為四相所遷曰常猶如寶華不以春生不以秋瘁具無上菩提覺法樂無上涅槃寂靜樂曰樂猶如寶華珍奇粹美適悅人心具八自在我不待於外曰我猶如寶華不假陽和不資雨露不為五住所染二死所纍曰淨猶如寶華精金美玉淨無纖塵故鈔世出世間諸法無量則義無量者世間之法是陰入處界等世間之義則積聚涉入等出世之法是諦緣六度等出世之義則逼迫招感等凡夫知近不知遠但知世間法不知出世間法故二乘知偏不知圓厭有著空不知空有無礙故初心菩薩知總不知別但悟涅槃心不知差別義故知實不知權但知真如界內不知佛事門頭故佛乃五眼圓明三智圓顯無不見也鈔體絶攀緣者謂般若如大火聚衆生之心處處能緣獨不緣於般若之上也淨名上方取香飯者經云時維摩詰即入三昧用神通力示諸大衆上方界分過四十二恆河沙國土有國名衆香佛號香積今現在其國香氣比於十方諸佛世界人天之香最為第一彼土無有聲聞辟支佛名唯有清淨大菩薩衆佛為説法乃至居士遣化菩薩到彼請香飯曰願得世尊所食之餘當於娑婆世界施作佛事等疏觀音耳根此方教體者文殊選圓通偈云此方真教體清淨在音聞欲取三摩提實以聞中入離苦得解脫良哉觀世音勢至念佛不與圓通者偈云諸行是無常念性元生滅因果今殊感云何獲圓通鈔耳根不攝念佛念佛能攝耳根者若論法門念佛有事持理持理持則反佛自佛即是反聞自聞是念佛能攝耳根也而耳根則無事持之法是耳根不攝念佛也若論攝生念佛則普攝利鈍諸根下自地獄鬼畜悠悠凡夫上至具聞思修入三摩地者皆生彼國是念佛能攝耳根也而耳根圓通則下機絶分是耳根不攝念佛也今此耳根如詩禮者耳根獨被此方之機不通餘方如習詩禮據一邑言非合國故今此念佛如周易者念佛遍逗十方之機不局一方如彼周易通合國言非一邑故鈔以理奪事門者真如界內不立一塵有何淨穢何必願求欲顯真如之理故奪淨穢願求之事非真無淨穢往生之事也直指單傳者禪宗直指人心見性成佛單傳心印不立文字此道無佛無衆生者此道佛來也殺魔來也殺上無佛道可成下無衆生可度故此道舉心即錯動念即乖者古云莫動著動著即頭角生又云才擬議時白雲萬里等此道心境俱寂者古云外息諸緣內心無喘心如牆壁可以入道又云出息不涉衆緣入息不居陰界等易地則皆然者六祖處淨土諸師之時六祖亦贊西方淨土諸師處六祖時淨土諸師亦單弘直指矣鈔靈光獨耀二句靈光對妄識言妄識即八識之光八識各緣自境故不離中邊也靈光即真性之光真性絶乎對待故迥絶中邊真照無私二句真照對妄照言妄照即六識之照六識對境之照故不離彼此真照即自體之照自體本無能所故曰不分彼此迥絶中邊故一佛即多佛多佛即一佛一多無有障礙以一多盡妄識分別靈光非妄識故何分彼此故彌陀主即諸佛伴諸佛伴即彌陀主主伴交相成就以主伴皆妄照安立真照無妄照故無礙則千差雖隔而非殊如帝網千珠重重涉入故交成則萬法不期而自會如萬象森羅不離太虗空故今者此經當在何處者六方為能贊此經為所贊能贊之佛不離咫尺毫端所贊之經當在何處咦不離當處常湛然覓即知君不可見也鈔答彌陀功德下有二義前義乃卷多歸一後義乃展一為多雖有二義實一多相即展卷無礙以諸佛同一法身故疏菩薩欲聞而不得聞者或問云今博地凡夫聞者甚多將超菩薩耶答聞經大有差等凡夫耳雖聞名心不餐采或心雖思惟不踴躍篤行此但耳聽言詮心不得旨如不聞也今所謂聞者因詮得旨悲喜交集篤信力行乃心聞也豈不超凡小耶疏自性自軌等者經有軌持義自性本自軌持即是真經更於何處尋經佛有覺照義自性本自瑩照即是真佛更於何處覓佛若離自性別求佛法大似騎牛覓牛拋家浪走也鈔是真般若者終日轉經不知經轉以非真經也今無説無聞方是真般若所謂常轉如是經百千萬億卷也是名如來者外求有相佛與我不相干以非真佛也今無名無相方是真如來所謂真佛屋裏坐時人自不識也既知真般若則處處彌陀説法故歷歷分明既識真如來則時時諸佛現前故轟轟在耳歷歷分明則阿難所未聞經無不聞之説信已成兩橛何況有疑轟轟在耳則夜神所事諸佛一一承事説不空早已相乖況有空過鈔究竟極果者道窮妙覺位極於茶證一切種智圓觀第一義諦對等覺而言名之無上以等覺菩薩猶有微細無明未斷名有上士故正觀真諦者二乘修一切智正觀真諦對外道邪見而言名之曰正以九十六種外道各執異計皆邪見故等觀俗諦者菩薩修道種智等觀俗諦對二乘偏觀而言名之曰等以二乘棄有觀空墮偏見故正覺兼正等二義者以二乘對外道名正若對菩薩棄有觀空亦名邪故良以下出上所以佛與衆生本來無二者謂本覺之體因心果證無二無別也無明所覆遂成迷妄者謂不知真如法一故不覺心起而有其念遂成三細六粗也是則邪覺不名為正者謂凡夫雖具有靈覺而全皆是妄非為正故聲聞辟支止破見思者聲聞觀四諦辟支觀十二因緣雖行門不同而所斷者同是三界見思緣覺但侵習氣居聲聞上耳雖得菩提其道未中不名為等者菩提謂一切智但能從假入空不能從空入假故其道未中但悟偏真理故是偏覺未修平等觀故不名為等一切菩薩已盡塵沙未盡無明者別教自十回向十地至等妙二覺圓教自第十信至等覺是一切菩薩別十向已盡塵沙未斷無明初地始斷一品無明乃至妙覺斷十二品無明故未盡圓十信已盡塵沙未斷無明初住始斷一品無明乃至等覺斷四十一品無明故亦未盡雖得正等菩提佛地猶遠不名無上者菩提謂道種智分證一切種智以能雙遮雙照心心趣入薩婆若海故得正等菩提華嚴説十地菩薩充滿微塵國土於那由他劫修菩薩行所生智慧比一如來智慧百分不及一乃至優波尼沙陀分亦不及一故云佛地猶遠無論諸位菩薩即至等覺尚更有過者名有上士故不名無上惟佛一人妄盡覺滿者如菩薩地盡滿足方便一念相應覺心初起心無初相遠離微細念故名為妄盡究盡諸法實相邊際智滿種覺頓圓名為覺滿如望夜月更無有覺過於此者觀經疏云無上士者名無所斷無上士者更無過者如十五日月圓滿具足衆星中王最上最勝威德特尊是也鈔靈靈獨照下妄照有照故有所不照真照無照故無所不照妄知有知故有所不知真知無知故無所不知此知此照無明地無所減般若地無所增悟時無得迷時無失菩提即我下菩提者真覺也我者妄宰也若迷時有減有失悟時有增有得則真覺非妄宰妄宰非真覺今既迷時無減無失則妄宰全是真覺悟時無增無得則真覺全是妄宰若真覺妄宰是二則以我之妄宰退彼之真覺今既一矣求其進相了不可得云何有退耶鈔纍言不置者如信無垢濁心清淨信能悉施心無吝信能歡喜入佛法信能增長智功德信能必到如來地等於實德能深忍樂欲者謂於實則深忍於德則深樂於能則深欲也八識規矩云深忍者於諸法實事實理深信冥契忍可於心不為虗妄事理之所轉故深樂者於三寶清淨法身般若解脫真淨德中深信好樂不為妄染邪德之所惑故深欲者於一切世出世善深信有力能得善報能成道果起希望心求必得故於中忍可是信因樂欲是信果知之必好之也心淨為性者以心勝故唯言於心兼心所也謂此因果信不獨自體清淨復能清淨一切心及心所如極香物不獨自香復能熏香一切餘物如水清珠不獨自清復能澄清一切濁水其力最勝故云信為道源功德母流從此出而善從此生也信能必到如來地餘或難必而信可決也何言心淨下四句是正釋心淨為性又諸染法下九句是反明心淨為性也諸染法即貪等六煩惱無慚等二十隨也各自有相者如貪心所即於有有具染著為性能障無貪生苦為業無慚即不顧自法輕拒賢善為性能障於慚生長惡行為業等也唯有不信者不信即不信心所謂於實德能不忍樂欲心穢為體能障淨信惰依為用自相渾濁復能渾濁餘心心所等者以不信不但自體染穢復能穢濁一切心心所法如極臭物復能熏諸一切是也是故不信之力勝諸染心信正翻彼者今信心所正翻彼不信心所不信既自穢穢他則信自自淨淨他故淨為相也主乎心淨者維摩云若菩薩欲得淨土當淨其心隨其心淨則佛土淨鈔全以果覺為自信心者以彼果佛為我因心若離覺體別言信者是名邪信非大乘圓頓之正信也衆生心中念念常有佛成正覺者經云應知自心念念常有佛成正覺何以故不離此心成正覺故疏自性非去來今是已生今生當生義者若言過去已生現在今生未來當生此則三際遷流四相流轉非生淨土乃生娑婆也唯自性不落三際乃已生今生當生義也鈔萬年一念者十世古今始終不離當念故萬年為古一念為今萬年一念何古而非今一念萬年者一念普觀無量劫也一念為今萬年為古一念萬年何今而非古何古非今以今奪古也何今非古以古奪今也互奪兩亡則古今空矣坐斷三際當處西方誰非往生者此出三際時也過去下三際求心心不有心不有處妄元無妄元無處即菩提生死涅槃本平等則誰是往生者此空三際心也又誰是往生者生而無生也誰非往生者無生而生也生而無生無生而生是名已生今生當生鈔火車相現者觀經下品文云或有衆生偷僧祇物不淨説法無有慚愧以諸惡業而自莊嚴如此惡人命欲終時地獄衆火一時俱至遇善知識教令念佛尋得往生等劫石可磨者有石方圓大一由旬以諸天六銖衣過五百年乃拂一次磨此石盡名為一劫鈔真實不虗之如為信者信有真實義以若無有信萬事皆虗誑故出生無盡之智為願者願有出生義以萬德萬行皆從樂欲故鈔一身即法身一智慧即般若力無畏即解脫鈔恩踰慈母二句慈母之恩慈及一生他生未必能慈旻天之仁仁止一界他界未必能仁佛之慈仁無處無時而不慈仁故云踰也粉骨碎身二句古云假使頂戴經塵劫身為牀座遍三千若不傳法度衆生畢竟無能報恩者鈔善權方便曲就機宜度生之才也至德洪恩普霑萬類度生之德也有才無德失度生之本不能度生有德無才失度生之用亦不能度生才德兼備體用同施乃能度生也澄然不動頓息萬緣心行處滅也漠爾忘言永離戲論言語道斷也有一未忘則狂心未歇命根未斷不能證理思議雙亡乃能證理也以悲即智下以大悲故往來三界出沒四生終日度生以大智故一切衆生即寂滅相無生可度以智即悲下以大智故了法皆空不起一念不居生死以大悲故不住空寂常度衆生不證涅槃偏舉二字者以悲即智能仁即兼寂默以智即悲寂默即兼能仁乃至一言者能即兼仁用即體故仁即兼能體即用故寂即兼默心行處滅自然語言道斷默即兼寂言語道斷乃曰心行處滅故鈔獨證自誓三昧者證者忍也自誓三昧即如來因地四弘誓願願成佛道願度衆生願斷煩惱願修法門今已成佛斷無明成佛道轉法輪度衆生故為獨證此從如來得名依出世之主得名也劫初梵王名忍者空劫以前此界未有人民自梵王降生始有人類劫初梵王名忍遂名忍界此從梵王得名依世間之主得名也楞嚴譬之清水等者經云阿難譬如清水清潔本然即彼塵土灰沙之倫本質留礙二體法爾性不相循有世間人取彼土塵投於淨水土失留礙水亡清潔容貌汩然名之為濁汝濁五重亦復如是當有無五濁之善世者以人壽二萬歲前邪見不起煩惱輕微四趣空虗壽命久遠時分清淨之善世也鈔執我我所者內執為我外執我所或五陰中執一陰為我餘陰為我所執斷執常者或執諸法是無而起斷滅之見或執諸法是有而起常住之見中道即第八識以八識恆轉如瀑流故恆則不斷轉則不常今執斷常是失中道非因計因者非涅槃因計以為因或拔髮熏鼻臥棘投灰或持牛狗等戒種種無益苦行執粗為勝者唯執己見為是餘皆是非縱遇佛來亦不信受如擔麻為寶棄金不顧等擔麻棄金者昔有二人入山各擔一擔麻偶於中路見無數布帛一智者云吾棄麻擔布一愚者云吾擔來路多即是擔麻往前不遠又見無數白銀智者棄布擔銀愚者依舊擔麻前往又見無數黃金智者棄銀擔金愚者依舊只是擔麻自負所見不肯從人者大率如是撥無因果墮豁達空者不信造善為樂造惡為苦而言善惡苦樂一切皆空不知無我無作無受者善惡之業亦不亡墮豁達空起斷滅見故色等五陰各具四句三世迭之則成六十者如色陰者謂色大我小我在色中我大色小色在我中或即色是我離色是我色既如是四陰亦然五四共成二十句三世迭之成六十句鈔較前稍為重滯者以此五使與境相對方得生起不同五利才觸即生幾微迅疾故分之為九十八者見惑有八十八以前十使歷三界四諦下增減不同成八十八謂欲界苦十使具足集滅各七使除身見邊見戒取道諦八使除身見邊見四諦下合為三十二上二界四諦下餘皆如欲界只於每諦下除瞋使故一界各有二十八二界合為五十六并前三十二合為八十八更加思惑十使謂欲界貪瞋癡慢上二界貪癡慢共為九十八也細推則八萬四千者以十使互具成一百歷十法界成一千身口七支為七千三世共成二萬一四心各具二萬一共成八萬四千數以八萬四千律儀對治之則成八萬四千法門三災感召者一小三災初飢饉人壽減至三十歲時天不降雨由大旱故草菜不生思欲見水尚不可得何況飲食以是因緣世間人民飢饉死者其數無量二疾疫人壽減至二十歲時有大疾疫種種諸病一切皆起以是因緣世間人民疾疫死者其數無量三刀兵人壽減至十歲時諸人各起鬬爭手執草木即成刀鎗互相殘害以是因緣世間人民刀兵死者其數無量二大三災者一火災謂於劫壞時有七日出現大地須彌漸漸崩壞四大海水漸漸消盡大千世界及初禪天皆悉洞然無有遺餘是名火災二水災謂初禪以下七番火災壞於世界之後世界復成又於壞劫之時漸降大雨滴如車軸更兼地下水輪涌沸上騰大千世界乃至二禪天水皆彌滿一切壞滅如水消鹽是名水災三風災謂二禪以下七番水災以後世界復成又於壞劫之時從下風輪有猛風起兼以衆生業力盡故處處生風大千世界乃至三禪天悉皆飄擊蕩盡無餘是名風災又復當知火燒初禪有五十六番水淹二禪有七番風刮三禪有一番合之共六十四番也皆以類從者瞋感火災貪感水災癡感風災鈔橫計主宰為見我者橫計謂橫生計度主宰即我執也此即分別我執唯識云分別我執是由現在外緣力故非與身俱要待邪教及邪分別然後方起故名分別唯在第六意識中有是也見我如計即色是我離色是我我大色小色在我中色大我小我在色中等此從邪師訓誨而成分別我也俱生主宰為慢我者俱生對分別而言與生俱生非強思計度起故主宰者我執也此即俱生我執唯識云俱生我執無始時來虗妄熏習內因力故恆與身俱不待邪教及邪分別任運而轉故名俱生此復二種一常相續在第七識二有間斷在第六識是也慢我有七一我慢二慢三過慢四慢過慢五增上慢六卑劣慢七邪慢此七種皆依我相而生皆為慢我此則不用教誨生來即有俱生我也鈔第八識即黎耶本識種是種子謂本識中親生自果功能差別者釋云親生自果者從自種子親生現行果故功能差別者顯此種子非一種故然此種子與第八識及所生果不一不異體是本識果是現行識體望種為用現果望種為因故此三法理應不一不異也宗鏡云本識是體種子是用種子是因所生是果此三理應不一不異依業所引者謂隨宿因力生善惡等功能決定方成種子也外色即息暖屬第八親相分內心即第八現行識屬第八見分由種子業力此三相持不散名命根不斷一不相持或暖氣離身或出入息斷或見分離體名命根斷也疏此之五濁且據果言者謂上文所解五濁且一往就果邊説非若楞嚴所説通乎因果也或配三細者是諸師以三細六粗釋五濁也或配五陰是孤山約五陰妄想為五濁也義亦不異者謂法相雖不同而義理則無別也鈔三細等者起信論云不如實知真如法一故不覺心起而有其念依不覺故生三種相一者無明業相以依不覺故心動説名為業覺則不動動則有苦果不離因故二者能見相以依動故能見不動則無見三者境界相以依能見故境界妄現離見則無境界以有境界緣故復生六種相一者智相依於境界心起分別愛與不愛故二者相續相依於智故生其苦樂覺心起念相應不斷故三者執取相依於相續緣念境界住持苦樂心起著故四者計名字相依於妄執分別假名言相故五者起業相依於名字尋名取著造種種業故六者業繫苦相以依業受報不自在故以劫濁配業相者劫者時也心性本淨由無明初動時即渾濁故曰劫濁今業相亦然無明初起成業相故次以見濁配轉現者見者能見所見也前業相能所未分次成轉現雖無分別能所宛然心境具足故以見濁配轉現次以煩惱配智相相續相執取計名者煩惱不出我法二執我法復分俱生分別今智為俱生法相續為分別法執取為俱生我名字為分別我四相皆屬煩惱道故次以衆生配起業相者衆生者衆法相生亦處處受生故曰衆生以由造善惡不動等業方感衆法處處受生故次以命濁配業繫苦者命濁即八識命根為一期衆生之總報主為業所繫住時決定不得解脫故以劫濁配色陰者楞嚴云汝見虗空遍十方界空見不分有空無體有見無覺相織妄成是第一重名為劫濁此即是以劫濁配色陰也以相織妄成是空與見相織而妄成色陰此即名為劫濁豈不是以劫濁配色陰蓋四大根塵同名色陰而空見不分之時根塵渾亂非劫濁而何分空分見本無邊畔故云空見不分以無體之空織無覺之見以無覺之見織無體之空乃妄見空而兩無其實此湛圓明心為頑空所渾而成劫濁是性為渾濁次以見濁配受陰者楞嚴云汝身現摶四大為體見聞覺知壅令留礙水火風土旋令覺知相織妄成是第二重名為見濁此即是以見濁配受陰也以相織妄成是六根與四大相織而妄成受陰以其見境領納渾濁真性即名見濁豈不是以見濁配受陰次以煩惱濁配想陰者經云又汝心中憶識誦習性發知見容現六塵離塵無相離覺無性相織妄成是第三重名煩惱濁此即是以煩惱濁配想陰也以相織妄成是知見與六塵相織而妄成想陰既取著所領則擾亂甚前既渾真性即名煩惱濁豈不是以煩惱配想陰次以衆生濁配行陰者經云又汝朝夕生滅不停知見每欲留於世間業運每常遷於國土相織妄成是第四重名衆生濁此即是以衆生濁配行陰也以相織妄成是知見與業運相織而妄成行陰而去留假合渾濁真性即名衆生濁豈不是以衆生濁配行陰次以命濁配識陰者經云汝等見聞元無異性衆塵隔越無狀異生性中相知用中相背同異失準相織妄成是第五重名為命濁此即是以命濁配識陰也以相織妄成是一同一異如經緯密織而成識陰而識住命存識去命謝渾濁真性即名命濁豈不是以命濁配識陰為説稍殊而義則大同者離九相無五陰離五陰無九相名殊而體一也疏濁惡不善者濁者五濁不善即十不善五苦謂五道非樂故鈔五道之苦者地獄燒煮苦餓鬼飢虗苦畜生屠割苦人間八種苦天上五衰苦此初以五道非樂釋五苦也或五痛五燒五惡等者五惡謂殺生偷盜邪淫妄語飲酒五痛即五惡之現在華報五燒即五惡之三塗果報此次以五罪招報釋五苦也身屬四生者卵因想生胎因情有溼以合感化以離應情想合離更相變易所有受業逐其飛沈疏始覺冥乎本覺等者諸佛久成是本覺義釋迦今成是始覺義始覺在纏曰本本覺出纏曰始始本不二是佛佛互讚義釋迦乃大悲利生是照義牟尼乃大智冥理是寂義寂照同時是能仁寂默義五濁是染義菩提是不染義隨緣不染不染隨緣是五濁菩提義鈔因該果海等者因該果海始即本也果徹因源本即始也用不離體能仁即寂默體不離用寂默即能仁故知下既云始本二覺為此佛彼佛寂照自心為釋迦牟尼不獨此佛是寂照自心此佛彼佛同歸寂照自心始覺本覺即寂照之體故既云不染而染是菩提五濁義染而不染是五濁菩提義則煩惱菩提不出悟迷一念既此佛彼佛同歸自心煩惱菩提不離一念則本師即我我即菩提既我即菩提則得菩提孰為能得孰為所得耶鈔十種難信大約不出狂愚二病前八係愚者高推聖境故不信第九係狂者蔑視西方故不信第十雙兼二者以愚者聞理之無故疑不信狂者聞事之有故疑不信鈔欲令衆生皆得聞知一切世間難信之法者是文殊告彌勒之辭謂四十年前所説乘是三乘性有五性人皆易信若説三乘是一乘五性是一性人所難信尋常但説唯佛一人獨得正覺今曰小乘羅漢皆當作佛人所難信尋常但説修行三祇方始成佛今曰即心是佛人所難信今欲説此難信之法欲令衆生得知即心即佛無二無三之旨故現斯瑞耳此經難聞信受亦難是法師品佛告藥王之辭蓋以行菩薩道者得見聞讀誦是經乃能善行菩薩之道求佛道者若見若聞是法華經聞已信解受持者得近阿耨多羅三藐三菩提故聞説此經心即狂亂狐疑不信者此經非大乘根器不能持誦所感功德非常人可聞聞必狐疑不信蓋此經之義趣與其果報不可思議故也以不驚不怖不畏為希有者大乘之法本自難信難解非大乘根器卒聞是法未免驚愕疑怕畏懼能聞是法而不畏懼者實為希有鈔不可以有心求等者自性非有有心則墮增益執自性非無無心則墮損減執自性離言説相語言則墮妄想自性離心緣相寂默則墮無記靈山上德終成敗北者靈山會上五千退席及華嚴會上不見舍那之輩敗北者軍戰敗曰北漢地金剛始欲滅南者德山號周金剛不信南宗單傳直指之説作青龍鈔徑往南方欲滅南宗路逢婆子賣點心婆子問云所擔者何物答曰金剛經青龍鈔曰金剛經云三心不可得尊者欲點何心山無對至龍潭往復叩擊恍然大悟乃曰窮諸𢆯辨若一毫置於太虗竭世樞機似一滴投於巨壑乃焚青龍鈔云鈔謂盡説餘經手擲須彌足動大千等者是多寶品如來普告大衆之辭盡説餘經如恆河沙固是難事然皆稱機之談人亦易信不足為難若以手掌接須彌而擲方外又以足指動大千而擲他國雖皆難事然有神通道力者即能為之猶未為難唯於惡世宣説此經最為難事人不信故生怨嫉故招罵詈故加杖木故若無大願生退屈故今經難説亦復如是者衆生我慢心高無明堅厚不肯信受多生怨嫉亦猶是也剛強難伏者法華云是娑婆國中人多弊惡懷增上慢功德淺薄瞋濁諂曲心不實故淨名云此土衆生剛強難化故佛為説剛強之語而調伏之言是地獄是餓鬼是畜生乃至云譬如象馬𢤱悷不調加諸楚毒然後調伏如是剛強難化衆生故以一切苦切之言乃可入律疏心境雙融是行此二難義者得道乃徹悟內心説法乃化他外境故心者得道義境者説法義今性中心境雙融是二難並運義鈔心逐等者心逐境生則心無自性心體本寂也得道乃徹悟內心今心體本寂則無所得者名得菩提境隨心現則境無自性境體自空也説法乃化他外境今境體自空則無法可説者是名説法內心外境互奪兩亡自覺覺他二覺俱泯矣鈔菩薩真俗雙融隨類應機者凡夫著俗不通真二乘耽真不涉俗如徐六擔板各執一邊菩薩則真俗雙融不滯生死不住涅槃故或現二乘同真或現六凡同俗隨類應機不獨比丘中攝也修羅詳有四種者一從卵生鬼趣所攝二從胎生人趣所攝三因變化有天趣所攝四因溼氣有畜生趣攝疏究竟圓滿是説經已者若言如來將罷法座為説經已此文字教經非自性真經也自性真經則首尾圓照無欠無餘未召當機説法已竟周遍含容一切世間義者若云天龍八部為一切世間此有情世間非正覺世間也正覺世間凡聖該羅千足萬足未擊犍槌人天畢集鈔妙首白槌者世尊一日升座文殊白槌云諦觀法王法法王法如是世尊便下座天童頌云一段真風見也麼綿綿化母理機梭織成古錦含春象無奈東君漏泄何雙林撫尺者梁武帝請傅大士講金剛經大士上座撫尺一下便即下座帝愕然志公問云陛下還會否帝曰不會志公云大士講經竟鈔念諸佛念諸法者諸佛謂究竟理即所謂平等法身遍一切處也諸法謂究竟智即所謂圓滿祕密藏無量妙法門也初地證遍滿法身與妙覺法流水接故能念諸佛法生大歡喜也轉離一切境界故生歡喜者初地菩薩證三無性永離人執不著外境法執分別亦不現行故云轉離一切世間境界親近一切佛故生歡喜者初地得無分別心與諸佛智用相應唯依法力自然修行熏習真如滅無明故故云近一切佛又此地菩薩於一念頃能至十方無餘世界供養諸佛請轉法輪故云親近一切佛初行亦名歡喜者此位菩薩多行施度內外一切悉皆惠施見來乞者心大歡喜我得善利彼受施者亦復歡喜故初住亦云獲無邊歡喜者以初住菩薩信知一切法從本以來自涅槃故又此位能八相成道自覺覺他故獲無邊歡喜隨其分量得法喜者初心下凡不能入理治惑及與生善聞世界悉檀亦得歡喜益也鈔發無上正覺心是圓初信也得法眼淨是圓初住外遠見塵內離垢染則法眼圓明絶諸瑕翳矣阿那含者藏第三果約圓是第六信漏盡意解是藏第四果約圓是第七信得不退轉者不退有三破見思名位不退破塵沙名行不退破無明名念不退今四十億菩薩所得亦合隨其分量也六種震動者動起涌震吼擊也三種是形三種是聲於形聲中各舉其一故言震動也搖播不安之謂動自下升高之謂起忽然騰舉之謂涌隱隱出聲之謂震雄聲猛烈之謂吼砰礚發響之謂擊共有十八相一方動謂之動四方齊動名遍動八方齊動曰普遍動餘五亦然又直動為動四天下動為遍動大千界動為等遍動下五亦然不退忍即柔順忍也位在圓十信此約淨土三法忍説若約教道説通教三法忍此不退忍亦即是柔順忍以此忍屬性地性地方得不退故別教五忍則此不退忍即是信忍以信忍屬十住十住已得不退故圓教四忍此不退忍亦即是順忍而圓七信正屬不退故未曾發意今始初發亦即是圓初信或是圓初住以下文有次第成佛同名妙音故得授記法忍是圓初住得無生法忍光明故或是八地是名真得無生法忍故疏囑纍者謂將此法門囑於汝纍汝宣傳也古德云你若不是此等人自然不來仰及你之意又囑者是如來金口付囑令彼流通纍者今菩薩懸係於心永無忘失也鈔為他開示當令書寫執持者法華開五種法師一受持信力曰受念力曰持即今執持是也二讀三誦對文曰讀不忘曰誦此二亦攝在今執持中四解説宣傳曰解説即今為他開示是也五書寫即今書寫是也鈔以總持持餘尊法為教理流轉之因者此同易卦之乾元義也蓋世間出世間初無二理世間法則始自乾元資始貞德收藏為將來發育之機出世間法則始自華嚴初談終至彌陀後滅為後劫流傳之本非乾貞則世間之生機盡滅非彌陀則出世之慧命皆殘則此經此理為諸佛相傳慧命為衆生出世之本源其關係豈小因緣耶疏自性無惱是歡喜信受者若云聞法而喜領法而受是為外隨境界所遷非真歡喜信受也自性具有過恆沙等煩惱之義是真歡喜信受也自性無住是作禮而去義者若云翹勤而禮退席而去是為妄緣風力而轉非真作禮而去也自性無住了無根本是作禮而去也鈔煩惱本寂者上云無惱是喜義尚有喜在喜非樂土也今則煩惱本寂歡喜亦空則苦土誰非樂土上云無住是去義尚有去在去非往生也今則來實無來去亦何去則往生畢竟無生以有生生彼土者是生彼土非生自心也以無生生彼土者非生彼土實生自心也然後無問自説世尊免付空談此上不負弘法之主獨任當機身子不孤重託此下不負受囑之人雖然理非事外性即相邊若其外極樂九蓮之土別説唯心捨彌陀萬德之名別求自性是當渡問津對燈覓火矣故曰不識彼關津隔江猶問涉早知燈是火飯熟已多時鈔仙陀婆者是梵語有鹽水馬器四名惟有智臣乃能辨識如王食時呼仙陀婆則知要鹽如王洗盥呼仙陀婆則知要水如王作衆務時呼仙陀婆則知要器如王出遊索仙陀婆則知要馬餘可例知者一心不亂斷無明見自性大明呪也往生彼國究竟成佛無上呪也證無生忍回入娑婆普度衆生無等等呪也疏自性空即空如來藏所謂一空一切空無假無中無不空也自性有即不空如來藏所謂一假一切假無空無中無不假也自性不有不空即空不空如來藏所謂一中一切中無空無假無不中也鈔覓心了不可得者二祖參初祖時當隆冬積雪至膝堅立不動初祖問欲求何事二祖曰乞師為我安心初祖曰將心來為汝安二祖云覓心了不可得蓋已得心空已到覺心初起心無初相地位也即心無所不具者所謂自體有大智慧光明義故遍照法界義故真實識知義故自性清淨義故常樂我淨義故清涼不變自在義故具足如是過於恆沙不思議佛法乃至滿足無有所少義故名為法身如來之藏也當總持而不立纖塵者妙有即是真空也故有是即空之有無根本而出身萬法者真空即是妙有也故空是即有之空即有則不空是如實不空也即空則不有是如實空也而如實不空與如實空不離一真如心而一真如心正是寂光淨土故曰唯是一心是名淨土重刻阿彌陀經疏鈔演義原序嘗聞至道無言原不假於文字妙義淵深必有俟於注疏是以大善知識慈悲心切每於經典出妙手慧眼句疏字解欲使參證者直明向上一著而彌陀尊經乃蓮池大士疏注於前古德大師演義於後其宣明妙義更為親切但舊板無存刊板難得京師為首善之大剎雲集向上者往往有失指南之歎誠目覩情狀不忍經義侵晦搆求原本重付剞劂流行海內俾同志之人由此鑽研精進解向大道至妙悟真源後並無假於語言文字庶不負疏鈔演義之大慈悲心以報佛恩於萬一而凡我同志尤期於亡經失注之處隨在補救斯即十萬八千恆河沙數之功德矣是為序時乾隆十七年歲次壬申二月之吉慈因後學沙門惟誠重刻
