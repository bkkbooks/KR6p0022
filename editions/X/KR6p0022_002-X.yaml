body:
  text: 題義先明總題使有綱領者以經之有題如網之有綱衣之有領提其綱則眾目皆舉挈其領則眾縷皆來也鈔觀經言佛便周者佛是所觀勝境舉正報以收依果則攝日冰池樹等六觀也述化主以包徒眾則攝觀音勢至三輩等九觀也是觀雖十六言佛便周故題云佛說觀無量壽佛經疏本師釋迦牟尼者梵語釋迦此云能仁是姓梵語牟尼此云寂嘿是名即悉達太子出家所成之佛也為娑婆教主故云本師鈔文質之謂者梵本皆西域之語質而無文譯以此方之語則用六經莊老之文文采綺麗煥然成章也震旦之言者東方曰震初明曰旦此方居閻浮之極東日出之處故名震旦自覺異凡夫三句凡夫迷五住雲沉三有海全不自覺佛則朗然大覺異凡夫也二乘自求出世無兼利心不能覺他佛則大悲普度異二乘也菩薩無明未盡法性未圓不能覺滿佛乃道窮妙覺位極于茶異菩薩也又離心名自覺三句心者識心色者心所變也以心望色心親色疎心親名自色疎名他既空能變識心名為自覺復空所變妄色名為覺他至心色盡空并空亦空名為覺滿知一切眾生數非數常非常者光明疏云數者六凡二乘以墮有墮無皆落于數也非數者大乘菩薩以親證法身法身不落諸數也常者圓頓一乘非常者六凡三教佛乃無所不知名一切種智也又數及非常為俗諦境知此稱道種智非數及常為真諦境知此稱一切智數即非數常即非常為中諦境知此稱一切種智也如來至佛共有十號者以無虗妄名如來良福田名應供知法界名正徧知具足三明名明行足不還來名善逝知眾生國土名世間解無與等名無上士調他心名調御丈夫為眾生眼名天人師知三聚名佛具茲十德世出世間宗主者以名者實之賓世尊十號世尊十德也具此十德為九法界所宗故名世尊是十號是別世尊兩字是總也具二智五句二智即根本後得二障即煩惱所知二諦即真俗夢覺華開如大夢覺如蓮華開若分配之根本智斷煩惱障覺真諦理得自利之益如大夢覺後得智斷所知障覺俗諦理得利他之益如蓮華開始乎理即五句約事故言六約理故言即又欲令免于上慢故言六欲令免于退屈故言即理即者謂眾生本具佛性之理與如來無二無別故涅槃云一切眾生皆是佛是為理即佛也古云動靜理全是行藏事盡非冥冥隨物轉杳杳不知歸是也名字即者謂或從知識處聞或從經卷中得通達解了一切諸法無非佛法是為名字即佛也古云乍聽無生曲纔聞不死歌方知當體是翻恨自蹉跎是也觀行即者謂知一切皆是佛法必須心觀明了理慧相應所行如所言所言如所行是為觀行即佛此五品位也古云念念照常理心心息幻塵遍觀諸法性非假亦非真是也相似即者謂于觀行中愈觀愈明愈止愈寂雖未能真證其理而依稀見理彷彿證真是為相似即佛此十信位也古云四住雖先落六塵未盡空眼中猶有翳空裏見華紅是也分證即者謂無明惑有四十二品至此破一品無明證一分法身是為分證即佛此初住至等覺位也古云豁爾心開悟甚然一切通窮源猶未盡尚見月朧是也究竟即者謂五住二死盡淨無餘無量甚深永絕思議是謂究竟即佛也古云昔年真是妄今日妄皆真但復舊時物更無一法新是也十身者三句一正覺佛示成正覺故二願佛隨願現身故三業報佛萬行感故四住持佛自身舍利常住故五涅槃佛示現滅度故六法身佛法界一相故七心佛具大慈心故八三昧佛常在定故九本性佛智了本性故十隨樂佛隨樂示現故天有四九句一世間天者國王雖處世間錦衣玉食瓊宮瑤臺受用似天故曰世間天二生天者若精修十善兼坐未到地定得生六欲天若進修根本四禪定者得生色界天若進修四空定者得生無色界天此三界天不離生滅福盡還墮故曰生天三淨天者羅漢辟支斷四住惑證真諦理煩惱淨盡故曰淨天四義天者十住菩薩進斷界外見思惑證第一義諦故曰義天也疏悅所懷者悅是暢悅懷是心懷若就此經即是如來久修久證念佛三昧蘊之在懷今得機而說乃暢昔之所懷四辯宣演者以無量善巧智起四無礙辯用種種言辭而演說法也十二部等是明所說法相謂或作長行說或作重頌說或作未曾有說或作無問自說說等此十二部通乎大小或云小乘唯有九部大則十二或云小有十二大唯九部或云大小皆有十二等者等八萬四千法藏六度四等一切法門至四悉檀是明能說善巧謂所說十二部等種種諸法一一皆作四悉利益至者謂自種種所說以至種種能說一一無非說義也皆是說義者通塗明其說相也若據今之說正在念佛次文委示今不須陳故且通塗明其說相鈔四辯者一義無礙辯謂了知一切諸法義理通達無滯二法無礙謂通達一切諸法名字分別無滯三詞無礙謂于諸法名字義理隨順一切眾生殊方異語為其演說能令各各得解辯說無滯四樂說無礙謂隨順一切眾生根性所樂聞法而為說之圓融無滯四皆無礙名之為說者一有所礙則心不悅心不悅則非說也以說者即悅故諸佛依二諦為眾生說法者二諦真俗二諦也有時一切盡掃不立一塵依真諦說也有時一切建立不捨一法依俗諦說也詞無礙智以世智差別說者世智即了世俗諦之智如來于諸法名字義理隨順眾生殊方異語為其演說皆以了世諦之智差別說也樂說無礙以第一義智善巧說者第一義智即了第一義之智也如來隨順一切眾生根性所樂聞法而為說之圓融無滯皆以了第一義智善巧說也言善巧者第一義諦本無言說凡有言詮皆善巧故世界悉檀者世即隔別義界即界分也蓋由眾生根器淺薄故佛隨其所樂欲聞為之次第分別而說令生歡喜作歡喜益也為人悉檀者謂佛欲說法必觀眾生機器之大小宿種之淺深然後稱其機宜令生正信作生善益也對治悉檀者謂如眾生貪欲多者教觀不淨瞋恚多者教修慈心為對此諸病說此法藥徧施眾生作滅惡益也第一義悉檀者第一義即理也謂佛觀眾生善根已熟即為說法令其得悟作入道益也一切諸法隨宜而說要歸作四說使得四益者一切諸法不出八萬四千法門而八萬等法通乎四教即是生滅八萬無生八萬無量八萬無作八萬如生滅八萬趣舉一法須開四門約有門說念念無常如燈焰焰約空門說三假浮虗猶如雲霧雙亦門說二相從容雙非門說二相俱捨四中一門機生熟故四悉被之為未種者作世界說令其歡喜為已種者作為人說令其生善惡未破者作對治說令其滅惡根已熟者作第一義說令其入理佛智鑒機說之必中知不入理令得三益知不破惡令得二益無善可發作世界說但生歡喜故云要歸作世界等四說使得歡喜等四益而已鑒機授法其文繁廣者如上明即一有門被機四悉餘之三門被機亦爾八萬中一四門四悉被機既爾其餘諸法四門四悉被機亦然一教八萬門四悉既然三教亦爾故云鑒機授法其文繁廣也疏言佛功德不可窮盡者功德二字該盡三身四智十眼十通無量百千陀羅尼門等不可窮盡者十地莫能窮其源等覺不能窺其頂故是無量中姑舉二事者如華嚴八地得無量身無量音聲無量智慧無量受生無量淨國教化無量眾生入無量法門具無量神通有無量眾會道場差別住無量身語意業則此壽命光明非姑舉二事而何鈔眾多無有數量二句如佛壽命經不可數劫光明有不可說數此眾多無數量也即此壽光周遍法界無有邊際此廣大無有限量也十大數中之無量猶為有量之無量無窮盡之無量是真無量之無量鈔佛所說教總名修多羅者以此修多羅三字乃大藏之都名三學之通號以若經若律若論皆上契諸佛之理下契羣生之機故經復多義者以彼方則有七義此方復有四義故云多義也不出四義者以彼方雖有七義不出貫攝二義此方雖有四義不出常法二義故云不出四義也一出生者出生諸義及聖果故二顯示者顯示法相故三湧泉者無窮義味涌注無盡故四繩墨者楷定邪正故五結鬘者貫穿諸法故萬世不易曰常十界軌則曰法聖智通遊曰逕古今共宗曰典良以下先釋貫攝二義可攝五義是貫攝二字足盡彼方之義也又常者下次名常法二義可攝逕典二義是常法二字足盡此方之義也則彼方下總結四字能盡經義故雖有多義不出四義也正翻為線者以席經井索等皆為旁翻故線有貫持義者收前佛地二義也此二足該出生五義者復收前雜心五義也貫穿可總該五義以出生等同明所說之理故攝持止該出生繩墨二義以出生聖果及楷定邪正不墮邪見故若貫穿攝持通所說所化則二俱該五矣疏經之一字是為通名者除律論外十二分教皆契經故佛說五字是為別名者佛說阿彌陀非大方廣佛等故如教行理通別亦爾者若據觀經疏中教通別者如上所說行通別者為行不同從一乃至無量即行別同會常樂即行通理通別者理雖無名將門名理理隨于門四四十六即名理別門隨于理即名理通此約一化論通別也若鈔中所解乃約一題論通別聞首題名功德無量者首題既即三德祕藏心聞祕藏則淨智妙圓體自空寂所得功德詎可量耶如教中說者起信論云一者體大謂一切法真如平等不增減故二者相大謂如來藏具足無量性功德故三者用大能生一切世出世間善因果故鈔本理立教者從實相般若流出文字般若所謂從真如流出十二分教也依教修行者從文字般若修觀照般若依十二分教修行萬行也從行顯理者因觀照般若悟實相般若因修萬行乃契真如也教即般若者十二分教即文字般若以般若乃照境之慧十二分教即照機之慧故行即解脫者以解脫乃法性妙用萬行亦隨緣妙用故又理通教行法身即般若解脫者全性成修故理通行法性遍在諸經故理通教直法身非法身法身必具般若解脫若法身離二德即偏真之理非法身故行通教理者全修即性故行通理菩薩萬行開悟眾生故行通教直解脫非解脫解脫必具法身般若若解脫離二德即孤調解脫非大解脫故教通理行者文字性空即是實相故教通理隨文成觀故教通行直般若非般若般若必具法身解脫若般若不具二德即人空般若非大般若故若通若別亦如上例者諸經皆具體相用三故名為通專指此經則佛是體壽是相光是用局此異餘故名為別又體即法身相即般若用即解脫體通相用法身即般若解脫乃至相通體用用通體相舉一即三例上可知疏或單或複者謂人法譬單三複三并具足一以成七別也鈔大方廣具足人法喻者大方廣是法大即體大法體豎窮橫遍稱體而周故方即相大方者法也軌持為義恒沙性德皆可軌持故廣即用大法性之用廣多廣博故佛是人能證三大之人故華嚴是喻菩薩修萬行之因華嚴一乘之果海故大方便人法無喻者大方便報恩是法佛者是人方便者權宜也報恩者經云大孝釋迦尊歷劫報親恩積因成正覺而云大方便者報恩方便乃即體之權非體外之權故云大也妙法華經法喻無人者實相妙法巧喻蓮華有為蓮故華華開蓮現華落蓮成三義以喻本迹二門為實施權開權顯實廢權立實三義菩薩瓔珞經人喻無法者菩薩是人瓔珞是喻瓔珞所以嚴身以喻萬行嚴法身故大般若經單法無人喻者般若此翻智慧今存梵語者以智慧輕薄般若尊重五種不翻中尊重不翻也梵網單喻無人法者乃佛觀大梵天王網羅幢因為說無量世界猶如網孔一一世界各各不同別異無量佛教門亦復如是菩薩以梵行莊嚴法身猶梵王以梵網為華飾也法從人說喻以人舉者如此經乃佛宣說依正莊嚴信願往生之法舉大如車輪喻百千種樂同時俱作之喻是也鈔一切功德皆從佛出者佛乃功德叢林真如庫藏經云剎塵心念可數知大海中水可飲盡虗空可量風可繫無能盡說佛功德略取則條陳之切要者謂條陳切要取而抄之取其要而略其緩也寫錄即注記之顯明者謂記註得鈔而寫錄之則記注之文洞然煥然彰灼顯了也疏自性覺是佛義者所謂色見聲求是行邪道若言他是佛自己却成魔自性本始二覺者起信云本覺義者對始覺義說以始覺者即同本覺始覺義者依本覺故而有不覺依不覺故而有始覺等自性覺體遍照是說經義者以說經者因眾生沉迷不覺故如來以般若真光而覺照之今覺體遍照豈非說經義耶如古云出息不涉眾緣入息不住陰界常說如是經百千萬億卷鈔即事即理等是理事相即門以即事即理故事必稱理也又即理五句是依理成事門隨其心淨悟惟心淨土正所依之理也則佛土淨感依正莊嚴正所成之事也既依理成事故事必稱理也覺是總義者釋上自性覺是佛義覺體之中等釋上自性覺無量是阿彌陀義廣者從用得名廣多廣博為義廣多者此覺體本有過塵沙之妙用潛興密應無有休息無有窮盡廣博者此無盡之用一一同于覺性無有邊際無有分限大者當體得名常徧為義當體者不同揀小之大大外有小可揀猶是分限今覺體體無邊涯絕諸分量強名大也常徧者常則豎通三世涅槃云所言大者名之為常徧則橫該十方涅槃云所言大者其性廣博猶如虗空約先後則彌陀古佛者彼佛成佛以來于今十劫故此佛新成者釋迦如來周昭王時方始成道故是彼本此始者先成者為本今成者為始也約因果則此佛教令往生者是因乃得見阿彌陀佛是果是此本彼始者修因為本果證為始也本始互融者覺體在纏名本覺覺體出纏名始覺無明性空在纏即出纏本融始也斷盡無明始覺同本覺始融本也鈍根守事相而自足者但知以生求佛捨此趣彼不知唯心之理因稱理故方知事中有至理存焉非徒事相此破鈍根著事而迷理之惑也利根崇理性而著空者但知自性惟心耽著頑虗不信有西方淨土因稱理故方知至理不離事相不落頑虗此破利根著理而迷事之惑也又此經下恐有問云既淨土法皆欲會歸理性則修行者只須直悟自心之理何必念佛求生故云此經本為托彼名號顯我自心與十六觀經同意者觀經疏鈔云行者應知據乎心性觀彼依正依正可彰托彼依正觀于心性心性易發今此經乃托彼名號顯我自心正與彼同意也又菩薩猶宜下恐又問云未悟心者應當念佛求生已悟心者似不必然故云菩薩猶宜近佛維摩下引證已悟求生可知昔人謂華嚴下觀行即觀心稱理也以華嚴稱性之談故一切法可觀心稱理方等已下諸經事理猶分心法未即何得稱理以此經判歸方等不應稱理故古德答下了義指華嚴不了義指方等而下惟一心者法界心中不見精粗大小同一妙心故鈔經稱母佛者謂摩耶夫人以如幻法門幻生諸佛故世尊未降生時十方諸佛一日三時于摩耶腹中說受生法門十月滿足右脇降生而曰豈唯釋迦我為其母將來賢劫千佛亦我為其母世世佛生我為其母也子佛者即羅睺羅曰豈唯釋迦我為其子賢劫千佛亦我為其長子疏重重無礙故名融通隱隱者融通之貌即百界千如之意也鈔即梵可以成華者句句梵語句句華言顯非密外者華言顯而易了梵語密而難知即梵即華顯非密外也方華下例知當暗中有明者參同契云當明中有暗勿以暗相遇當暗中有明勿以明相覩明暗互相對比如前後步威音那畔不離今日門頭今日門頭不離威音那畔夜半正明天曉不露也互相掩映約二法交徹說如東鏡入西鏡時東鏡映西鏡西鏡掩東鏡西鏡入東鏡亦然涉入重重約重重交映說如東鏡入西鏡西鏡即帶東鏡之影涉入東鏡等西鏡入東鏡亦然如是乃至重重無盡楞嚴云譬如雙鏡光明相對其間妙影重重涉入也又如千珠帝網一珠涉入千珠千珠涉入一珠妙影重重無盡無盡也妙體融通者謂妙心體具如如意珠心佛及眾生是三無差別此心即空即假即中圓融無礙通達無滯也不一不異者以隨緣故不一以不變故不異以有如實空如實不空故不一以一切法悉皆真一切法皆同如故不異以十法界假名差別故不一以一念心全體具足故不異以具一切法造一切法故不一實無能具所具能造所造故不異三諦宛然故不一舉一即三言三即一故不異有顯有密有明有暗故不一顯非密外密在顯邊暗中有明明中有暗故不異掩映重重故不一互相涉入故不異乃至有事有理有不一不異即是一異而其實三世諸佛到此口掛壁上是真不一不異也看翻譯高僧到此何處著脚疏文字般若者略有三義一者文字從般若流出故謂如來憫眾生迷昧乃放般若真光而覺照之為說種種文字因名文字般若也二者文字能生般若故謂眾生依如來言教能開示悟入佛之知見遂名文字般若也三者文字即是般若故為一文一字當體即空即假即中當體即是解脫相故名文字般若也然此三義自是泛論若約如來果上說者則三藏十二部一切修多羅即是如來大智慧光明故名文字般若也達乎實相者即所謂從文字起觀照從觀照證實相也又復智者頓能隨文成觀知文字性離不著文字亦是達乎實相也證信者以六種成就堪為證據使聞者不疑故大論第四問曰何不直說般若而言舍衛等答說時方人令人信故發起者如楞嚴誤墮婬室觀經闍王弑逆各有因緣為之發起也言五句者但以詮義究竟為句如佛但一字亦名句也均其繁簡者五句分為五科失之太簡列眾立之為六失之太繁今合五句為一科則簡者非簡列眾與五總對則繁者不繁鈔般若無言賴言而顯者古云道本無言因言顯道經云生生不可說生不生不可說不生生不可說不生不生不可說以四悉檀因緣故而亦可說此之謂也文字性空即是實相者維摩天女云言說文字皆解脫相所以者何解脫者不內不外不在兩間文字亦不內不外不在兩間是故舍利弗無離文字說解脫也一切諸法是解脫相三種般若相為融通者從實相般若流出文字般若從文字般若起觀照般若從觀照般若契實相般若然而全性成修實相即觀照全修即性觀照即實相文字性空文字即實相不離文字實相即文字依解成行文字即觀照全行契解觀照即文字舉一即三言三即一也例如五蘊三句世間諸法不出色心如來為迷心不迷色之人則合色開心說五蘊為迷色不迷心之人合心開色說六入為心色俱迷之人心色俱開說十八界是隨其所宜也佛涅槃時示阿難者世尊臨涅槃時阿難心沒憂海阿㝹樓駄教令問佛四事一佛滅度後以何為師二依何法住三惡性比丘如何擯斥四一切經初當安何語佛答阿難佛滅度後以戒為師依四念處住惡性比丘嘿而擯之一切經初應云如是我聞一時佛在某處某國土與某大眾非獨我法如是三世諸佛經初亦然三疑頓釋者曰如是之法我從佛聞則非佛重起述佛成言則亦非阿難成佛亦非他方佛來故頓釋也異外道阿憂者外道一切經初皆安阿憂二字以阿者無也憂者有也外道所詮不出有無故曰阿憂又阿憂者吉也經初安吉則自始至終吉無不利故意避增減異分過失者阿難結集法藏佛四十九年所說之法如一器水傳于一器不增一滴不減一滴無有增減異分過失故云佛法大海水流入阿難心也疏以宗揀定者多解並陳從違莫決隨宗以定則無異詞也鈔智論佛法大海信為能入者釋論第二問曰諸佛經何故初稱如是答佛法大海信為能入智為能度如是義者即是信也若人有信能入佛法無信不入不信者言是事不如是信者言是事如是肇公如是信順之辭者肇公維摩疏云如是信順之辭也信則所言之理順理順則師資之道成經無豐約非信不傳故建言如是但顯于如唯如為是者除諸法實相外餘皆魔事也此約所詮之理釋當理之言無非之稱是約能詮之文釋順機為應者如經云為應聲聞人說應四諦法為應緣覺人說應十二因緣法為應菩薩人說應六波羅密法也無非為感者若眾生機器不淨不能感佛如澄潭始能現月濁水不能現也此約感應釋始終不異者實相之理迷時不減悟時不增迷時不染悟時不淨如如不動故名如也如理而說者謂如實相理為人演說無別異說故曰是也此雙約能詮所詮釋如為真空是為妙有者即有之空為真空此破虗無之斷見即空之有為妙有此破實有之常見此約破邪釋並無相礙者能詮之外無所詮義所詮之外無能詮文則能詮不礙所詮所詮不礙能詮眾生無機佛不說法淨機感佛乃顯言詮則能所詮不礙感應感應不礙能所詮又應機說法顯示真宗敵破邪外則前二又不礙破邪也非生非滅者謂本自不生今何有滅也又論云隨妄不生約治不滅修起不生處染不滅無去無來者謂無所從來無所至去也又經云不來不去如是而來不動不起如是而去湛然者如淨琉璃內外明徹即所謂一道清淨染污不得也常住者不遷不變無起無滅即所謂諸法從本來常自寂滅相也四過百非者有無雙亦雙非為四過于四句中隨舉一句復具四句成一十六句通過去未來則成四十八句又約已起未起合為九十六句連根本四句共百非也讀古疏鈔事義中詳明疏聖人無我者既名曰聖則生佛依正鎔融總攝一切對待盡淨無餘何得有我鈔非第一義中說我者第一義對二諦說一塵不立真諦也萬法齊彰俗諦也真俗不二中道第一義諦也第一義中四相頓空何有我相而云我耶邪我者或計即色是我離色是我我大色小色在我中色大我小我在色中等此從邪師訓誨妄計而生分別我也慢我則不因師教而成生來即有俱生我也名字我者謂既無見我橫計主宰復無慢我俱生主宰但隨世流布說名為我則但有名字而無實體也世俗人具前二我者以未達我空無名字故學道人具後二我者見道學人雖斷分別邪我我慢猶存若盡理而言未至八地俱生我執猶現行故聖人唯最後我者聖人斷盡二障達二無我理故順俗稱我但是名字者謂阿難尊者至結集時尚破同體見慢之我豈有界內二種我耶為傳化故乃順世俗立名字我有何過咎知一切法空而不著空者經云雖樂遠離而不依身心盡雖行于空而植眾德本是也知實相無我而不著無我者經云雖行諸法不生不滅而以相好莊嚴其身雖隨諸法究竟淨相而隨所應為現其身是也引瑜伽觀經二段是證明第三不著無我之故也瑜伽言無我則無人修學觀經言無我則無人傳化自利利他二皆不就故不著無我瑜伽有四義者瑜伽第六云略由四義故稱我聞一為世間語便易故二為隨順世間故三為斷除怖畏若定無我誰為修學人生怖畏故四為宣說自他得失令生決定信解心故阿難亦通法身我者法華有本迹二門若就迹門則阿難但證偏真若約本門則阿難久證法身經云內祕菩薩行外現是聲聞少欲厭生死實自淨佛土是也以無我中有真我者因二無我乃得真我所謂唯心相滅心體不滅因滅是色獲得常色也常樂我淨者是涅槃四德不遷不變曰常離二死苦曰樂具八自在曰我三惑淨盡曰淨疏耳根發識者耳根是色法即第八親相分具執受二義是白淨無記性識乃心法即第八見分三性皆具與根不同如楞嚴以門喻根以人喻識不同明矣發者生起之意具八種緣方得生起即所謂耳識唯從八也八者一空二根三境四作意五分別依六染淨依七根本依八種子也廢別從總云云者謂小教云聞者耳根發識聲在可聞處是則應云耳聞何云我聞也蓋以我有主宰之義為六根六識之總今廢根識之別從主宰之總曰我聞也始教無聞三句聞即是有法無聞即是空今始教是談一切法空故無聞終教雙照二邊故聞而不聞此處影略不聞而聞句葢即有而空即空而有正是雙照二邊中道也頓教雙遮二邊故無聞亦無不聞無聞是遮有無不聞是遮空正是雙遮二邊中道也以我無我不二之真我者我即是有無我即是空我無我不二是即有而空即空而有即二邊之中道也又空處全有有處全空離二邊之中道也離即離非是即非即非法身真我而何根境非一異之妙耳者根境若異則兩皆是有根境若一則二俱成空今非一非異則空有雙遣即是頓教雙遮中道也然非一則異存非異則一存則空有雙存又即是終教雙照中道也寂而常照照而常寂非妙耳而何娑婆極樂無障礙之法門者娑婆是此岸極樂是彼岸若無障礙則此不礙彼彼不礙此彼此俱存是為雙照法門所謂究竟寂光不越凡夫一念三塗劇報全居極聖自心也又若無障礙則何分此岸何分彼岸彼此兩亡是為雙遮法門所謂黑暗女功德天有智主人二俱不受也鈔聞亦無聞是大乘始教者大乘始教第二時空宗依諸部般若談一切法空內無能聞外無所聞方曰真聞故曰尊者無說我乃無聞是真說真聞也從緣故空不壞假名者因內根引生外塵則塵無自性因外塵引生內根則根無自性從緣故空也經云由塵發知因根有相相見無性同于交蘆是也又因根有塵則不壞塵相因塵有根則不壞根相不壞假名也如云如幻非實則心境雙忘不無幻相則不壞心境是也不聞而聞聞而不聞者不壞假名不聞而聞也從緣故空聞而不聞也不聞而聞即空即有聞而不聞即有即空中道之義此大乘至極之理曰終教也能所雙寂無聞不聞者從緣故空緣生顯無性也緣生為能顯無性為所顯不壞假名無性顯緣生也無性為能顯緣生為所顯緣生無性以無性奪緣生也無性緣生以緣生奪無性也互奪兩亡則能所雙寂又緣生奪無性不聞不可得無性奪緣生聞亦不可得則無聞無不聞矣此是舊解今復解云能即是第八轉相所即是第八現相以業識頓空故雙寂聞與不聞皆生滅相既無業識起滅何有聞與不聞也離念頓顯者聞與不聞皆妄念分別今既雙遮則一念不生全體顯現不歷階級漸次頓教意也此是舊解今云離念頓顯有二義若離分別麤念與無分別智相應得見法身名隨分覺若一念相應遠離微細念故心即常住名究竟覺葢以頓教雖無漸次而不無前心後心則其所離之念自不無麤細而所顯之理亦不無分滿也生而不生不生而生者生即我即凡夫之有不生即無我即二乘之空此二不二即法身真我故能聞所聞非一異故者根境歷然不壞世諦故非一根塵同源同歸性海故非異古云通𢆯峰頂不是人間心外無法滿目青山是也娑婆依正全處極樂之自心者自心即是法界法界之中無所不攝則娑婆依正攝無不盡天台云以檀為法界則一切法趣檀依正之攝歸極樂其理亦然古云阿鼻依正全處極聖之自心毗盧心土不離下凡之一念法界圓融頭頭涉入不相障礙故分攝于圓應歸法性者恐有難云前說五宗及有空法相法性圓融終頓判歸法性宗圓教判屬圓融宗矣今既攝于圓應歸圓融何故歸法性耶答誠如所問但法性之與圓融分之為二合之為一以事事無礙之圓雖不同事理無礙之終頓實離事理無礙之法性外無事事無礙之圓融以同一了義大乘可合可分故今據可合之義歸法性也鈔弘廣菩薩之所流通者涅槃第四十云佛告文殊阿難比丘是我之弟給事我來二十餘年所可聞法具足受持喻如瀉水置之一器是故我今顧問阿難為在何所欲令受持是涅槃經善男子我涅槃後阿難比丘所未聞法弘廣菩薩當能流布阿難求三願者一願不受佛故衣二願不隨佛受別請三願二十年前所未聞經請佛重說得法性覺自在三昧者覺了法性從性起覺也法性豎徹三際三際之法無不覺法性橫遍十方十方之法無不覺于法性海中普覺一切得大自在曰法性覺自在三昧也涅槃下引證可知影響弘傳者天台釋法華經言聞經眾有發起當機結緣影響四眾影響眾者謂往古諸佛菩薩隱其圓極之果亦同機眾匡輔法王如影之隨形響之應聲也三阿難者聖人無名名因事立聲聞斷見思正使得出三界得大歡喜故結聲聞藏名曰歡喜緣覺進侵習氣賢于聲聞故結緣覺藏名曰喜賢菩薩進斷無明悟入法海故結菩薩藏名曰喜海疏古人釋一時都謂機應合一之時亦是諦智合一之時故云一時今師資相合下是言機應合一之時約當宗下是明諦智合一之時也心境泯者謂心境雙消歸聖現量然凡聖猶分也凡聖會者聖凡情盡唯妙覺明然依正猶二也依正融者情器體融同歸法界然一多猶在也一多等者一多相即無礙圓融究竟圓滿矣以上從狹至廣融成一味為一時也鈔陀羅尼此翻總持有多字一字無字之別多字如諸經密呪一字如唵字無字即無相妙心今之所云指無字也一剎那頃一字之中者以既得無相妙心剎那普融三際一字攝法無遺一切法門說無不盡也得淨耳根者眾生循聲流轉分別外塵穢耳根也聖人脫粘內伏發本明耀淨耳根也於一剎那悉無障礙者以既淨耳根則心聞洞徹十方洞徹三際一切即一一即一切無不知也古云在眼時如千日萬象不能逃影跡在耳時如幽谷大小音聲無不足是也說者神力延促二句出上文說聽多少之所以說者延一日為一劫則說者時少聽者時多說者促一劫為一日則說者時多聽者時少又聽者根利則說者時多聽者時少以一心入於語義不覺時長故聽者根鈍則說者時少聽者時多以不得法味身體在座多有疲倦覺時長故古謂下引例凡夫二乘及三賢菩薩以事識見佛故見應身年歲則短在世八旬即入涅槃成道以來始經四十餘年登地菩薩以業識見佛故見報身永不滅度成道以來經塵點劫各各不同故周正建子夏正建寅者謂周時以斗柄初昏建子之月為歲首夏時以斗柄初昏建寅之月為歲首也一取天開於子之義一取人生於寅之義心境者下約當宗以一心不亂為宗一心不亂則內無能念之心外無所念之境能所雙消泯然無迹故諸上善人同會一處者一處指一心也若聖若凡全歸一心無有高下故佛及水鳥同說妙法者以一心中情與無情同成正覺熾然說無間歇一說一切說故一佛說經六方齊讚者以一心中不見彼佛此佛一即是多多即是一同一法性故鈔際主之會成時者時非別時法王啟運嘉會之時也法王不作嘉會難成不得成時故聆主之語成聞者耳聞法音心契妙理曰聞慧日不升圓音不演眾生曠劫皆成聾瞽不得成聞故受主之教成信者於實德能深忍樂欲曰信佛不垂教心迷塵境信自何生縱有信從皆墮邪見非正信故主之所居成處者處非他處乃法王轉法輪之處也聖人到處成邑成都法王不住不成住處故主之所化成眾者聞經之眾賢聖之眾也佛未出時各趣異道盡墮邪宗因蒙佛教轉邪歸正方成聖眾故疏別之有四者若據經文但云佛住天台乃別之為四者略有二義一者欲顯能住心法故謂他人唯論身住不明能住心法則抑極聖同凡夫住而況復凡聖各各有於能住之法不可不知也二者欲顯如來無法不住故謂佛住既勝則無法不住為引物故且就世善略指定散收一切善故言天梵於出世中略指小大攝一切法故言聖佛也鈔或現天住下四住中皆明因果而所住法正在於因所謂如來以攝物故示現施戒及十善心此即佛以欲天之法住舍衛城為物示現四無量心示三三昧即梵法聖法住舍衛城此皆如來隨他意住若隨自意即以楞嚴至不共等住舍衛也初禪至非想是果四禪八定是因而云四無量心住者以單修八定不生色無色界必用四心為熏禪功德定與功德具足方生八天故云四心也三三昧者即空無相無作也百八三昧即首楞嚴三昧寶印三昧師子遊步三昧乃至百八離著虗空不染三昧詳如智度論說十力者一是處非處如實力二業智力三定力四根力五欲力六性力七至處力八宿命力九天眼力十漏盡力四無畏者一得總持無畏二得知根無畏三得決疑無畏四得答報無畏十八不共者一身業無失二口業無失三意業無失乃至十八知未來無礙謂之不共者不與二乘共也鈔法華法勝餘法者五時極唱最後極談非兼但對帶純一圓教故舍衛國之勝者以國豐四德譽動五天淨土法門廣大宏遠者帡包幽顯統括聖凡國豐萬德聲震十方故祇樹樹之勝者以扶疎暢茂蔭葢清涼淨土眾生永離熱惱者佛以大慈普覆一切離生死惱永得清涼故給孤園之勝者以受用自在適悅人心淨土安隱受樂者寒暑不遷壽命無量涅槃寂靜得大解脫故祇陀種之勝者以位超百寮紹居九五淨土紹隆佛種者皆不退轉多有補處不滯化城直至成佛故須達人之勝者以能具十德足以長人淨土入上善會者永離凡外邪定不定得入正定賢聖等侶故疏自性洞徹十方者若云阿難聞佛則眾生皆背佛若云佛在祇園則自己却成魔非真聞佛也非真佛在也今十方是佛法身自性洞徹十方則一大時教無有不聞是真聞也當處即今顯現自性不離當處則法性湛然不遷不變是真佛在也鈔經云心聞洞十方生於大因力古云金佛不度爐木佛不度火泥佛不度水真佛屋裏坐反聞自聞者以眾生循聲流轉向外奔馳故反佛自佛者以眾生以色見我音聲求我故儼然未散者智者大師誦法華經至藥王本事品是真精進是名真法供養如來處親見靈山一會儼然未散疏具有三義者葢以華言大者梵曰摩訶乃含三義謂大多勝故須就本三義釋之僧伽有四種一有羞僧持戒無違二無羞僧三業不淨諸惡並行三無知僧雖不破戒根鈍無慧不知重輕四真實僧四果四向學無學人也有羞真實得共羯磨同聞證信唯取無學眾和合者謂戒和同修見和同解身和同住口和無諍意和同悅利和同均三迦葉是兄弟三人昔共起剎今連枝也目揵連此云萊茯根姓也舍利弗此云身子名也姓拘栗陀鈔以七一釋共者七種一故方成共義也判已屬生酥且從本說七在三藏同感佛時同鹿苑處同一切智心同別脫戒同三十七道同無漏正見同有餘解脫昔同七者今日同聞天王敬仰者梵王師陳如帝釋師迦葉等內典謂三藏十二部外籍謂四韋駄十八經等波羅密多此云到彼岸今最極利根到百行至極之處也如布施則財法無畏以至三輪空寂持戒則不破不漏乃至戒相都空般若則人法俱空乃至空亦不立此大乘種性也皆得無學果位者研真斷惑曰學真窮妄盡曰無學今皆得阿羅漢無學果位也皆得小果趣大菩提者既成四果復迴心向大發大菩提心也則通大乘言者謂上大多勝三義止就小乘言耳今佛地三義則是通大乘言四邪命者合藥種植田園名下口食仰觀星宿名仰口食四方巧語名方口食呪術卜算名維口食比丘不作此四名清淨乞士也九十八使者見思惑也見惑有八十八使以五鈍五利對苦等四諦苦下全具集滅除三謂身見邊見邪見道除二謂身見邊見上界不行瞋思惑有十使謂欲界貪瞋癡慢上二界各有貪癡慢共九十八也羯磨此云作法辦事謂行籌相向說也水乳之乳非人乳牛乳水中自有乳唯鵝王能辨優樓頻螺此云木瓜林為瓶沙王師有五百弟子伽耶此云城那提此云江二人共五百弟子佛入迦葉窟毒龍放火佛收毒龍住於鉢內乃至十種神變迦葉雖覩執猶未改曰瞿曇雖神不如我道真佛言汝若不捨邪見令汝長劫受苦聞已頭面禮佛求悔乃告弟子各隨所宜我願皈依佛也乃至五百弟子皆聞善來鬚髮自落得成沙門乃各以事火術具投之於水隨流而下二弟見之亦皆皈佛鈔常不離佛者以千二百五十人未見佛前各修異道久受勤苦空無所獲一遇如來便得道果感佛恩深常隨侍佛為同聞眾也千里面談者唐李世民為秦王時在軍中使房𢆯齡入朝奏事高祖笑曰𢆯齡為吾兒奏事雖隔千里猶如面談泗濱謂泗水之濵有杏壇在焉是孔子講學處久在泗濵者謂平居共事相依陳蔡者謂患難不離也鈔斷思惑七十二品者思惑分三界九地共九九八十一品若初果則全未斷於第二向中斷欲界前六品即證二果於第三向中斷欲界後三品即證三果然尚有上八地七十二品在復於四向中斷盡方成四果阿羅漢也初果七返二果一生者欲界九品思惑上上品潤二番生死上中上下中上三品各潤一生中中中下二品同潤一生下上下中下下三品同潤一生故初果七返生死二果一生欲界也二僧覲佛者昔有二僧相期覲佛時值炎暑行至中途熱渴欲死共覓水飲見一清水可掬而多細蟲一僧以有蟲故不飲而死一僧從權乃得見佛具白前事佛言道亡者為先見我以尊我戒律即親見佛故疏自性無漏者漏有三謂欲漏有漏無明漏欲漏即欲界貪愛有漏即上二界貪愛無明即三界中癡此小乘之漏若大乘之漏不唯三界貪癡為漏有無明惑不居中道漏落二邊亦漏也今自性從本以來無有變異不可破壞何漏之有論云智體不動具足無漏性功德是也自性無迷者迷有二謂根本不覺枝末不覺因一念無明妄動遂成三細六麤種種迷癡境界然自性從本以來一切染法所不能染何迷之有論云一切染法不相應故名如實空是也鈔心源者心為萬法之源也諸法從本來常自寂滅相曰本寂既曰本寂則欲有無明以及二邊等漏向何處著脚故曰全空心體者心為法界之體也光明照一切法界悉清淨曰本明既曰本明則見思塵沙以及無明等惑向何安立故云安在法華謂真阿羅漢者法華經中迦葉須菩提等聞喻說一周開權顯實乃云我等今者真是聲聞以佛道聲令一切聞我等今者真阿羅漢應受人天一切供養等起信號曰真實識知者起信論云從本以來自性滿足一切功德所謂自體有大智慧光明義故徧照法界義故真實識知義故乃至滿足無有所少義故沈空為寂者二乘棄有著空墮無為坑飲三昧酒乃枯寂之寂非本寂之寂也乃名字羅漢非真阿羅漢也作念而知者凡夫生心動念緣而後照慮而後知乃妄作之知非本明之知也乃虗妄知識非真實識知也是故下結勸沈空之寂為邪見本寂之寂為正見古云魔界與佛界一界無別界故曰邪見與正見一體本明之知為妙門作念之知為禍門經云知見立知即無明本知見無見斯即涅槃無漏真淨故曰眾妙與眾禍同門息心達本源者古云三界兮擾擾六趣兮昏昏息心達本源故號為沙門今則息邪見眾禍之妄心達正見眾妙之本源庶幾可以為沙門矣鈔引諸偏好者眾生之機不一所好之法亦不一是故好智慧者舍利引之好神通者目連引之乃至好多聞者阿難引之舍利弗宴坐者舍利宴坐佛令目連喚之舍利云汝前去吾後至目連欲牽之去舍利即解衣帶著地語目連曰汝能舉此衣帶方可牽我去目連竭盡神力不能動舍利以帶繫閻浮提樹樹動而帶不動也顏閔無文者顏閔列在德行科游夏列在文學科故三明六通者三明即過去宿命明現在天眼明未來漏盡明加天耳他心神足即名六通前三雙具通明後三止為通者以但知宿世受生之事名宿命通復知宿世百千萬生如是姓名如是受苦樂等事皆悉能知是名宿命明但見死此生彼名天眼通復見我及眾生死時生時及所作善惡之行或生善道惡道皆悉能見是名天眼明眾生因三界見思之惑墮落生死故名為漏唯羅漢斷見思盡而得神通名漏盡通復知漏盡以後更不受於生死是名漏盡明後三無此分別故唯名通也鈔色即是空者色即十一色法此色凡夫計為實有三乘計為虗幻不知全體是妙色也妙色即是真空故云色即是空經云觀相元妄觀性元真即是菩提妙淨明體是也空即是色者空即第一義空此空不是邪外所計斷空小乘所執偏空乃是真空也真空即是妙色故云空即是色經云如來藏中性色真空性空真色清淨本然周徧法界是也淨土即空者淨土依正莊嚴無非妙色妙色既即真空淨土豈不即空也空即淨土者自性清淨名如實空而如實空即如實不空離一切相處元自淨法滿足空豈不即淨土乎若撥淨土則是頑空偏空非即色之真空不解真空則是凡外邪智二乘小智非大乘正智身子之智不如是者以身子已發大心乃於般若會上盛談般若淘汰執情已具大乘正智既具正智必解真空不撥淨土淨土之告不告身子而誰告耶鈔目連化身大小者難陀䟦難陀龍兄弟居須彌山邊佛常飛空上忉利天為母說法龍便瞋恨吐黑雲暗霧隱翳三光以身遶須彌七匝尾拖海水頭枕山頂目連乃倍現其身遶須彌十四匝尾拖海外頭枕梵宮龍猶瞋甚雨金剛砂目連變砂以為寶花輕軟可愛猶瞋不已連乃化為細身入龍身內眼入耳出耳入鼻出龍受苦痛其心乃服外道移山者外道師徒五百用呪移山經一月日山根已動目連念言此山若移多所損害即於山頂結跏趺坐山還不動外道相謂我法動山計日必移云何安固還若於初必是沙門使爾如是自知力弱歸心佛法舉之梵天者瑠璃大王滅釋迦種目連欲救佛以定業難逃不允其請連以神力將鉢盛五百釋種託之梵天滅釋之後舉鉢視之唯血水而已故知業力佛亦不能救也止車者耆婆善醫已生忉利連因比丘病乘通往問值諸天出游耆婆乘車不下但合掌而已連以神力止住其車耆婆方下車問訊欲何所為連乃具說來意答云斷食為要目連放之始得前邁燒堂者帝釋造得勝堂莊嚴奇麗目連往看諸天女皆隱避不出連念帝釋著樂不修道本乃以神通燒得勝堂赫然崩壞仍為帝釋說無常等語帝釋歡喜後堂儼然無灰煙色鈔抖擻者抖擻塵勞即下掃除塵累也淘汰者淘汰習氣即下澄淨身心也鈔縱橫善巧者謂橫說豎說掃蕩說建立說等破熱彈曲者以其論議能破邪見之熱能彈邪見之曲也子繫母者尊者幼喪父其母欲改適因子繫故不遂其心猶繩繫扇故曰扇繩善分別義即是義無礙辯敷演教道即是法無礙辯得大辯才故議論第一也疏放牛即牧牛意鈔迦葉讚者佛滅度後阿難升座迦葉與眾讚曰面如淨滿月目如青蓮花佛法大海水流入阿難心是也鈔馬麥之報者佛與弟子三月在毘蘭邑食馬麥以償宿報獨憍梵於天上受供鈔璣衡者謂璿璣玉衡也註璿美珠也璣機也以璿飾璣所以象天之體轉運也衡橫也謂衡簫也以玉為管橫而設之所以窺璣而齊七政之運行猶今之渾天儀也鈔塔猶却貝者阿育王禮諸羅漢塔次至薄拘羅塔而說偈言雖自煉無明於世少利益因供二十貝子而貝子從塔飛出來著王足諸臣驚怪所以然者良由尊者平生閒靜少欲其塔猶有是力資用充足即第一名義至今不滅即第二名義所求如意即第三名義比之螺蛤者尊者聽法之次多昏睡佛責云咄咄何為睡螺螄蚌蛤類一睡一千年不聞佛名字樂見照明金剛三昧者注心欲見照明萬法之見性名樂見照明此三昧能壞萬法萬法不能壞此三昧故名金剛疏難弟難兄者東漢太丘長陳寔生二子長曰元方次曰季方俱有俊才二子之子各論父功德詣祖決其優劣寔曰元方難為兄季方難為弟疏王數融通者王外無數數外無王一心融通故王所融通鈔善惡輪轉由之主宰者以前六識通善惡無記三性能造有漏三業能招苦樂二報七識是有覆無記性恒與我癡我見我愛我慢八大相應念念執第八識見分為我唯第八識是無覆無記性不造善惡等業乃一期總報主故五十一心所者徧行有五別境有五善有十一根本煩惱有六隨煩惱二十不定有四恒依心起三義是釋名為心所之義恒依心起者心王不起心所不起也與心相應者恒與心王相應不離也係屬於心者心所係屬心王如八識有五徧行七識有十八前五三十四六識具足五十一也智覺即永明壽禪師欲想更樂等者欲即別境中欲於所樂境希望為性勤依為業想即徧行中想於境取相為性施設種種名言為業更樂即徧行中觸令心心所觸境為性受想思等所依為業慧即別境中慧於所觀境揀擇為性斷疑為業念即別境中念於曾習境令心明記為性定依為業思即徧行中思令心造作為性於善品等役心為業解脫即別境中勝解於決定境印持為性不可引轉為業作意即徧行中作意能警心為性於所緣境引心為業三摩提即別境中定於所觀境令心專注不散為性智依為業痛即徧行中受領納違順非他境相為性起欲為業迦葉心欲數者迦葉修行十二頭陀苦行樂超三界樂證涅槃捨離世間五欲如棄涕吐故富樓那心想數者富樓說法第一演說苦空深談實相唯想為先以想能觀機說法四辯宣演故迦旃延更樂數者旃延議論第一以議論時賓主問答種種妙義觸境而生更互涉入彼此皆得法樂故慧舍利弗者鶖子智慧第一得無疑解脫正合斷疑為業故念優波離者波離持戒第一以由恒持正念明記不忘方能檢束身心無犯毀故思羅睺羅者羅睺密行第一祕密之行非正思惟不能成就故解脫善吉者善吉解空第一勝解印持不可引轉解脫一切有為故作意那律者那律天眼第一以小乘天眼乃作意通作意能見大千若不作意不能穿針故三摩目連者目連神通第一通由定發淨極光通故痛阿難者阿難多聞第一得文字總持領受不失故此二相扶而取開悟者數若非王從誰引起與誰相應係屬於誰如臣失君弟子無師無所依故何由開悟是必須王扶數也王若非數則數等十善法數不生不能引心觸境領納前境乃至正念定慧一切皆無亦不能開悟是必須數扶王也若王若數四句始由一念無明迷自心源而成八識從八識心王引生心所如空生雲霧海起波濤今王數相扶開悟自心則濃雲薄霧總作晴空巨浪微波咸成止水盡法界唯一真心更無王數可得也鈔毋謂淨土菩薩不屑者屑者潔也不潔者不以其法為潔而遠離之也有以念佛求生但化愚夫非大乘菩薩事則今此經不應菩薩同聞也既是同聞豈可以淨土為菩薩所不屑復有三義者初是雙約二利說次是單約自利說三是單約利他說悲智所緣者悲是三緣悲智是十種智悲智是能緣佛道眾生是所緣也上以智求者無智不能上求無悲無以下度所謂先悟毘盧法界後修普賢行門先運同體大悲然後徧入塵勞也能所合目者有情為能覺為所合此能所而名目之曰覺有情也心是能緣之智故屬能理是所緣之境故屬所利生為急者初發心時便普為恩有法界眾生既證果後尚留惑潤生不取滅度是菩薩以利生為急也廣覺一切者即眾生無盡我願無盡有一眾生不成佛我誓不取正覺等趨寂自安者即自謂已得涅槃無所堪任但念空無相無作於菩薩法心不喜樂也大強精進者即所謂假使熱鐵輪在我頂上旋終不以此苦退失菩提心求大菩提者不求人天福報聲聞緣覺等乃願與法界眾生一時同得菩提故三無數劫者此非藏教三僧祗也如起信論經一萬劫方得信成就發心復經三阿僧祇劫乃至菩薩究竟地等具足諸功德者如常樂我淨清涼不變真實識知乃至十力四無所畏十八不共等法華六大下信大法者信一心真如之法解大義者解一心三大之義發大心者發上求下化之心趣大果者趣無上菩提之果修大行者修自利利他之行證大道者證一乘無上妙道也信解發是願大攝者以菩薩發願必信解妙理然後發心對三寶境發四弘誓願也趣是時大中攝者不歷三祇不造一乘無上果故證是德大中攝者一乘妙道即一乘諸功德故數大謂誓願弘深如無量無作乃至普賢願王等德大謂萬德圓滿如華嚴十地十定乃至十忍等業大謂萬行具足如華嚴十行十向乃至普賢萬行等數即願者如藥師十二大願彌陀四十八願毘盧願力周乎法界法界無盡則願力無盡也五品者即天台五品觀行位一隨喜品初心順理慶己慶人二讀誦品古教熏心道芽增長三說法品更加說法如實演布四兼行六度品正觀有力六度兼修五正行六度品觀行六度無有二相疏自性真妄融者覺是真有情是妄融者融通也又融化也融通者謂真外無妄妄外無真以即煩惱是菩提即三惑染為三德祕藏故所以古人云斷除妄想重增病趨向真如亦是邪融化者妄既不存真亦不立以菩薩地盡八識消融覺與不覺二俱渾化故所以楞嚴云真性有為空緣生故如幻無為無起滅不實如空華言妄顯諸真妄真同二妄鈔真不變而隨緣者真即真如不變謂無有變異不可破壞隨緣謂隨九法界緣謂之覺有情者以即真而妄故此約不變隨緣說也妄成事而體空者妄即一念無明成事謂成三細六麤種種諸事體空謂此惑業苦當體全空謂之有情覺者以即妄而真故此約隨緣不變說也既即妄而真則真不立既即真而妄則妄不立從本以來離諸名相真妄不立也真妄既皆不立則唯妙覺明圓照法界唯是一心也至於唯是一心是真成大道心也非摩訶薩而何疏佛為法王者佛為諸法中王又以法王於三界故鈔信為行德之首者行謂行門德是實德萬行如布施持戒乃至普賢萬行等萬德如常樂我淨十力無畏十八不共乃至無量百千陀羅尼等佛法大海信為能入經云信為道元功德母信能長養諸善根信能必到如來地故信為萬行萬德之頭首一切親近供養讚歎是妙德感物行也怨親平等不為損惱是大悲平等行也生時有十種瑞是勝福瑞應行也即解之行即行之解是釋妙字即解之行者如上諸行皆全性起修非有為有作之行故妙德是智者種智不圓不成妙德華嚴云了了見佛性猶如妙德等故妙德者智也諸佛之母者經云智度菩薩母方便以為父一切眾導師無不從是生釋迦之師者經稱文殊為七佛師故即行之解者如上之解全修即性非空知空解之解故如來據中道第一義句是出脫疏中法字而菩薩入於此地句是出脫入字是謂紹隆佛種二句是出脫正位兩字但正字尚未明顯故約喻說體元居正也據中道者二乘據真權乘據俗俱為偏位如來據中道是居法正位菩薩入於此地是入法正位也大君體元居正者天子體乾元之德居九五正位王子在東宮者東為震震為乾之長子又帝出乎震故曰東宮又分別而論者以上文猶是總論尚未分別若又分別而論則智又有權實不同也權智是小乘偏空之智不稱法性故曰權實智乃大乘中道之智稱乎法性故曰實權智明有生者權智不達法空不悟唯心生佛迢然淨穢歷然以我之生求彼之佛捨此五濁往彼西方實智明無生者實智了達法空悟明唯心生佛不二淨穢融通雖云念佛心外無佛雖曰往生實乃無生鈍根下二句恐有問云同一淨土分有生無生二者何也故云以根有利鈍不得不分故從權入實則且就事持漸漸入理權實雙融則理既不迷事亦不廢若推本而論者以上文猶是分別而論未是推本論若推本而論則同一甚深智慧也鈔慈無能勝者慈有三種一眾生緣慈無心扳緣一切眾生而於眾生自然現益如涅槃云我實不往慈善根力能令眾生見如斯事二法緣慈無心觀法而於諸法自然普照如日照物無所分別三無緣慈無心觀理而於平等第一義中自然安住以無緣慈攝諸眾生慈無能勝者指此三慈也文中所引有三世二利不同第一在母胎中即有慈心是現在慈又是自利慈也第二過去生中第三又昔為婆羅門第四又弗沙佛時皆是過去慈又皆自利慈也第五又思益經是現在慈是利他慈也第六又悲華經是未來慈亦是利他慈也鈔法華稱古佛放光為說此經者世尊於法華會上放眉間白毫相光照東方萬八千土光中圓現法界事相生佛始終於是彌勒騰疑文殊酬答答中云過去日月燈明佛放斯光已即說妙法華經今佛現光亦應說此經等鈔了知法性本非善惡者以順益二世者為善違損二世者為惡法性本無違順亦無損益又善惡者對待之法法性絕諸對待故非善惡也雖云修善不修而修者法性本無善有善可修是違法性是修惡非修善也當知無善可修是真修善雖云去惡不去而去者法性本無惡有惡可去是背法性是去善非去惡也了知無惡可去是真去惡一念不生是真精進者古云若起精進心是妄非精進若能心不妄精進無有涯鈔精進表願行者信而後願願者信力之精進也願而後行行者願力之精進也疏文殊之智是一切種智無所不照者今自性輝天鑑地耀古騰今無不照也彌勒之慈是三緣大慈無所不容者今自性囊括虗空包羅法界無不容也鈔自性廣大是普賢義者行彌法界曰普位鄰極聖曰賢有廣大義今自性豎窮橫徧無有邊際故自性圓通是觀音義者修耳根圓通緣心自在是圓通義今自性圓融通達無有障礙故若各具即名字互通者如無不照即無不容文殊通彌勒廣大具圓通即普賢通觀音等心即名者菩薩無名名者人人自心離自心別求菩薩是行邪道不見菩薩也正觀心中見一切菩薩者達自心無不照則文殊現前達自性無不容則彌勒出世達自性之廣大則常覩普賢達自性之圓通則時親自在今見凡夫不見菩薩者以我等終日迷心逐境造諸惡業無有觀力縱或修戒善及諸禪定但涉有為並非正觀正觀者即直心正念真如約當經即是繫緣法界專稱名字所謂離四句念佛也若得此正觀則文殊彌勒普賢觀音無不具足是見一切菩薩也又即普見一切眾生皆成正覺是不見凡夫也今見凡夫不見菩薩以失正觀故鈔佛光所觸得證頓圓者如來為菩薩時足下有四十種光明於圓滿王相好中放光下照地獄遇斯光者即生兜率聞天鼓音懺悔已即時位登十地所以然者以眾生先熏一乘種子故鈔是法平等無有高下者是法指法性也法性之中聖凡平等也上而徹乎四句謂法性有高下則不能徹乎高下以其無高下故能徹高下也良以下出所以四諦聲聞法十二因緣緣覺法四等六度菩薩法五戒十善人天法萬行紛然則總收四聖八萬四千塵勞則總收六凡雖四聖六凡不同唯是一心是會十法界行歸一心也何以故以一心之真實性中無十法界之差別故因無十法界之差別故能徹十法界也龍蛇混雜者無著禪師禮五臺遇文殊化作老翁問云南方佛法如何住持著云末法僧尼少持戒律即問此間佛法如何住持翁云龍蛇混雜凡聖交參科分正宗四科不出三資糧初詳陳依正令生信樂屬信資二正示願行令知修證屬願行二資三交引佛言令斷疑惑者以上雖令生信樂猶恐有疑信力不堅故引六方共贊以堅其信也四互彰難事令切感發者以上雖正示願行猶恐因循不能興起故舉彼此互贊以鼓發行願也鈔通則證信別則發起者證信為通一切諸經皆然故發起為別經經發起各不同故白毫放光啟一乘之教者如來於法華會上先放白毫相光照萬八千土然後告舍利弗諸佛智慧甚深無量十方佛土中唯有一乘法無二亦無三除佛方便說等毗耶示疾開不二之談者維摩居士於毗耶離城現身有疾世尊遣諸大聲聞諸大菩薩往問其疾然後三十二大士各說不二法門如生滅不二垢淨不二一相無相不二乃至無有文字語言是真入不二法門圓覺金剛多有問在先者圓覺則文殊啟請如來因地法門及菩薩遠離諸病金剛則善吉啟請云何應住云何降伏其心解脫禪定即五分法身之二有大小乘不同而禪定復有事理世出世不一命在呼吸者四十二章經云佛問沙門人命在幾時間答曰數日間佛曰子未知道又問人命在幾時間曰飯食間佛曰子未知道又問人命在幾時間答曰呼吸間佛言子知道矣譬如下合法譬如有人喻六道眾生卒患惡瘍命在呼吸喻眾生生死輪迴無常迅速比有良方五句喻其餘法門未易成就功行未圓無常已至現有成藥入口即活喻念佛法門速超生死有仁心者四句喻如來大慈即應速告何俟其殷勤啟請然後說也鈔甚深智慧者謂不是藏人析空觀智通人體空觀智并不是菩薩二諦觀智平等觀智乃以不思議心照不思議境方名甚深智慧也洞察於淨穢之機者國土本無淨穢淨穢生於自心以心淨土淨心穢土穢也融通於事理之際者願見彌陀往生安養事外無理理外無事事理之際本融通故又解云機謂機微機括一切淨穢皆由自心轉變故自心為淨穢之機洞察者徹悟也徹悟妙心深知一念緣起是洞察於淨穢之機也際謂交會之間涉入之處一切事理皆根本於自心故自心為事理之際融通者圓悟也圓悟自心契入事理無礙法界是融通於事理之際也方能諦信不疑者以不達淨穢生於自心必曰同一國土云何有淨有穢則聞清淨國土必疑而不信以不達事理本自一致則執事者不信理執理者不信事又不信理者事則無根久之亦不信事不信事者理亦無據久之并不信理達斯二者方能諦信也又解云若不具甚深智慧達於穢淨之機事理之際者則淨穢相妨事理攸隔淨土則理外修成萬法乃不由心具指彼淨土因果但是體外方便焉能信受不疑是必甚深智慧悟十方淨穢卷懷同在於剎那一念色心羅列徧收於法界方了遷神億剎實生乎自己心中孕質九蓮匪逃乎剎那際內耳故曰方能信受不疑也法應爾者如君有事必告大臣父有事必告長子如來說法必告上首是世界悉檀者世界是差別義告必有法令眾生知法門差別井井有條而不紊亂令得歡喜益為人悉檀者身子智慧為眾所宗身子而信眾無不信各起善心令得生善益對治悉檀者大眾智慧不如身子身子迴心無不迴心捨其邪執令得滅惡益第一義悉檀者既迴小向大令不退轉究竟成佛悟第一義令得入理益也鈔以智生信則為正信者信知生佛不二眾生念佛定當作佛方為正信若無妙智此信不生縱有信心非正信故以智發願為弘願者了無作四諦之境發四弘誓願願生西方方為弘願若無妙智弘願不發縱有願心非大願故以智起行為妙行者先悟自性從性起修離四句念佛方為妙行若無妙智妙行不生縱有修為皆墮有為非妙行故鈔無緣而照下以緣而後照慮而後知者是從外得有作之智非自然智也無有扳緣而無所不照不勞思慮而無所不知此是無師智自然智不從他得也既有此智何必考鍾伐鼓三請殷勤然後為告故曰犍槌未動等疏此云安樂者離生死逼惱故安養者供養天然不假人力故清泰者大小三災不及故妙意者六塵妙境無不隨心故鈔法華明東方世界之多者經云譬如三千大千世界所有地種假使有人磨以為墨過於東方千國土乃下一點大如微塵又過千國土復下一點如是展轉盡地種墨於汝意云何是諸國土若算師若算師弟子能得邊際知其數否不也世尊世界之多何可思議也華嚴一切世界種者經云華藏莊嚴世界海有須彌山微塵數風輪所持最上風輪能持普光摩尼香水海此海有大蓮華名種種光明蕋香幢華藏莊嚴世界海住在其中此世界海大輪圍山內所有大地中有十不可說佛剎微塵數香水海此十不可說香水海中有十不可說佛剎微塵數世界種安住一一世界種復有十不可說佛剎微塵數世界此最中央香水海名無邊妙華光出大蓮華有世界種而住其上有不可說佛剎微塵數世界於中布列其最下世界名最勝光徧照至此第十三世界名娑婆十三佛剎微塵數世界圍遶臨終在定之心者天台云臨終在定之心即淨土受生之心舉念即往生淨土時則臨終在定淨土受生不離此心心無彼此何曾從此至彼而言往生者特一舉念耳如人夢中從此至彼實不離夢心而曰從此至彼者特夢心自現耳毗盧遮那徧一切處者毗盧遮那此云光明徧照徧一切眾生徧一切國土等故云法身徧在一切處一切眾生及國土其佛住處名常寂光者常即法身寂即解脫光即般若三德祕藏之真淨土此唯諸佛所居然雖云諸佛所居其實即依即正依正不分故曰普賢身相若虗空依真而住非國土菩薩尚爾況諸佛耶行真實法者賢位菩薩比觀相應未證法身不能全性成修不名真實唯法身菩薩現觀相應親證法身全性成修曰行真實法此釋實字也感報殊勝者內行既勝果報亦勝變易之身展轉微妙此釋報字也七寶莊嚴具淨妙五塵者釋論云菩薩勝妙五欲能令迦葉起舞華嚴云無量香雲臺觀經云一一樹上有七重網一一網間有五百億妙華宮殿即其土淨妙五塵此釋莊嚴二字也色心不二者以色外無心心外無色色即是心心即是色所謂一一塵中一切心一一心中一切塵一一心塵復互周重重無盡無障礙也毛剎相容者即是一一塵中一切塵所謂於一毛端現寶王剎也以此土菩薩分證法身心外無法舉一毛端全彰法界故能法法相即周徧含容也斷四住惑屬方便道者四住即是見思以見為一名見一切住地思惑分三一欲愛住地欲界九品思二色愛住地色界四地各九品思三無色愛住地無色界四地各九品思此之四住藏通二教二乘及別教菩薩皆已斷除但未證法身屬方便道此釋方便也無明未盡名曰有餘者無明即界外見思有四十二品今全然未斷名曰有餘此釋有餘也亦可各分淨穢者見思輕重同居淨穢如凡夫見思輕感同居淨重感同居穢也體析巧拙方便淨穢通教三乘體色明空則巧感方便淨藏教三乘析色明空則拙感方便穢次第一心實報淨穢別教菩薩修次第三觀證法身理感實報穢圓教菩薩修一心三觀證法身理感實報淨分證究竟寂光淨穢別教如來斷十二品無明分證三德感寂光穢圓教如來斷四十二品無明究竟證三德祕藏感寂光淨土石荊棘是依四趣紛紜是正八德七珍是依人天濟濟是正隨其機異所見亦異者若能斷盡無明即同居見寂光分斷無明同居見實報斷四住惑同居見方便未斷見思同居見本土如法華下引證我此土安隱者法華云大火所燒時我此土安隱大火所燒是同居土也我土安隱是同居見方便也或見此處山林地土沙礫證同居但見本土或見七寶證同居見方便土或見是諸佛行處證同居見實報以實報土行真實法感殊勝報是諸佛因中修行處故或見即是不思議境界證同居見寂光喻如一水無別天人鬼畜所見不同也受用土復分自他同乎實報者自受用土唯佛一人自己受用不共餘人他受用土則與十地菩薩受用故也此二雖分自他不同皆三僧祇劫修真實行所感果報故同實報變化同前三四方便同居者以方便同居乃極果聖人無方大用隨機變化方便利生之土也極樂雖當變化亦可受用及法性者極樂雖是同居對前第三變化若能進修現觀分斷無明乃至無明斷盡則通受用及法性也棗柏所分十種權實者華嚴合論云第一阿彌陀經淨土第二觀無量壽經淨土此二是權非實第三維摩經淨土第四梵網經淨土皆是實未廣第五摩醯首羅天淨土第六涅槃經淨土第七法華經淨土皆是權未實第八靈山會所指淨土是實非權第九唯心淨土是實淨土第十毗盧所居淨土是實淨土又上四土亦法爾具足不可但執寂光者恐人聞寂光是實前三土是權唯執寂光撥無三土故云此之四土法性理中法爾具足以眾生蕞爾心中百界千如三千性相無不具足若執寂光為實撥無前三此天台別教所詮清淨真如權理非真寂光也若證寂光等者言果若真證寂光於下三土隨心寄託如欲化法身菩薩則寄實報欲化權乘聖人則寄方便欲化凡夫則寄同居以寂光妙理非清淨真如不離前三故自不撥無若於寂光則未證於三土則撥無四土皆非現居何處此乃墮豁達空起斷滅見邪魔之侶外道之儔錯之甚矣故不信下引例楞嚴破想陰文云都指現在即為佛國無別淨居及金色相是也八地已上永脫色累者八地轉現相得色自在九地轉轉相得心自在十地轉業相究竟成佛此三位菩薩漸空業識脫體無依內無根身外無世界況極果聖人而有土耶疏西方偏指極樂有二意一則純是樂故如後文無苦有樂是二則因緣皆殊勝故如往生經中說是鈔多岐亡羊者列子載楊子之鄰人亡羊既率其黨又請楊子之豎子共追之楊子曰一羊何追者之眾曰多岐路故已而返竟不得羊曰岐路之中又岐路焉不知所之故也故曰大道以多岐亡羊學者以多方喪生專指中鵠者鵠皮革之的也射侯用皮其中畫鵠以為的若夫徧供十方者恐有難云既云指方立相住心取境何故經中又云供養他方十萬億佛故云此乃生西方已見佛聞法得無生忍以後事非今未生西方之凡夫即能也見卵而求時夜者莊子云且汝亦太早計見卵而求時夜見彈而求鴞炙時夜雞也見卵而即望其報曉甚言欲速之極也又問下然則華嚴一身復現剎塵身一一徧禮剎塵佛此非生西方已後事何不住心取境耶答中約一多相即答即十𢆯門中一多相即自在門以一無體全法界為體法界之外無有剩法故一即多以多望一亦然故一多相即或普或偏常異常同者徧禮剎塵曰或普唯念一佛曰或偏或偏或普曰常異一多相即曰常同疏即遠之近指觀經即近之遠指今經此猶是以凡情思議鈔良以去此下言觀經之去此不遠是明此經過十萬億之極樂去此不遠也此經過十萬億是明觀經去此不遠之極樂要過十萬億也心包下出所以心者不離當處近也法界廣無邊涯遠也今則心包法界何近而非遠故云此不遠之極樂實過十萬億土法界唯心何遠而非近故云過十萬億之土實去此不遠也超過三界所行之處者此三界是生死處是怖畏處是險惡處今所云超為與三界同一處所言超耶與三界各別處所言超耶不可說言離三界即三界者若離三界則染淨隔別隔別則淨而不徧若即三界則染淨不分不分則徧而不淨非方不方無在不在者不即不離非方也或在淨居或在西方非不方也又不即不離無在也或在淨居或在西方等無不在也未可槩以同居而為定論者以前問二經遠近何以不同是槩以同居而為定論也疏是世界義者世為遷流有豎義界為方位有橫義故鈔西屬金體者以五行配之則西方庚辛金西當肅氣者以四時配之西為秋有肅殺之氣故西當白色者以五色配之西為白也體露金風者僧問雲門樹凋葉落時如何門云體露金風十苦者生老病死愁怨憂苦受痛惱生死流轉十惡者即身三口四意三惡業十纏者瞋覆睡眠戲掉慳嫉無慚無愧註云忿恚曰瞋隱覆自罪曰覆意識昏迷曰睡五情暗冥曰眠嬉游曰戲三業躁動曰掉財法不能惠施曰慳他榮心生熱惱曰嫉屏處起罪不自羞曰無慚露處起罪不羞他曰無愧十使者即五利五鈍五鈍者貪瞋癡慢疑五利者身見邊見邪見見取戒取堅淨為西者華嚴童子南詢古云明正為南方盡南矣疏釋現在文中有三義初節引大本大雲明釋迦說法時之現在次節云釋迦彌陀均名現在而小不同明即今此時之現在後一節明後後無盡指盡未來為現在鈔非過去現在未來者以過去無始未來無終現在不住故也疏復有二義者一是現在二是現在之現在如念佛為徑路而持名又徑中之徑也鈔雖云勢至實彌陀無異者觀經疏云菩薩機忘如來應息名為補處以十方三世一切如來同一法身同一智慧更無彼此迭相見但由菩薩之機感如來之應若菩薩無明斷盡無能感之機如來之應隨息矣如來應息名為滅度菩薩機忘名為補處豈真一滅一生判然兩人耶故雖云勢至實乃彌陀也鈔智覺云總持教中說者宗鏡二十四云且如總持教中亦說三十七佛皆遮那一佛所現謂從大圓鏡智流出東方阿閦平等性智流出南方寶生妙觀察智流出西方無量壽成所作智流出北方不空成就法界清淨智即自當遮那言三十七者五方如來各有四大菩薩即成二十五及四攝八供養菩薩故成三十七皆稱佛者皆一佛所現以所從能皆名為佛也四攝即鈎鎖鈴索八供養即燒散燈塗華鬘歌舞疏多種不同者以根根塵塵皆能說法故鈔言說瞻視乃至香飯者楞伽云大慧非一切剎土有言說言說者是作耳或有佛剎瞻視顯法或有作相或有揚眉或有動睛或笑或欠或謦欬或動搖等鈔法身一向不說者此指文字法也若三身分析而言法身以理為身無有身相云何說法故云法身一向不說報身具說不說者報身有二若自受用乃法性身也以一切功德為體此身無相亦不說法若他受用則從法身現起為十地菩薩說法應身定說者應身則為三賢菩薩及二乘凡夫現起說法也報化非真佛亦非說法者此含二義一會用歸體義以報化二身乃法身之用用無自性全體即真故報化無體乃歸法身也二奪事顯理義以報化所說乃文字法然文字性空名字亦離以何為法必見法身者乃能知法也當是隨機所見者凡小權乘但見應身說法大乘登地乃見報身說法若圓頓菩薩乃見法身說法以佛本無三隨機所見自不同故鈔僧問大隨至始得大悟者僧至南方參投子投子問云大隨有何言句僧陳前事投子向西禮云西川有古佛世出令僧反見僧返大隨已滅度矣一往一還路途萬里後參龍牙復理問前事牙曰為同大千始得徹悟古云一句隨他語千山走衲僧又頌云劫火光中立問端衲僧猶滯兩重關只因一句隨他語萬里區區獨往還城東老母者此老母但見佛來即避不見然雖不欲見佛佛常現前老母向東佛於東現向西南北佛現亦然母以十指掩面十指尖頭皆現佛相鈔終朝侍佛側等既云體自靈知則終朝侍佛側也奈何眾生有眼如盲不見金容既云即今顯現則竟日坐法筵也奈何眾生有耳如聾罔聞妙道因不見金容故遂使魔王混於佛殿因罔聞妙道遂使邪法亂乎真宗雖然如是佛身如故王法猶存但能不隨外境返照心源則佛法一時雙足矣鈔即不苦不樂者以三苦對三受苦苦對苦受壞苦對樂受行苦對不苦不樂受故此苦處中者以不苦不樂受介乎苦樂二受之中故云處中欲界具三者三受具足故色兼後二者初禪離生喜樂二禪定生喜樂三禪離喜妙樂四禪捨念清淨俱無欲界苦受故無色唯行者以四空天人苦樂雙亡唯有念念遷流故總成上七者以前七是別後一為總故百一十苦者前五十五苦次第增數一具一二具二三具三四具四乃至十具十共成五十五次五十五九種次第疊開一分二二分三三分四四分五五分六六分七七分八八分九九分十又共成五十五一無差別流轉苦者以雖有六道之不同同一流轉故云無差別此即一具一也二欲苦癡苦此即二具二也若約苦壞行是即三具三等也次九種苦者謂一切廣大一切門邪行流轉不隨欲違害隨逐一切種於九種中又次第疊開者謂一分二宿因所生現緣所生二分三長時猛利雜類無間三分四地獄旁生鬼善趣攝四分五乃至九分十等一切眾生皆寂滅相不復更滅者此約生死即涅槃以九界生死是修惡修惡即性惡性惡融通任運攝持佛界修善故曰生死即涅槃相不須更滅生死證涅槃也此舉能例則一切下是舉所例眾生例國土寂滅例極樂今開苦樂以違彼經者以證難也彼經苦樂相即今經苦樂迢然豈不違彼經耶賢首大師下引古釋例答但以迷倒妄見生死等者謂生死本空元無自性為因無明引生三細次從境界復現六麤造業受報往來六趣是以無生死中昏迷顛倒妄見生死名在生死此岸若能從緣得悟生死本空本來涅槃即生死此岸便名彼岸此舉能例今謂下是舉所例生死例五濁此岸例娑婆彼岸例極樂國土下結答據上答例則知國土常淨眾生自迷若眾生利根能從迷得悟何必分苦分樂勸厭勸欣今鈍根眾生迷多悟寡示兩土苦樂令生欣厭不容己也鈔此土有不常值佛苦者諸佛出世如優曇華一百八十劫空過無有佛故不聞說法苦者不常值佛法亦難聞萬劫千生如聾如瞽故惡友牽纏者不獨淫朋匪友怙惡增非即勸策世善遮障真乘皆為惡友故羣魔惱亂苦者天魔陰魔及與心魔乃至煩惱及死八萬四千魔軍故輪迴不息苦者往來六趣匍匐四生如汲井輪互為高下故難免三途苦者淪溺三途如己舍宅乃至一念瞋心即地獄因一念癡心即畜生因一念貪心即餓鬼因故塵緣障道苦者四事供給助道資緣一有不周難於進行故壽命短促苦者長年者不過八九十以皆亡短命者大都二三十而早夭更有今日不知明日事上牀別了下牀時故修行退失苦者此土業風浩大塵境麤強欲潔偏染求升反沈故塵劫難成苦者此土修行多劫多生方蒙解脫故鈔得旨則號醍醐失意則成毒藥者圭峰大梅之旨不過掃人取捨之情蕩人垢淨之見耳是應病發藥但除其病也若執無淨穢無取捨為極則是執藥成病反為毒藥也甯知下伸正意理無分限者無淨無穢無取捨也事有差殊者淨穢迢然取捨歷然也理隨事變無取捨處取捨宛然者所謂雖知無妄可斷不妨斷其妄想雖知無真可證不妨證彼真心也事得理融則正取捨時了無取捨者所謂雖云斷妄而了知妄想全空雖云證真而了知真如非有也權實雙行事理無礙者知一切法平等不二實也理也而示苦樂境開取捨門權也事也平等即苦樂苦樂即平等不二而取捨取捨而不二雙行無礙也故苕水下引古證結亦能順教成功則無取捨處不妨取捨宛然欣厭本空則正取捨時了無取捨也況安養下重覆發明往來法界彌顯唯心者往者往生淨土來者迴入娑婆而實往無所往來無所來彌顯唯心之妙若執定唯心不信往來者則既無往來何法唯心雖名唯心非真唯心也託彼勝緣速登寶覺者以凡夫欲登寶覺必具二種一者因勝具足一乘種子故二者緣勝諸佛菩薩作外緣故若內因雖具外緣不勝如木有火不假鑽燧之緣不能自燃其木修道亦然雖具一乘因種若無彌陀勝緣不能速斷輪迴登無上覺也權曰妙者以是即實之權故蓋權外無實實外無權也疏自性無染者從本以來一切染法不相應故自性常淨者常恒不變淨法滿足故鈔染是苦義者以苦者是逼惱義煩惱染污淨心即逼惱故淨是樂義者以樂者暢悅義淨心不為逼惱即暢悅故華嚴六地觀察無明者六地菩薩以十種相觀諸緣起所謂星羅十門月滿三觀也今鈔所引乃是第七三苦聚集觀無明等者於理不了名無明所作業果是行此二支屬過去因行依止初心是識與識共生四取蘊為名色名色增長為六處根境識三事和合是觸觸共生有受此五支屬現在果於受染著是愛愛增長是取取所起有漏業為有此三支屬現在因從業起蘊為生蘊熟蘊壞為老死此二屬未來果無明至六入是行苦者以前五遷流相顯故觸受是苦苦者觸受二支觸對生苦以因苦緣生於苦心故餘是壞苦者餘但壞樂故名壞苦老死壞生亦名為苦故我今此心無無明乃至無老死等可雙約本然修得說若約本然說即自性本自清淨無一切差別之相也若約修得說即經中所謂若無明滅行滅者是三苦斷也無上菩提是究竟智德乃能究盡諸法實相邊際智滿種覺頓圓也無上涅槃是究竟斷德以無明滅故心無有起以無起故境界隨滅以因緣俱滅故心相皆盡名得涅槃也覺法樂者謂無心觀法而於諸法自然普照也寂靜樂者無所取著猶如虗空入一切法如虗空性也二俱名樂是無樂之樂乃為真樂也若有可樂與苦何別如下文所說聖解還成魔境者楞嚴云不作聖心名善境界若作聖解即受羣邪佛見早墮鐵圍者經云文殊昨夜起佛見法見被吾貶向二鐵圍山鈔如瑞相經下所引共有九重皆證周帀圍繞之意一單網明網有雜色寶光二舉網例二明網柔軟不待琱琢三單行樹明行列有數百千重四單行樹明樹有七寶間錯五單行樹明樹有佛國出現六單行樹明樹有光色異常七樹上有網明樹網具足生法八樹上有網明樹網映現大千九單行樹亦明樹有數百千重如旋火輪者言團圓正等光明閃爍也如帝釋瓶者釋論第十五云有人一心供養帝釋滿十二歲天與一器名曰德瓶而語之言所須之物從此瓶出今以妙華涌出諸菓如彼天瓶出種種物鈔七聖財信者於實德能深忍樂欲為義戒者防非止惡潔淨身心為義聞者多聞博通為義捨者一切盡捨不染一塵為義慧者以了境為義慚愧者依自法力崇重賢善依世間力輕拒暴惡為義先言信者信為道元功德母故有信無戒信亦非真故次言戒有戒無聞不知實相故次言聞聞而不捨法愛難忘不成聖果故次捨有捨無慧則墮癡禪非真解脫故次慧前五如寶後二如人者以若無慚愧同禽獸木石信戒聞捨一切法財悉散失故鈔夫行樹尚及八千是據觀經所說迦旃鄰陀此云細綿衣此草柔軟可愛過此衣故其香普熏十方世界是以妙香而作佛事也疏自性長養眾善是行樹義者行樹從地發生漸成暢茂有長養義鈔文中施無染心無傲心等皆約性中本無而言不約修時言也是則若人了達自性則六度萬行無不具足矣故六祖云心地無非自性戒等菩薩妙法樹者樹有蔭覆清涼二義今一乘妙法能蔭覆眾生令得清涼之樂故有樹義生於直心者起信云一者直心正念真如法一故淨名云直心是道場無委曲故楞嚴云十方如來同一道故出離生死皆以直心學道之人先須直心為地方生妙法故信為道本故信為種若無慈悲縱有神通三昧悉魔業也二乘由無慈悲不明法性故慈悲為根妙法以般若為體故智慧為身若無方便權智則法身空寂無助如樹無枝幹故方便為枝幹雖有權實二智若無五度則有慧無福無有莊嚴故五度為繁密禪定一切八風所不能動如葉之雖在風中而森然如故神通變化不一如華開合不一樹林雖華葉具足必以結果為功菩薩既萬行周圓自以種智為果覺意謂七覺支四如意足解脫智慧即解脫般若二德奈之何下結歎勸修欄楯毀者謂放此縱橫妙心一無拘檢也既無拘檢則伐性之斧斤至矣羅網頹者謂迷此廣大妙心以昏擾擾相為心性也既為昏擾則清涼之蔭覆疏矣尚枯瘁其根者謂尚無慈悲方便之因行況得神通種智之妙果耶覺林如故道種非遙者謂修持雖廢法性尚存但肯加功本真不失古云道遠乎哉觸事而真聖遠乎哉體之即神但肯迴光無患不徹也庭前柏樹者僧問趙州如何是祖師西來意州云庭前柏樹子檻外藥欄者僧問雲門如何是清淨法身門云華藥欄鈔此合輕軟下是明同異此指大本彼指觀經彼配六入者清為色入不臭香入美為味入輕冷軟是觸入調適無患是法入并前說法即聲入也雖成六入無非妙境鈔水本無心能隨人意者此方眾生迷心逐境為境所轉不能轉境故水不隨心彼土上人會境歸心心能轉境境自隨心故水能隨意所欲也鈔或聞佛法僧聲三寶聲也寂靜空無我聲二乘聲也大慈悲波羅蜜聲菩薩聲也十力無畏不共聲佛聲也諸通慧下細明菩薩聲通慧通途之慧三賢聲也無所作不起滅初地至七地聲也以此諸地斷無明證法性法性本無所作及起滅故無生忍聲八地聲也以八地菩薩斷俱生我執親證無生故甘露灌頂等覺聲也等覺將成佛時十方諸佛以智慧水而灌其頂即入佛位如轉輪王將紹王位以水灌頂故成熟諸根者諸根即聲聞緣覺及諸位菩薩上中下諸根皆同歸一實也水本無情善能說法者此土眾生迷心逐境諸根暗塞唯耳稍利故以聲為教體唯聞有情說法彼土眾生既會境歸心六根通利故六塵皆為教體根根盡入圓通不獨有情說法無情亦皆說法也是水不但以可浴為功者此土眾生迷心逐境則水乃業報之水但能洗四大垢穢不能得大利益彼土眾生會境歸心八功德水即自心智慧故能開神悅體滌蕩情慮斷惑證真得大利益也鈔自性深𢆯無盡者豎窮三際之底故廣遠無際者橫極法界之邊故非真非俗純粹至善者絕諸待對離二邊雜糅故順萬物而無情者情實也如幻如化無真實故上行則入聖流者真如隨淨緣則為四聖四聖既如幻聖無所增下行則入凡流者真如隨染緣則為六凡六凡亦如幻凡無所減不變隨緣周徧法界者真如自體不變而能隨染淨緣徧十法界定水二句淨名云八解之浴池定水湛然滿布以七淨華浴此無垢人古釋云水之為用除垢去熱解脫之性亦然解脫之中定慧意足湛然滿矣七淨自戒淨至涅槃淨浴此無垢人者無垢而浴除熱取適也菩薩無緣而入八解者外為眾生內自調適也今之取意謂性定之水浴此不立一塵之無垢人然無垢猶墮淨也非真功德垢淨雙亡是真功德矣鈔如觀經言至無我之音詳引經論以是推之下是判釋也德有厚者乃妙達唯心一法不著故果報樓閣能隨心高下浮在空中德薄者乃心外見法執著未空故不能隨心止在地上世間八風為條風明庶風清明風景風涼風閶闔風不周風廣莫風然彼土無四時或應八方或自有八種皆未可知一色無變是常義二體無垢是淨義三轉作無我是我義四能令人富是樂義鈔問堯處茅茨者因一貴字發問也答中有二義一上智無著義以上智之士悟境惟心心不見心無相可得一切寶嚴皆同幻化故二曲為鈍根義以愚鈍凡夫昧心著境讚彼寶嚴令生忻慕故箕諫象玉者箕子見紂為象箸歎曰彼為象箸必為玉杯而遠方珍怪之物至矣遂入諫警蹕冕旒者天子出陳警入陳蹕天子儀仗也冕冠也天子九旒然舜時恐未嘗有此言此不過形狀其富貴耳疏前云離地曰階坦途曰道故階道有平直義又重屋曰樓岑樓曰閣故樓閣有高䆳義鈔離諸垢污即前離地曰階無有偏陂即前坦途曰道迥超塵境觀照不遺如樓閣之高無不照是高義囊括虗空廣博無盡如樓閣之廣無不容是䆳義常而不遷即色無變淨而不染即體無垢我而隨緣不礙即轉作無我樂而富有不虧即能令人富眾美畢具資成法身者法身具含萬德還以萬德嚴身而實德無所德嚴無所嚴是真莊嚴也且善財下結勸其如終日下結歎鈔婆沙論止言十五里華嚴鈔則言一由旬觀經言十二由旬大本言百由旬千由旬復言華葉無量而如來藏經又言華中化佛光明無數則車輪何可思議也鈔微妙香潔俱可約理微有四義事相可知若稱理則自性之華三智不能覰五眼不能窺是幽微義不與諸塵作對不與萬法為侶是隱微義隨舉一德具含眾德如琉璃瓶盛多芥子是細微義一切功德妙寶為體無作萬行以為莊嚴是精微義妙有十二義者初發心時便成正覺因該果海果徹因源是因果同時義真如不守自性五道隨緣淨非淨也正當五道隨緣自性不變垢非垢也是垢淨雙非義法界一相不礙千差競起千差競起不礙法界一相是總別齊彰義不離當處常湛然覔即知君不可見常湛然顯也不可見隱也是隱顯隨宜義法性重重無盡無盡猶如千鐙互為主伴是主伴相參義雖非因非果而不昧因果無我無作無受者善惡之業亦不亡是勝劣分明義散去普周法界收來在一微塵其大無外其小無內是小大無定義有物先天地無形本寂寥能為萬象主不逐四時凋是寒暑不遷義眾美畢張不妨清淨一色清淨一色不妨萬德交羅是彩素交輝義寂然不動感而遂通隨緣赴感靡不周而恒處此菩提座是動靜一源義一切如來光嚴住持是諸眾生清淨覺地是凡聖兼成義如來藏中無法不具隨眾生心應所知量是感應冥符義香潔二義事相可知理則自性之華雖居煩惱之中不為煩惱所染是穢中香往生之士具足五分法身之香及八萬四千波羅蜜香是香中香也又自性雖在三界生死之中不為生死所遷是為垢中潔往生之士既不為分段所遷并不為變易所動性離惑染淨法滿足是潔中潔也鈔中陰之身自求父母者中陰謂前陰已謝後陰未成而中間所受之身名為中陰身六趣眾生唯除極善極惡餘皆通受此身也自求父母餘趣則不可知但就人趣即楞嚴所謂見明色發明見想成異見成憎同想成愛流愛為種納想為胎是也一彈指頃蓮華化生者謂臨終在定之心即淨土受生之心舉念即是生淨土時也不兼色像者謂文殊一行三昧不取相貌專稱名字故菩薩偏行六度者謂十地菩薩於十波羅蜜各有專主故所謂初地布施二持戒三地忍辱四精進五禪六般七方便八願九力十智慧是也今不言十而言六者以六即能攝十故以施為專主餘但隨力隨分者是初地菩薩境界經云菩薩住初地時於一切物無所悋惜求佛大智修行大捨凡是所有一切能施是菩薩十波羅蜜中檀波羅蜜增上餘波羅蜜非不修行但隨力隨分也鈔佛地下引證假實之色者長短方圓乃至光影等為假色以對短為長對長為短無一定實體故青黃赤白等為實色以青等析至極微色不改故又實色是眼識所緣假色是意識所緣如水月鏡華等皆不離佛淨心者諸佛淨心非假非實假實之色不離此心故即此淨心能顯假實之色者以此心是假是實則不能現假實之色故今復解云佛地論是明色心不二假實之色不離佛淨心者謂種種諸色不異法身真心如波與水本來無二也以無量莊嚴各各差別皆真如自在用故此句明色即心也即此淨心能顯假實者謂即此法身是色體故能現於色也以依智淨相能作一切勝妙境界故此句明心即色也故經下結歸當經青色青光等者青色等是實色青光等是假色既云假實之色皆不離佛淨心則此經光色不二即自性寂照雙融也又解云光色不二者謂青色有青光白色有白光光色不二也寂照雙融者以光有照義色有寂義華之光色不二即性之寂照雙融也鈔願以起行行以實願者以願導行以行填願也行非願起則行乃偽行非真實行願無行填願乃虗願非真實願行滿願遂名為成就者彌陀成就功德莊嚴皆因中廣大行願之力非一朝一夕之故也攝取二十一剎如彼修持者此稱性之行也以性無盡故行亦無盡一修一切修一行一切行言二十一者舉三七之多表其無盡也住真實慧者先悟毗盧法界勇猛精進阿僧祇劫修菩薩行者次修普賢行門也然必發四十八願已然後修者所謂以願導行以行填願也護身口意是別舉持戒一門修行六度則備舉所修之行此上乃自利之行了空無相下乃利他之行也了空無相無作是法身菩薩三解脫門謂了知無人無我無壽命自性空無作者無受者即名空解脫門觀一切法皆自性滅畢竟解脫無有少法相生即名無相解脫門如是入空無相已無有願求唯除大悲為首教化眾生即名無作解脫門了空無相無作以行教化者謂不同餘教心外有法實有生可度乃是終日度而無度終日無度而度所謂雖知諸佛國及與眾生空而常修淨土教化諸眾生是也華嚴世界下是先明願又下云下是次明行普賢智地行悉成者謂普賢智地底行皆悉成就也疏無漏性功德者以此功德乃是從性起修全修即性故鈔營修世福為有漏因者初祖始見梁武帝帝問曰寡人造寺寫經度僧無量有功德否祖曰實無功德此但人天小果有漏之因如影隨形雖有非實帝曰如何是真實功德答曰淨智妙圓體自空寂如是功德不以世求疏金剛般若至是名莊嚴者經云須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴古釋云以菩薩雖修行嚴土行乃無作土亦非嚴非嚴而嚴故曰即非莊嚴是名莊嚴今引此以問乃斷章取義謂實無莊嚴方是真莊嚴也而今乃有種種依正莊嚴不與金剛相違背耶是非但不知淨土并不知金剛也故以性相融通所宗有異答之鈔彼經以無相為宗故不取形相者如經云無我相無人相無眾生相無壽者相無法相亦無非法相等又云若見諸相非相即見如來實則清淨心中身土自現者如經云以三十二相見如來又云於法不說斷滅相今經以淨土為宗故反覆開明者如經中欄網行樹池閣蓮華天樂雨華化禽風樹乃至壽命光明聲聞菩薩等實則相本自空唯心唯識者雖有種種莊嚴實如鏡像水月不立纖塵皆行人心識所變現也又清淨心中身土自現者以如實空即如實不空真實理中具足無量功德故又復見本法身自然而有不思議業能現種種依正故攝論云如摩尼天鼓無思成自事等又相本自空唯心唯識者以彼色相莊嚴等事無來無去離於分齊唯依心現故又復一切色相即是如來妙心所謂從本以來色心不二色性即智故涅槃云吾今此身即是法身等鈔直心是菩薩淨土等淨土地平如掌無諸坑坎豈諂曲之所能成七寶莊嚴勝妙無比豈淺行之所能得故必三智於一心中修直至道場無諸委曲三諦於一心中造窮深盡底究暢實際乃能如是而不諂眾生及具足功德眾生來生其國者以化緣相及果報相通以因克果影響相符不差毫髮也乃至萬行悉亦如是者次從大乘心六度四等四攝乃至十善是菩薩淨土菩薩成佛時具行十善眾生來生其國也疏自性能生萬法是莊嚴義者金剛經云即非莊嚴是名莊嚴今則自心出生萬法還以萬法嚴心法本自空嚴亦何有無能嚴所嚴是真莊嚴鈔一切寶鈴網如幻心所生等者謂穢土依正從凡夫有漏識生淨土寶嚴從聖人無漏智生故鈴網如幻從人解法如幻心生樓閣浮空從人無著無生心生乃至種種寶衣從忍辱生寶蓋從慈悲生種種寶幢從示說一切法生種種寶座從解一切法空生一一皆是稱真如法界具無邊德者華嚴境界稱性法門故法法全彰塵塵具足故云華藏世界所有塵一一塵中見法界也
